<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K SECURE V27 - AUDIO GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Manrope:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #10b981; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Manrope', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        
        /* UI Layout Fixes */
        .header { height: 80px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; z-index: 100; }
        .msg-area { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); padding-bottom: 120px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(20px); padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.1); z-index: 200; }

        /* Bubbles */
        .msg { padding: 12px 18px; border-radius: 22px; max-width: 80%; font-size: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .in { background: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; }
        .out { background: linear-gradient(135deg, #059669, #10b981); align-self: flex-end; border-bottom-right-radius: 4px; }

        .btn-meme { width: 38px; height: 38px; cursor: pointer; transition: 0.2s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .btn-meme:active { transform: scale(0.8); }

        /* Join Call Notification */
        #callNotify { display: none; background: #059669; color: white; padding: 8px 15px; border-radius: 50px; font-size: 12px; font-weight: 800; animation: blink 1s infinite; cursor: pointer; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } }

        /* Audio Grid (Hidden) */
        #audioContainer { display: none; }
        
        #loginDiv { position: fixed; inset: 0; z-index: 10001; background: #020617; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loginDiv">
    <div class="w-full max-w-sm bg-slate-900/50 backdrop-blur-xl p-10 rounded-[40px] border border-white/10 text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/10435/10435921.png" class="w-20 mx-auto mb-6">
        <h1 style="font-family: 'Orbitron';" class="text-3xl font-black text-emerald-400 mb-8 tracking-wider">P2K SECURE</h1>
        <input id="user" type="text" placeholder="Your Name" class="w-full bg-slate-800 rounded-2xl p-5 mb-4 outline-none border border-transparent focus:border-emerald-500">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-slate-800 rounded-2xl p-5 mb-8 outline-none border border-transparent focus:border-emerald-500">
        <button onclick="enter()" class="w-full bg-emerald-600 py-5 rounded-2xl font-bold text-white shadow-xl active:scale-95 transition-all">CONNECT NOW</button>
    </div>
</div>

<div id="appUI" class="hidden h-full flex flex-col">
    <header class="header flex items-center justify-between px-6">
        <div>
            <div id="userCounter" class="text-emerald-400 font-bold text-xs uppercase tracking-tighter">● Online: 0</div>
            <div id="typingInfo" class="text-[9px] text-white/50 italic"></div>
        </div>
        
        <div id="callNotify" onclick="joinAudioCall()">📞 JOIN CALL</div>

        <div class="flex gap-4">
            <button onclick="askNotify()"><img src="https://cdn-icons-png.flaticon.com/512/3602/3602145.png" class="btn-meme"></button>
            <button onclick="startAudioCall()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435905.png" class="btn-meme"></button>
        </div>
    </header>

    <div id="chatBox" class="msg-area"></div>

    <div id="audioContainer"></div>

    <footer class="footer">
        <div class="flex items-center gap-3 bg-slate-800/60 rounded-full px-5 py-1.5 border border-white/5">
            <input type="file" id="fileIn" accept="image/*" onchange="sendPhoto(this)" class="hidden">
            <button onclick="document.getElementById('fileIn').click()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435911.png" class="btn-meme"></button>
            
            <button id="recBtn" class="active:scale-125 transition-all"><img src="https://cdn-icons-png.flaticon.com/512/3602/3602157.png" class="btn-meme"></button>
            
            <input id="msgInput" type="text" placeholder="Type a secure message..." class="flex-1 bg-transparent py-3 text-sm outline-none text-white">
            <button onclick="sendMsg()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435882.png" class="btn-meme"></button>
        </div>
        <button id="hangupBtn" onclick="endCall()" class="hidden w-full mt-3 bg-red-600 py-2 rounded-full font-black text-xs uppercase">Leave Call</button>
    </footer>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", authDomain: "p2kc-b0553.firebaseapp.com", databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", projectId: "p2kc-b0553" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName, myRoom, localStream, peers = {}, mediaRec, chunks = [];

    // Security: Anti-Screenshot
    window.addEventListener('keyup', e => { if(e.key==='PrintScreen'){ navigator.clipboard.writeText(""); alert("SECURE"); }});

    function enter() {
        myName = user.value.trim(); myRoom = pass.value.trim();
        if(!myName || !myRoom) return;
        loginDiv.style.display="none"; appUI.classList.remove('hidden');
        db.ref(`rooms/${myRoom}/msgs`).push({ type:'sys', val: `${myName} Joined` });
        db.ref(`rooms/${myRoom}/users/${myName}`).set(true);
        db.ref(`rooms/${myRoom}/users`).on('value', s => userCounter.innerText = "● Online: " + s.numChildren());
        listenMsgs(); listenCalls(); setupVoice(); setupTyping();
    }

    // Voice Notes Logic
    async function setupVoice() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRec = new MediaRecorder(s);
            mediaRec.ondataavailable = e => chunks.push(e.data);
            mediaRec.onstop = () => {
                const b = new Blob(chunks, { type: 'audio/webm' });
                const r = new FileReader();
                r.onload = e => sendData(e.target.result, 'voice');
                r.readAsDataURL(b); chunks = [];
            };
            recBtn.onmousedown = () => { mediaRec.start(); recBtn.style.filter="hue-rotate(90deg)"; };
            recBtn.onmouseup = () => { mediaRec.stop(); recBtn.style.filter="none"; };
            recBtn.ontouchstart = (e) => { e.preventDefault(); mediaRec.start(); recBtn.style.filter="hue-rotate(90deg)"; };
            recBtn.ontouchend = () => { mediaRec.stop(); recBtn.style.filter="none"; };
        } catch(e) {}
    }

    function sendMsg() { const v = msgInput.value.trim(); if(v) sendData(v, 'text'); msgInput.value=""; }
    function sendPhoto(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => sendData(e.target.result, 'img'); r.readAsDataURL(i.files[0]); } }
    function sendData(val, type) {
        const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val, type, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
        setTimeout(() => ref.remove(), 60000); // 1-Min Vanish
    }

    function listenMsgs() {
        db.ref(`rooms/${myRoom}/msgs`).on("child_added", s => {
            const d = s.val(), id = s.key;
            const div = document.createElement("div");
            if(d.type === 'sys') {
                div.className = "text-center text-[10px] text-emerald-500 uppercase font-black my-4 opacity-40";
                div.innerText = d.val;
            } else {
                const isMe = d.u === myName;
                div.className = `msg ${isMe ? 'out' : 'in'}`;
                div.id = "m-"+id;
                let c = d.val;
                if(d.type==='img') c = `<img src="${d.val}" class="rounded-xl max-h-60">`;
                if(d.type==='voice') c = `<audio controls src="${d.val}" class="h-8 invert"></audio>`;
                div.innerHTML = `<div class="text-[9px] font-black opacity-50 mb-1">${d.u}</div>${c}<div class="text-[8px] text-right mt-1 opacity-40">${d.time}</div>`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
        db.ref(`rooms/${myRoom}/msgs`).on("child_removed", s => document.getElementById("m-"+s.key)?.remove());
    }

    // --- MULTI-USER AUDIO CALL LOGIC ---
    async function startAudioCall() {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        db.ref(`rooms/${myRoom}/callStatus`).set({ active: true, host: myName });
        hangupBtn.classList.remove('hidden');
        alert("Broadcasting call to all users...");
    }

    function listenCalls() {
        db.ref(`rooms/${myRoom}/callStatus`).on('value', async s => {
            const d = s.val();
            if(d && d.active && d.host !== myName) {
                callNotify.style.display = "block";
                showPush("Incoming Call", `${d.host} is starting a group call!`);
            } else {
                callNotify.style.display = "none";
            }
        });

        // Signaling for WebRTC
        db.ref(`rooms/${myRoom}/signals/${myName}`).on('child_added', async s => {
            const { from, offer, answer, candidate } = s.val();
            if (offer) {
                const pc = createPeer(from);
                await pc.setRemoteDescription(new RTCSessionDescription(offer));
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
                db.ref(`rooms/${myRoom}/signals/${from}`).push({ from: myName, answer: ans });
            }
            if (answer) peers[from].setRemoteDescription(new RTCSessionDescription(answer));
            if (candidate) peers[from].addIceCandidate(new RTCIceCandidate(candidate));
        });
    }

    async function joinAudioCall() {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        callNotify.style.display = "none";
        hangupBtn.classList.remove('hidden');
        
        // Signal existing host/users
        db.ref(`rooms/${myRoom}/users`).once('value', s => {
            s.forEach(u => {
                if (u.key !== myName) {
                    const pc = createPeer(u.key);
                    pc.createOffer().then(o => {
                        pc.setLocalDescription(o);
                        db.ref(`rooms/${myRoom}/signals/${u.key}`).push({ from: myName, offer: o });
                    });
                }
            });
        });
    }

    function createPeer(userId) {
        const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        peers[userId] = pc;
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        pc.onicecandidate = e => { if (e.candidate) db.ref(`rooms/${myRoom}/signals/${userId}`).push({ from: myName, candidate: e.candidate }); };
        pc.ontrack = e => {
            let audio = document.getElementById("audio-"+userId);
            if (!audio) {
                audio = document.createElement('audio');
                audio.id = "audio-"+userId; audio.autoplay = true;
                audioContainer.appendChild(audio);
            }
            audio.srcObject = e.streams[0];
        };
        return pc;
    }

    function endCall() {
        localStream?.getTracks().forEach(t => t.stop());
        Object.values(peers).forEach(p => p.close());
        peers = {};
        db.ref(`rooms/${myRoom}/callStatus`).remove();
        db.ref(`rooms/${myRoom}/signals/${myName}`).remove();
        hangupBtn.classList.add('hidden');
        location.reload(); // Hard reset for clean audio state
    }

    function setupTyping() {
        msgInput.oninput = () => { db.ref(`rooms/${myRoom}/tp/${myName}`).set(true); clearTimeout(window.t); window.t = setTimeout(()=>db.ref(`rooms/${myRoom}/tp/${myName}`).remove(),2000); };
        db.ref(`rooms/${myRoom}/tp`).on('value', s => { let t=[]; s.forEach(u=>{ if(u.key!==myName) t.push(u.key); }); typingInfo.innerText = t.length>0 ? t.join(",")+" is typing..." : ""; });
    }
    function askNotify() { Notification.requestPermission(); }
    function showPush(t, b) { if(Notification.permission==="granted") new Notification(t, {body:b}); }
</script>
</body>
</html>
