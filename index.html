<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<body class="bg-gray-50 text-gray-900">

    <div id="incomingCallBox" class="hidden bg-indigo-600 text-white p-4 flex justify-between items-center sticky top-0 z-[100]">
        <p id="callMsg">Inbound Call...</p>
        <div class="flex gap-2">
            <button onclick="acceptCall()" class="bg-green-500 px-4 py-1 rounded shadow-md">Accept</button>
            <button onclick="rejectCall()" class="bg-red-500 px-4 py-1 rounded shadow-md">Reject</button>
        </div>
    </div>

    <nav class="p-6 bg-white shadow-sm flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-600">MyDevCall</h1>
        <div id="myIdDisplay" class="text-xs bg-gray-100 p-2 rounded text-gray-500">Connecting...</div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-20 text-center">
        <h2 class="text-5xl font-extrabold mb-4">Live Audio Calling</h2>
        <input type="text" id="remotePeerId" placeholder="User ki ID daalein" class="border p-3 rounded-lg w-64 mb-4 shadow-sm">
        <br>
        <button onclick="startCall()" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700 transition flex items-center justify-center mx-auto">
            <span class="mr-2">📞</span> Call Now
        </button>
        <audio id="remoteAudio" autoplay></audio>
    </header>

    <script>
        // 1. Peer connection setup
        const peer = new Peer(); 
        let currentCall;

        // Apni ID show karna
        peer.on('open', (id) => {
            document.getElementById('myIdDisplay').innerText = "Aapki ID: " + id;
            console.log('My peer ID is: ' + id);
        });

        // 2. CALL RECEIVE KARNA (Call Accept Logic)
        peer.on('call', (call) => {
            document.getElementById('incomingCallBox').classList.remove('hidden');
            document.getElementById('callMsg').innerText = "Incoming Call from: " + call.peer;
            
            // Accept Button par click hone ka wait
            window.acceptCall = () => {
                navigator.mediaDevices.getUserMedia({audio: true}).then((stream) => {
                    call.answer(stream); // Call utha li
                    call.on('stream', (remoteStream) => {
                        document.getElementById('remoteAudio').srcObject = remoteStream;
                    });
                    document.getElementById('incomingCallBox').classList.add('hidden');
                });
            };
        });

        // 3. CALL DIAL KARNA (Start Call Logic)
        function startCall() {
            const destId = document.getElementById('remotePeerId').value;
            if(!destId) return alert("Kripya User ID daalein!");

            navigator.mediaDevices.getUserMedia({audio: true}).then((stream) => {
                const call = peer.call(destId, stream);
                call.on('stream', (remoteStream) => {
                    document.getElementById('remoteAudio').srcObject = remoteStream;
                    alert("Calling Connected!");
                });
            }).catch(err => {
                console.error("Mic access denied", err);
                alert("Mic access chahiye call ke liye!");
            });
        }

        function rejectCall() {
            document.getElementById('incomingCallBox').classList.add('hidden');
        }
    </script>
</body>
