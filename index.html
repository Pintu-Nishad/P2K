<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #0b141a; color: #e9edef; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        #chatBox { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #202c33; padding: 8px 12px; border-radius: 12px; max-width: 80%; align-self: flex-start; }
        .my-msg { background: #005c4b; align-self: flex-end; }
        .input-area { background: #202c33; padding: 10px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #333; }
        #callUI { position: fixed; inset: 0; z-index: 1000; background: black; display: none; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 10px; right: 10px; width: 80px; height: 110px; border-radius: 8px; border: 1px solid #00a884; }
    </style>
</head>
<body>
    <div id="loginDiv" class="fixed inset-0 z-[1000] bg-[#111b21] flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm bg-[#202c33] p-8 rounded-2xl shadow-2xl">
            <h1 class="text-2xl font-bold mb-6 text-[#00a884]">P2K Secure</h1>
            <input id="user" type="text" placeholder="Name" class="w-full bg-[#2a3942] rounded-lg p-3 mb-4 outline-none text-white">
            <input id="pass" type="password" placeholder="Room ID" class="w-full bg-[#2a3942] rounded-lg p-3 mb-6 outline-none text-white">
            <button onclick="enter()" class="w-full bg-[#00a884] py-3 rounded-lg font-bold text-[#111b21]">Join Chat</button>
        </div>
    </div>
    <div id="chatDiv" class="hidden h-full flex flex-col">
        <header class="h-14 bg-[#202c33] flex items-center justify-between px-4 border-b border-gray-800">
            <button onclick="location.reload()" class="text-red-400 font-bold">EXIT</button>
            <b id="roomTitle" class="text-sm">Room</b>
            <button onclick="startCall()" class="bg-[#00a884] px-4 py-1 rounded font-bold">CALL</button>
        </header>
        <div id="chatBox"></div>
        <footer class="input-area">
            <input type="checkbox" id="ghostMode">
            <button onclick="sendMsg()" class="bg-[#00a884] p-2 rounded-full">➤</button>
            <input id="msgInput" type="text" placeholder="Message..." class="flex-1 bg-[#2a3942] rounded-lg px-4 py-2 text-sm outline-none">
        </footer>
    </div>
    </body>
</html>
