<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hinglish Audio Chat</title>

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family: 'Segoe UI', Roboto, Arial, sans-serif; background:#efe7dd; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  /* Login Page */
  #loginDiv { position: fixed; inset: 0; background: #075e54; display: flex; justify-content: center; align-items: center; z-index: 2000; }
  .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .login-box h2 { color: #075e54; margin: 0 0 20px 0; }
  .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
  .login-box button { width: 100%; padding: 12px; background: #128c7e; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }

  /* Main Chat UI */
  #chatDiv { display: none; flex-direction: column; height: 100vh; }
  
  .header { background: #075e54; color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  .header b { font-size: 18px; }
  #userCount { font-size: 13px; opacity: 0.9; }

  /* Call Info Bar */
  #callInfoBar { background: #128c7e; color: white; padding: 8px; display: none; text-align: center; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  #timer { font-weight: bold; font-family: monospace; font-size: 16px; margin-right: 10px; }

  /* Chat Box */
  #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
  .msg { background: white; padding: 8px 12px; border-radius: 12px; border-top-left-radius: 0; max-width: 80%; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); font-size: 15px; }
  .msg-u { font-size: 11px; font-weight: bold; color: #075e54; display: block; margin-bottom: 3px; }
  .my-msg { background: #dcf8c6; align-self: flex-end; border-top-left-radius: 12px; border-top-right-radius: 0; }
  .msg-img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }

  /* Footer Section */
  .footer { background: #f0f0f0; padding: 10px; border-top: 1px solid #ddd; }
  .btn-group { display: flex; gap: 8px; margin-bottom: 10px; }
  .btn-group button { flex: 1; padding: 10px; border-radius: 10px; border: none; color: white; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
  
  #callBtn { background: #25d366; }
  #callBtn.active { background: #e53935; animation: pulse 1s infinite; }
  .btn-photo { background: #5c6bc0; }
  .btn-exit { background: #777; flex: 0.5 !important; }

  .input-area { display: flex; gap: 8px; align-items: center; }
  .input-area input { flex: 1; padding: 12px 15px; border-radius: 25px; border: 1px solid #ccc; outline: none; font-size: 16px; background: white; }
  .input-area button { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; flex-shrink: 0; }
  
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div id="loginDiv">
  <div class="login-box">
    <h2>Secure Chat</h2>
    <input type="text" id="user" placeholder="Apna Name likho">
    <input type="password" id="pass" placeholder="Room Password">
    <button onclick="enter()">Andar Chalo</button>
  </div>
</div>

<div id="chatDiv">
  <div class="header">
    <b id="roomTitle">Room</b>
    <span id="userCount">Online: 0</span>
  </div>

  <div id="callInfoBar">
    <span id="timer">00:00</span> | <span id="participants">Abhi koi nahi hai</span>
  </div>

  <div id="chatBox"></div>

  <div class="footer">
    <div class="btn-group">
      <input type="file" id="fileInp" style="display:none;" accept="image/*" onchange="upPhoto(event)">
      <button class="btn-photo" onclick="document.getElementById('fileInp').click()">📷 Photo Bhejo</button>
      <button id="callBtn" onclick="handleCallToggle()">📞 Call Karo</button>
      <button class="btn-exit" onclick="location.reload()">Bahar Niklo</button>
    </div>
    
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Kuch likho...">
      <button onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<audio id="remoteAudio" autoplay></audio>
<audio id="ringtone" loop src="https://www.soundjay.com/phone/phone-calling-1.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553",
  storageBucket: "p2kc-b0553.firebasestorage.app",
  appId: "1:939347031406:web:998f52b262a0cecf11bd7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let myName, myRoom, myStream, isCalling = false;
let callStartTime, timerInterval;

function enter() {
  myName = document.getElementById('user').value.trim();
  myRoom = document.getElementById('pass').value.trim();
  if(!myName || !myRoom) return alert("Pehle naam aur password bharo!");

  document.getElementById('loginDiv').style.display='none';
  document.getElementById('chatDiv').style.display='flex';
  document.getElementById('roomTitle').innerText = "Room: " + myRoom;

  db.ref(`rooms/${myRoom}/users/${myName}`).set({active:true});
  db.ref(`rooms/${myRoom}/users/${myName}`).onDisconnect().remove();

  listenMsgs();
  listenCalls();
  listenParticipants();
  
  db.ref(`rooms/${myRoom}/users`).on('value', s => {
    document.getElementById('userCount').innerText = "Online: " + (s.numChildren() || 0);
  });
}

function sendMsg() {
  const inp = document.getElementById('msgInput');
  if(!inp.value.trim()) return;
  db.ref(`rooms/${myRoom}/msgs`).push({u:myName, val:inp.value, t:'text'});
  inp.value = '';
}

function listenMsgs() {
  const box = document.getElementById('chatBox');
  db.ref(`rooms/${myRoom}/msgs`).on('child_added', snap => {
    const d = snap.val();
    const div = document.createElement('div');
    div.className = 'msg' + (d.u === myName ? ' my-msg' : '');
    div.innerHTML = `<span class="msg-u">${d.u}</span>` + (d.t === 'img' ? `<img src="${d.val}" class="msg-img">` : d.val);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  });
}

async function handleCallToggle() {
  const btn = document.getElementById('callBtn');
  if (!isCalling) {
    try {
      myStream = await navigator.mediaDevices.getUserMedia({audio:true});
      isCalling = true;
      btn.innerText = "🛑 Call Kato";
      btn.classList.add('active');
      db.ref(`rooms/${myRoom}/callActive/${myName}`).set(true);
      db.ref(`rooms/${myRoom}/callActive/${myName}`).onDisconnect().remove();
      db.ref(`rooms/${myRoom}/callSignal`).set({ from: myName, time: Date.now() });
      startTimer();
    } catch(e) { alert("Mic ki permission chahiye!"); }
  } else {
    stopCall();
  }
}

function stopCall() {
  if(myStream) myStream.getTracks().forEach(t => t.stop());
  isCalling = false;
  const btn = document.getElementById('callBtn');
  btn.innerText = "📞 Call Karo";
  btn.classList.remove('active');
  btn.style.background = "#25d366";
  db.ref(`rooms/${myRoom}/callActive/${myName}`).remove();
  db.ref(`rooms/${myRoom}/callSignal`).remove();
  clearInterval(timerInterval);
  document.getElementById('callInfoBar').style.display = 'none';
}

function startTimer() {
  callStartTime = Date.now();
  document.getElementById('callInfoBar').style.display = 'block';
  timerInterval = setInterval(() => {
    let diff = Math.floor((Date.now() - callStartTime) / 1000);
    let m = Math.floor(diff / 60).toString().padStart(2, '0');
    let s = (diff % 60).toString().padStart(2, '0');
    document.getElementById('timer').innerText = `${m}:${s}`;
  }, 1000);
}

function listenParticipants() {
  db.ref(`rooms/${myRoom}/callActive`).on('value', snap => {
    const users = Object.keys(snap.val() || {});
    if(users.length > 0) {
      document.getElementById('callInfoBar').style.display = 'block';
      document.getElementById('participants').innerText = "Call par: " + users.join(", ");
    } else {
      document.getElementById('callInfoBar').style.display = 'none';
    }
  });
}

function listenCalls() {
  db.ref(`rooms/${myRoom}/callSignal`).on('value', snap => {
    const data = snap.val();
    const btn = document.getElementById('callBtn');
    if (data && data.from !== myName) {
      document.getElementById('ringtone').play();
      btn.innerText = "🔊 Call Uthao (" + data.from + ")";
      btn.style.background = "orange";
    } else {
      document.getElementById('ringtone').pause();
    }
  });
}

function upPhoto(e) {
  const r = new FileReader();
  r.onload = () => db.ref(`rooms/${myRoom}/msgs`).push({u:myName, val:r.result, t:'img'});
  r.readAsDataURL(e.target.files[0]);
}
</script>
</body>
</html>
