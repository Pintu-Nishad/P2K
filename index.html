<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>तिउरी - Bead 16 Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@700&display=swap');
        body { background: #1a1c2c; font-family: sans-serif; touch-action: none; overflow: hidden; }
        .tiuri-font { font-family: 'Kalam', cursive; }
        
        /* प्ले स्टोर वाले गेम जैसा अट्रैक्टिव बोर्ड */
        .board-container {
            background: #4e342e; background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            position: relative; width: 90vw; max-width: 400px; aspect-ratio: 1 / 1.5;
            border: 10px solid #3e2723; border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7); margin: auto;
        }
        .lines-svg { position: absolute; width: 100%; height: 100%; stroke: #d7ccc8; stroke-width: 2.5; fill: none; opacity: 0.8; }
        
        .node { width: 34px; height: 34px; position: absolute; transform: translate(-50%, -50%); z-index: 30; }
        .guti { width: 100%; height: 100%; border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.9); cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 6px 8px rgba(0,0,0,0.5); }
        
        .orange { background: radial-gradient(circle at 35% 35%, #ff5722, #bf360c); } 
        .green { background: radial-gradient(circle at 35% 35%, #4caf50, #1b5e20); } 
        .selected { transform: translate(-50%, -50%) scale(1.4); filter: drop-shadow(0 0 12px #facc15); z-index: 40; }
        
        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; }
        .active { display: flex; }
        .highlight-move { width: 12px; height: 12px; background: rgba(255,255,255,0.4); border-radius: 50%; }
    </style>
</head>
<body class="text-white">

    <div id="home-screen" class="screen active bg-slate-900">
        <h1 class="text-7xl text-yellow-500 tiuri-font mb-12 drop-shadow-2xl">तिउरी</h1>
        <div class="flex flex-col gap-6">
            <button onclick="startGame('ai')" class="w-72 bg-gradient-to-b from-orange-500 to-orange-700 p-5 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">🤖 कंप्यूटर (AI)</button>
            <button onclick="startGame('pvp')" class="w-72 bg-gradient-to-b from-indigo-500 to-indigo-700 p-5 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">👥 दो खिलाड़ी (PvP)</button>
        </div>
        <p class="mt-20 text-slate-500 text-xs font-bold uppercase tracking-widest">Nishad Crafts Games</p>
    </div>

    <div id="game-screen" class="screen bg-[#1a1c2c]">
        <div class="w-full max-w-sm flex justify-between items-center mb-6 px-4">
            <div id="status-bar" class="bg-orange-600 px-6 py-2 rounded-full font-bold text-sm shadow-lg border border-white/20">आपकी बारी</div>
            <div class="flex gap-4 font-black">
                <div class="text-orange-500">P1: <span id="p1-score">16</span></div>
                <div class="text-green-500">P2: <span id
