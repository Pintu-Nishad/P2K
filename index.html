<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K Master Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background:#efe7dd; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
        .msg { background: white; padding: 8px 12px; border-radius: 15px; max-width: 80%; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; word-wrap: break-word; }
        .my-msg { background: #dcf8c6; align-self: flex-end; }
        .chat-footer { background: #f0f0f0; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; z-index: 100; }
        #loginDiv { position: fixed; inset: 0; background: #075e54; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .header-call-active { background: #128c7e !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        .sent-img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: zoom-in; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="loginDiv">
  <div class="bg-white p-8 rounded-2xl w-[90%] max-w-sm text-center shadow-2xl">
    <h2 class="text-2xl font-bold mb-4 text-[#075e54]">P2K Secure</h2>
    <input type="text" id="user" placeholder="अपना नाम..." class="w-full p-3 mb-3 border rounded-lg outline-none">
    <input type="password" id="pass" placeholder="रूम पासवर्ड..." class="w-full p-3 mb-4 border rounded-lg outline-none">
    <button onclick="enter()" class="w-full bg-[#128c7e] text-white py-3 rounded-lg font-bold">Join Room</button>
  </div>
</div>

<div id="chatDiv" class="hidden flex-col h-screen w-full">
    <header id="mainHeader" class="h-[65px] bg-[#075e54] text-white flex justify-between items-center px-4 shrink-0 shadow-md transition-all">
        <div>
            <b id="roomTitle" class="block text-sm">Room</b>
            <div class="flex items-center gap-2">
                <span id="callStatusText" class="text-[10px] text-green-300">Online</span>
                <span id="callTimer" class="hidden font-mono text-xs bg-black/20 px-2 py-0.5 rounded">00:00</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="callBtn" onclick="startWebRTCCall()" class="bg-[#25d366] px-4 py-1.5 rounded-full text-xs font-bold">📞 Call</button>
            <button id="joinBtn" onclick="answerCall()" class="hidden bg-blue-500 px-4 py-1.5 rounded-full text-xs font-bold animate-bounce">Join</button>
            <button id="endBtn" onclick="endCall()" class="hidden bg-red-500 px-4 py-1.5 rounded-full text-xs font-bold">End</button>
            <span id="userCount" class="text-[10px] bg-white/10 px-2 py-1 rounded">0</span>
        </div>
    </header>

    <div id="chatBox"></div>

    <div class="chat-footer">
        <input type="file" id="photoInput" class="hidden" accept="image/*" onchange="sendPhoto(this)">
        <button onclick="document.getElementById('photoInput').click()" class="text-gray-500 hover:text-[#075e54] transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828
