<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K SECURE V25 - STABLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Manrope:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #10b981; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Manrope', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        
        /* Fixed UI Layout - No Shifting */
        .header { height: 80px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; z-index: 50; }
        .msg-area { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); padding-bottom: 100px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }

        /* Bubbles */
        .msg { padding: 12px 18px; border-radius: 22px; max-width: 80%; font-size: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .in { background: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; }
        .out { background: linear-gradient(135deg, #059669, #10b981); align-self: flex-end; border-bottom-right-radius: 4px; }

        /* Meme Icons Styling */
        .btn-meme { width: 38px; height: 38px; cursor: pointer; transition: 0.2s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .btn-meme:active { transform: scale(0.8) rotate(-10deg); }

        /* Call Screen Full Fixed */
        #callUI { position: fixed; inset: 0; z-index: 9999; background: #000; display: none; }
        #remoteVid { width: 100%; height: 100%; object-fit: cover; }
        #localVid { position: absolute; top: 40px; right: 20px; width: 100px; height: 150px; border-radius: 12px; border: 2px solid var(--accent); object-fit: cover; z-index: 10000; }
        
        #loginDiv { position: fixed; inset: 0; z-index: 10001; background: #020617; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loginDiv">
    <div class="w-full max-w-sm bg-slate-900/50 backdrop-blur-xl p-10 rounded-[40px] border border-white/10 text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/10435/10435921.png" class="w-20 mx-auto mb-6">
        <h1 style="font-family: 'Orbitron';" class="text-3xl font-black text-emerald-400 mb-8 tracking-wider">P2K SECURE</h1>
        <input id="user" type="text" placeholder="Your Name" class="w-full bg-slate-800 rounded-2xl p-5 mb-4 outline-none border border-transparent focus:border-emerald-500">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-slate-800 rounded-2xl p-5 mb-8 outline-none border border-transparent focus:border-emerald-500">
        <button onclick="enter()" class="w-full bg-emerald-600 py-5 rounded-2xl font-bold text-white shadow-xl active:scale-95 transition-all">CONNECT NOW</button>
    </div>
</div>

<div id="appUI" class="hidden h-full flex flex-col">
    <header class="header flex items-center justify-between px-6">
        <div>
            <div id="userCounter" class="text-emerald-400 font-bold text-xs">● Loading Room...</div>
            <div id="typingInfo" class="text-[10px] text-white/50 italic"></div>
        </div>
        <div class="flex gap-4">
            <button onclick="askNotify()"><img src="https://cdn-icons-png.flaticon.com/512/3602/3602145.png" class="btn-meme"></button>
            <button onclick="initCall()"><img src="https://cdn-icons-png.flaticon.com/512/4359/4359042.png" class="btn-meme"></button>
        </div>
    </header>

    <div id="chatBox" class="msg-area"></div>

    <footer class="footer">
        <div class="flex items-center gap-3 bg-slate-800/60 rounded-full px-5 py-1.5 border border-white/5">
            <input type="file" id="fileIn" accept="image/*" onchange="sendPhoto(this)" class="hidden">
            <button onclick="document.getElementById('fileIn').click()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435911.png" class="btn-meme"></button>
            <input id="msgInput" type="text" placeholder="Type a secure message..." class="flex-1 bg-transparent py-3 text-sm outline-none text-white">
            <button onclick="sendMsg()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435882.png" class="btn-meme"></button>
        </div>
    </footer>
</div>

<div id="callUI">
    <video id="remoteVid" autoplay playsinline></video>
    <video id="localVid" autoplay playsinline muted></video>
    <div class="absolute bottom-10 w-full flex justify-center gap-6">
        <button onclick="toggleMic()" id="micBtn" class="bg-white/10 p-5 rounded-full border border-white/20"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435905.png" class="w-8"></button>
        <button onclick="hangUp()" class="bg-red-600 p-6 rounded-full shadow-2xl"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435930.png" class="w-10"></button>
        <button onclick="flipCam()" class="bg-white/10 p-5 rounded-full border border-white/20"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435932.png" class="w-8"></button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", authDomain: "p2kc-b0553.firebaseapp.com", databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", projectId: "p2kc-b0553" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName, myRoom, localStream, peer, mode="user";

    // SECURITY: Screenshot Protection
    window.addEventListener('keyup', e => { if(e.key==='PrintScreen'){ navigator.clipboard.writeText(""); alert("SECURE MODE"); }});

    function enter() {
        myName = user.value.trim(); myRoom = pass.value.trim();
        if(!myName || !myRoom) return;
        loginDiv.style.display="none"; appUI.classList.remove('hidden');
        db.ref(`rooms/${myRoom}/msgs`).push({ type:'sys', val: `${myName} Joined` });
        db.ref(`rooms/${myRoom}/users/${myName}`).set(true);
        db.ref(`rooms/${myRoom}/users`).on('value', s => userCounter.innerText = "● Online: " + s.numChildren());
        listenMsgs(); listenForCalls(); setupTyping();
    }

    function sendMsg() {
        const val = msgInput.value.trim(); if(!val) return;
        const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val, type: 'text', time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
        msgInput.value=""; setTimeout(() => ref.remove(), 60000);
    }

    function sendPhoto(input) {
        if(!input.files[0]) return;
        const r = new FileReader();
        r.onload = e => {
            const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: e.target.result, type: 'img', time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
            setTimeout(() => ref.remove(), 60000);
        };
        r.readAsDataURL(input.files[0]);
    }

    function listenMsgs() {
        db.ref(`rooms/${myRoom}/msgs`).on("child_added", s => {
            const d = s.val(), id = s.key;
            const div = document.createElement("div");
            if(d.type === 'sys') {
                div.className = "text-center text-[10px] text-emerald-500 uppercase font-black my-4 opacity-40 tracking-widest";
                div.innerText = d.val;
            } else {
                const isMe = d.u === myName;
                div.className = `msg ${isMe ? 'out' : 'in'}`;
                div.id = "m-"+id;
                const del = isMe ? `<button onclick="db.ref('rooms/${myRoom}/msgs/${id}').remove()" class="ml-2 opacity-30 text-[10px]">🗑️</button>` : "";
                const content = d.type==='img' ? `<img src="${d.val}" class="rounded-xl max-h-64 shadow-lg">` : d.val;
                div.innerHTML = `<div class="flex justify-between text-[10px] font-black opacity-50 mb-1"><span>${d.u}</span>${del}</div>${content}<div class="text-[8px] text-right mt-1 opacity-40">${d.time}</div>`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
        db.ref(`rooms/${myRoom}/msgs`).on("child_removed", s => document.getElementById("m-"+s.key)?.remove());
    }

    // --- WebRTC PRO LOGIC ---
    async function initCall() {
        callUI.style.display="block";
        localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:{facingMode:mode}});
        localVid.srcObject = localStream;
        
        peer = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
        localStream.getTracks().forEach(t => peer.addTrack(t, localStream));
        peer.ontrack = e => remoteVid.srcObject = e.streams[0];
        peer.onicecandidate = e => { if(e.candidate) db.ref(`calls/${myRoom}/ice/${myName}`).push(e.candidate.toJSON()); };

        const offer = await peer.createOffer();
        await peer.setLocalDescription(offer);
        db.ref(`calls/${myRoom}/conn`).set({offer, caller:myName});
    }

    function listenForCalls() {
        db.ref(`calls/${myRoom}/conn`).on("value", async s => {
            const d = s.val(); if(!d) return;
            if(d.offer && d.caller !== myName && !peer) {
                if(confirm("Incoming Video Call... Accept?")) {
                    callUI.style.display="block";
                    localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:true});
                    localVid.srcObject = localStream;
                    peer = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
                    localStream.getTracks().forEach(t => peer.addTrack(t, localStream));
                    peer.ontrack = e => remoteVid.srcObject = e.streams[0];
                    await peer.setRemoteDescription(new RTCSessionDescription(d.offer));
                    const answer = await peer.createAnswer();
                    await peer.setLocalDescription(answer);
                    db.ref(`calls/${myRoom}/conn`).update({answer});
                }
            }
            if(d.answer && d.caller === myName) await peer.setRemoteDescription(new RTCSessionDescription(d.answer));
        });
        db.ref(`calls/${myRoom}/ice`).on("child_added", s => { if(s.key!==myName) s.ref.on("child_added", c => peer?.addIceCandidate(new RTCIceCandidate(c.val()))); });
    }

    function hangUp() { db.ref(`calls/${myRoom}`).remove(); localStream?.getTracks().forEach(t=>t.stop()); peer?.close(); peer=null; callUI.style.display="none"; }
    function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; micBtn.classList.toggle('bg-red-500'); }
    async function flipCam() { mode = (mode==="user"?"environment":"user"); hangUp(); initCall(); }
    function setupTyping() { msgInput.oninput = () => { db.ref(`rooms/${myRoom}/typ/${myName}`).set(true); clearTimeout(window.t); window.t = setTimeout(()=>db.ref(`rooms/${myRoom}/typ/${myName}`).remove(),2000); }; db.ref(`rooms/${myRoom}/typ`).on('value', s => { let t=[]; s.forEach(u=>{ if(u.key!==myName) t.push(u.key); }); typingInfo.innerText = t.length>0 ? t.join(",")+" is typing..." : ""; }); }
    function askNotify() { Notification.requestPermission(); }
</script>
</body>
</html>
