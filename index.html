<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>तेरी (16 गोटी) - Online Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0f172a; }
        .board-bg { 
            background: #d4a373; 
            background-image: radial-gradient(#bc8a5f 2px, transparent 2px);
            background-size: 40px 40px;
            position: relative;
        }
        .dot {
            width: 28px; height: 28px; border-radius: 50%;
            position: absolute; transform: translate(-50%, -50%);
            cursor: pointer; z-index: 20; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }
        .piece-red { background: linear-gradient(145deg, #ff4b2b, #ff416c); border: 2px solid #fff; }
        .piece-black { background: linear-gradient(145deg, #2c3e50, #000000); border: 2px solid #444; }
        .selected { transform: translate(-50%, -50%) scale(1.3); ring: 4px solid #facc15; z-index: 30; }
        .grid-line { position: absolute; background: #5d4037; z-index: 10; opacity: 0.6; }
        .searching-loader { border-top-color: #facc15; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-100 flex items-center justify-center min-h-screen">

    <div id="welcome-screen" class="w-full max-w-md bg-slate-800/50 backdrop-blur-md p-8 rounded-3xl border border-slate-700 shadow-2xl text-center">
        <div class="mb-6">
            <span class="bg-yellow-500/10 text-yellow-500 text-xs font-bold px-3 py-1 rounded-full tracking-widest uppercase">Nishad Crafts Special</span>
            <h1 class="text-5xl font-extrabold mt-4 text-white">तेरी</h1>
            <p class="text-slate-400 mt-2">16 गोटी का असली देसी मज़ा</p>
        </div>
        
        <div class="space-y-4">
            <button onclick="showScreen('game-screen', 'Solo')" class="group w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all shadow-lg active:scale-95">
                <span>👤 अकेला खेलें</span>
            </button>
            <button onclick="startSearching()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all shadow-lg active:scale-95">
                <span>👥 रैंडम यूज़र खोजें</span>
            </button>
        </div>
    </div>

    <div id="search-screen" class="hidden text-center">
        <div class="searching-loader w-20 h-20 border-4 border-slate-700 rounded-full mx-auto mb-6"></div>
        <h2 class="text-2xl font-bold">खिलाड़ी की तलाश...</h2>
        <p class="text-slate-400 mt-2">जैसे ही कोई ऑनलाइन आएगा, गेम शुरू हो जाएगा</p>
        <button onclick="showScreen('welcome-screen')" class="mt-8 text-slate-500 hover:text-white underline">कैंसल करें</button>
    </div>

    <div id="game-screen" class="hidden w-full max-w-lg px-4">
        <div class="flex items-center justify-between mb-6 bg-slate-800 p-4 rounded-2xl border border-slate-700">
            <div class="flex items-center gap-3">
                <div class="bg-red-500 w-10 h-10 rounded-lg flex items-center justify-center font-bold text-xl" id="score-p1">0</div>
                <span class="text-xs font-bold text-slate-400 uppercase">Vs</span>
                <div class="bg-slate-700 w-10 h-10 rounded-lg flex items-center justify-center font-bold text-xl" id="score-p2">0</div>
            </div>

            <button id="voice-btn" onclick="toggleVoice()" class="bg-slate-700 hover:bg-slate-600 p-3 rounded-xl transition-all relative">
                <svg id="mic-on" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                <svg id="mic-off" class="w-6 h-6 text-red-500 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
                <div id="voice-indicator" class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            </button>
        </div>

        <div id="board" class="board-bg w-full aspect-square rounded-2xl border-8 border-yellow-900 shadow-2xl overflow-hidden">
            </div>

        <div class="mt-6 flex justify-center">
            <button onclick="showScreen('welcome-screen')" class="text-slate-500 hover:text-white text-sm font-medium transition">🏳️ गेम छोड़ें</button>
        </div>
    </div>

    <script>
        let isMuted = false;
        let localStream;

        // स्क्रीन स्विच करने का फंक्शन
        function showScreen(screenId, mode = '') {
            ['welcome-screen', 'search-screen', 'game-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
            if(screenId === 'game-screen') initBoard();
        }

        // रैंडम सर्चिंग एनीमेशन
        function startSearching() {
            showScreen('search-screen');
            setTimeout(() => {
                showScreen('game-screen');
                initVoice(); // गेम शुरू होते ही वॉइस एक्टिवेट
            }, 3000); 
        }

        // वॉइस चैट और म्यूट लॉजिक
        async function initVoice() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log("Mic Active");
            } catch (err) {
                alert("वॉइस चैट के लिए माइक की अनुमति दें");
            }
        }

        function toggleVoice() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            
            document.getElementById('mic-on').classList.toggle('hidden', isMuted);
            document.getElementById('mic-off').classList.toggle('hidden', !isMuted);
            document.getElementById('voice-indicator').classList.toggle('bg-red-500', isMuted);
            document.getElementById('voice-indicator').classList.toggle('bg-green-500', !isMuted);
        }

        // बोर्ड बनाना (16 गोटी ग्रिड)
        function initBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            // गोटियाँ सेट करना
            for (let i = 0; i < 25; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                const row = Math.floor(i / 5);
                const col = i % 5;
                dot.style.top = `${(row * 20) + 10}%`;
                dot.style.left = `${(col * 20) + 10}%`;

                if (i < 10) dot.classList.add('piece-red');
                if (i >= 15) dot.classList.add('piece-black');

                dot.onclick = () => {
                    document.querySelectorAll('.dot').forEach(d => d.classList.remove('selected'));
                    if(dot.classList.contains('piece-red') || dot.classList.contains('piece-black')) {
                        dot.classList.add('selected');
                    }
                };
                board.appendChild(dot);
            }
        }
    </script>
</body>
</html>
