<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K Pro V10 - Night Mode & Flash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #0b141a; color: #e9edef; overflow: hidden; display: flex; flex-direction: column; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: #202c33; padding: 10px; border-radius: 14px; max-width: 85%; align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }
        .my-msg { background: #005c4b; align-self: flex-end; }
        
        /* Video UI */
        #callUI { position: fixed; inset: 0; z-index: 500; background: black; display: none; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 12px; border: 2px solid #00a884; z-index: 550; object-fit: cover; }
        
        .call-tools { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 15px; z-index: 600; padding: 0 20px; flex-wrap: wrap; }
        .tool-btn { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .end-btn { background: #ea0038 !important; }

        .input-area { background: #202c33; padding: 15px 15px 35px 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        .switch { position: relative; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: #00a884; }
    </style>
</head>
<body>

<div id="loginDiv" class="fixed inset-0 z-[1000] bg-[#111b21] flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-[#202c33] p-8 rounded-2xl text-center shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-[#00a884]">P2K Pro V10</h1>
        <input id="user" type="text" placeholder="Name" class="w-full bg-[#2a3942] rounded-lg p-3 mb-4 outline-none text-white">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-[#2a3942] rounded-lg p-3 mb-6 outline-none text-white">
        <button onclick="enter()" class="w-full bg-[#00a884] py-3 rounded-lg font-bold text-[#111b21]">Join Chat</button>
    </div>
</div>

<div id="chatDiv" class="hidden h-full flex flex-col">
    <header class="h-14 bg-[#202c33] flex items-center justify-between px-4 border-b border-gray-800">
        <button onclick="location.reload()" class="text-red-400 text-xs font-bold">EXIT</button>
        <div class="text-center">
            <b id="roomTitle" class="text-sm">Room</b>
            <span id="userCounter" class="text-[9px] block text-[#00a884]">Online: 0</span>
        </div>
        <button onclick="startCall()" class="bg-[#00a884] text-[#111b21] px-4 py-1.5 rounded-full font-bold text-xs">VIDEO CALL</button>
    </header>

    <div id="chatBox"></div>

    <footer class="input-area">
        <label class="switch"><input type="checkbox" id="ghostMode"><span class="slider"></span></label>
        <input id="msgInput" type="text" placeholder="Message..." class="flex-1 bg-[#2a3942] rounded-full px-5 py-2.5 text-sm outline-none text-white">
        <button onclick="sendMsg()" class="bg-[#00a884] p-2.5 rounded-full text-[#111b21]">➤</button>
    </footer>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    
    <div class="call-tools">
        <button onclick="toggleFlash()" class="tool-btn">💡</button>
        <button onclick="switchCamera()" class="tool-btn">🔄</button>
        <button onclick="togglePip()" class="tool-btn">🖼️</button>
        <button id="muteBtn" onclick="toggleMute()" class="tool-btn">🎤</button>
        <button onclick="endCall()" class="tool-btn end-btn">📞</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", authDomain: "p2kc-b0553.firebaseapp.com", databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", projectId: "p2kc-b0553" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName, myRoom, localStream, peerConnection, currentFacingMode = "user", isFlash = false;

// 🌙 Night Mode & High Quality Constraints
const constraints = {
    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    video: { 
        facingMode: "user",
        width: { ideal: 1280 },
        height: { ideal: 720 },
        // Advanced Exposure (Automatic ISO/Bright Maintenance)
        advanced: [{ brightness: 100, contrast: 100, exposureMode: "continuous" }]
    }
};

function enter(){
    myName = user.value.trim(); myRoom = pass.value.trim();
    if(!myName || !myRoom) return;
    loginDiv.style.display="none"; chatDiv.classList.remove('hidden');
    roomTitle.innerText="ID: "+myRoom;
    db.ref(`rooms/${myRoom}/users/${myName}`).set(true);
    db.ref(`rooms/${myRoom}/users`).on('value', s => { 
        document.getElementById('userCounter').innerText = "Online: " + s.numChildren();
        if(s.numChildren() === 0) db.ref(`rooms/${myRoom}`).remove();
    });
    listenMsgs(); listenCall();
}

async function startCall(){
    callUI.style.display = "block";
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
    document.getElementById('localVideo').srcObject = localStream;
    setupPeer();
    let offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    db.ref(`calls/${myRoom}`).set({ offer:offer, caller:myName });
}

function setupPeer(){
    peerConnection = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
    peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${myRoom}/candidates`).push(e.candidate.toJSON()); };
}

// 📸 Camera & Pop-up Features
async function switchCamera() {
    currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
    const videoTrack = localStream.getVideoTracks()[0];
    videoTrack.stop();
    const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
    const newVideoTrack = newStream.getVideoTracks()[0];
    peerConnection.getSenders().find(s => s.track.kind === 'video').replaceTrack(newVideoTrack);
    localStream.removeTrack(videoTrack); localStream.addTrack(newVideoTrack);
    document.getElementById('localVideo').srcObject = localStream;
}

async function toggleFlash() {
    const track = localStream.getVideoTracks()[0];
    isFlash = !isFlash;
    try { await track.applyConstraints({ advanced: [{ torch: isFlash }] }); } 
    catch(e) { alert("Flash only works with Back Camera!"); }
}

async function togglePip() {
    try {
        if (document.pictureInPictureElement) await document.exitPictureInPicture();
        else await document.getElementById('remoteVideo').requestPictureInPicture();
    } catch(e) { alert("Pop-up mode not supported on this browser!"); }
}

function listenCall(){
    db.ref(`calls/${myRoom}`).on("value", async snap=>{
        let d = snap.val();
        if(!d) { if(peerConnection) endCall(); return; }
        if(d.offer && d.caller !== myName && !peerConnection) {
            if(confirm(d.caller + " calling...")) {
                callUI.style.display="block";
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('localVideo').srcObject = localStream;
                setupPeer();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer));
                let answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                db.ref(`calls/${myRoom}`).update({answer:answer});
            }
        }
        if(d.answer && d.caller === myName) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
    });
    db.ref(`calls/${myRoom}/candidates`).on("child_added", snap=>{
        if(peerConnection && peerConnection.remoteDescription) peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())).catch(e=>{});
    });
}

function sendMsg(){
    if(!msgInput.value.trim()) return;
    const isGhost = document.getElementById('ghostMode').checked;
    const msgRef = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: msgInput.value, type: 'text', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    if(isGhost) setTimeout(() => msgRef.remove(), 30000);
    msgInput.value="";
}

function listenMsgs(){
    db.ref(`rooms/${myRoom}/msgs`).on("child_added", s=>{
        let d = s.val();
        let div = document.createElement("div");
        div.className="msg" + (d.u == myName ? " my-msg" : "");
        div.innerHTML = `<div class="text-[8px] opacity-40 font-bold">${d.u}</div><div>${d.val}</div><div class="text-[7px] opacity-30 mt-1">${d.time}</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

function endCall(){
    db.ref(`calls/${myRoom}`).remove();
    if(localStream) localStream.getTracks().forEach(t => t.stop());
    if(peerConnection) peerConnection.close();
    callUI.style.display = "none";
}

function toggleMute(){
    let audio = localStream.getAudioTracks()[0];
    audio.enabled = !audio.enabled;
    document.getElementById('muteBtn').innerText = audio.enabled ? "🎤" : "🔇";
}
</script>
</body>
</html>
