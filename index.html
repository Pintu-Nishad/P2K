<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K Pro V6 - Clear Vocal & Camera Switch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #0b141a; color: #e9edef; overflow: hidden; display: flex; flex-direction: column; }
        .main-wrapper { display: flex; flex-direction: column; height: 100%; width: 100%; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #0b141a; }
        .msg { background: #202c33; padding: 8px 12px; border-radius: 12px; max-width: 85%; align-self: flex-start; font-size: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .my-msg { background: #005c4b; align-self: flex-end; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }

        .input-area { 
            background: #202c33; padding: 15px 15px 30px 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
        }

        /* Video & Call UI */
        #callUI { position: fixed; inset: 0; z-index: 500; background: black; display: none; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 90px; height: 130px; border-radius: 10px; border: 2px solid #00a884; z-index: 550; }
        
        .call-controls { position: absolute; bottom: 120px; left: 0; right: 0; display: flex; justify-content: center; gap: 15px; z-index: 600; }
        .c-btn { background: rgba(32,44,51,0.9); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255,255,255,0.1); font-size: 20px; }
        .end-btn { background: #ea0038 !important; }
        
        #fileInput { display: none; }
    </style>
</head>
<body>

<div id="loginDiv" class="fixed inset-0 z-[1000] bg-[#111b21] flex items-center justify-center p-6 text-center">
    <div class="w-full max-w-sm bg-[#202c33] p-8 rounded-2xl border border-gray-700">
        <h1 class="text-2xl font-bold mb-6 text-[#00a884]">P2K Secure</h1>
        <input id="user" type="text" placeholder="Name" class="w-full bg-[#2a3942] rounded-lg p-3 mb-4 outline-none text-white border-none">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-[#2a3942] rounded-lg p-3 mb-6 outline-none text-white border-none">
        <button onclick="enter()" class="w-full bg-[#00a884] py-3 rounded-lg font-bold text-[#111b21]">Join</button>
    </div>
</div>

<div id="chatDiv" class="hidden main-wrapper">
    <header class="h-14 bg-[#202c33] flex items-center justify-between px-4 shrink-0 border-b border-gray-800">
        <div class="flex flex-col">
            <b id="roomTitle" class="text-sm">Room</b>
            <span id="userCounter" class="text-[9px] text-[#00a884] font-bold">Online: 0</span>
        </div>
        <button onclick="startCall()" class="bg-[#00a884] text-[#111b21] px-4 py-1.5 rounded-full font-bold text-[10px] uppercase">Video Call</button>
    </header>

    <div id="chatBox"></div>

    <footer class="input-area">
        <button onclick="document.getElementById('fileInput').click()" class="text-[#8696a0]"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg></button>
        <input type="file" id="fileInput" accept="image/*" onchange="sendPhoto(this)">
        <input id="msgInput" type="text" placeholder="Message..." class="flex-1 bg-[#2a3942] rounded-full px-5 py-2.5 text-sm outline-none text-white">
        <button onclick="sendMsg()" class="bg-[#00a884] p-2.5 rounded-full text-[#111b21]"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg></button>
    </footer>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    
    <div class="call-controls">
        <button id="muteBtn" onclick="toggleMute()" class="c-btn">🎤</button>
        <button onclick="switchCamera()" class="c-btn">🔄</button>
        <button onclick="endCall()" class="c-btn end-btn">📞</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName, myRoom, localStream, peerConnection, isCaller = false;
let currentFacingMode = "user"; // "user" = front, "environment" = back

// Advanced Audio Constraints for Vocal Enhancement
const audioConstraints = {
    echoCancellation: true,
    noiseSuppression: true,
    autoGainControl: true,
    channelCount: 1,
    sampleRate: 48000
};

function enter(){
    myName = user.value.trim(); myRoom = pass.value.trim();
    if(!myName || !myRoom) return;
    loginDiv.style.display="none"; chatDiv.classList.remove('hidden');
    roomTitle.innerText="Room: "+myRoom;
    db.ref(`rooms/${myRoom}/users/${myName}`).set(true);
    db.ref(`rooms/${myRoom}/users/${myName}`).onDisconnect().remove();
    db.ref(`rooms/${myRoom}/users`).on('value', s => { document.getElementById('userCounter').innerText = "Online: " + s.numChildren(); });
    listenMsgs(); listenCall();
}

function sendMsg(){
    if(!msgInput.value.trim()) return;
    db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: msgInput.value, type: 'text' });
    msgInput.value="";
}

function sendPhoto(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: e.target.result, type: 'image' });
        reader.readAsDataURL(input.files[0]);
        input.value = "";
    }
}

function listenMsgs(){
    db.ref(`rooms/${myRoom}/msgs`).on("child_added", s=>{
        let d = s.val();
        let div = document.createElement("div");
        div.className="msg"+(d.u==myName?" my-msg":"");
        div.innerHTML = `<div class="text-[9px] opacity-40 uppercase mb-1 font-bold">${d.u}</div>` + 
                        (d.type === 'image' ? `<img src="${d.val}" onclick="window.open(this.src)">` : `<div>${d.val}</div>`);
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// Camera Switching Logic
async function switchCamera() {
    if (!localStream) return;
    currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
    
    const videoTrack = localStream.getVideoTracks()[0];
    videoTrack.stop(); // Purani track stop karein

    const newStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacingMode },
        audio: audioConstraints
    });

    const newVideoTrack = newStream.getVideoTracks()[0];
    if (peerConnection) {
        const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
        sender.replaceTrack(newVideoTrack);
    }
    
    localStream.removeTrack(videoTrack);
    localStream.addTrack(newVideoTrack);
    localVideo.srcObject = localStream;
}

async function startCall(){
    isCaller=true; callUI.style.display = "block";
    localStream = await navigator.mediaDevices.getUserMedia({ 
        audio: audioConstraints, 
        video: { facingMode: currentFacingMode, width: 1280, height: 720 } 
    });
    localVideo.srcObject = localStream;
    setupPeer();
    let offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    db.ref(`calls/${myRoom}`).set({ offer:offer, caller:myName });
}

function setupPeer(){
    peerConnection = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    peerConnection.ontrack = e => { remoteVideo.srcObject = e.streams[0]; };
    peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${myRoom}/candidates`).push(e.candidate.toJSON()); };
}

function listenCall(){
    db.ref(`calls/${myRoom}`).on("value", async snap=>{
        let d = snap.val();
        if(!d) { if(peerConnection) endCall(); return; }
        if(d.offer && !isCaller && !peerConnection) {
            if(confirm(d.caller + " calling. Answer?")){
                isCaller=false; callUI.style.display="block";
                localStream = await navigator.mediaDevices.getUserMedia({ audio: audioConstraints, video: true });
                localVideo.srcObject = localStream;
                setupPeer();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer));
                let answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                db.ref(`calls/${myRoom}`).update({answer:answer});
            }
        }
        if(d.answer && isCaller) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
    });
    db.ref(`calls/${myRoom}/candidates`).on("child_added", snap=>{
        if(peerConnection && peerConnection.remoteDescription) peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())).catch(e=>{});
    });
}

function endCall(){
    db.ref(`calls/${myRoom}`).remove();
    if(localStream) localStream.getTracks().forEach(t => t.stop());
    if(peerConnection) { peerConnection.close(); peerConnection = null; }
    callUI.style.display = "none";
}

function toggleMute(){
    let audio = localStream.getAudioTracks()[0];
    audio.enabled = !audio.enabled;
    muteBtn.innerText = audio.enabled ? "🎤" : "🔇";
}
</script>
</body>
</html>
