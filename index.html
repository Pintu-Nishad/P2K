<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K SECURE V23</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #030712; --panel: rgba(17, 24, 39, 0.95); --accent: #10b981; --outgoing: #059669; }
        body { background: var(--bg); color: #f3f4f6; font-family: 'Manrope', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; user-select: none; }
        
        /* Chat Area Fix */
        .msg-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #030712; border-top: 1px solid rgba(255,255,255,0.05); }
        
        /* Bubble Style */
        .msg { position: relative; padding: 12px 16px; border-radius: 20px; max-width: 80%; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); animation: pop 0.2s ease-out; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .incoming { background: #1f2937; align-self: flex-start; border-bottom-left-radius: 4px; }
        .outgoing { background: var(--outgoing); align-self: flex-end; border-bottom-right-radius: 4px; }

        /* Meme Icons (Proper Size) */
        .icon-meme { width: 32px; height: 32px; transition: 0.2s; cursor: pointer; }
        .icon-meme:active { transform: scale(0.8); }
        
        /* Login Screen Overlay */
        #loginDiv { position: fixed; inset: 0; z-index: 9999; background: #030712; display: flex; items-center; justify-content: center; padding: 20px; }
        
        header, footer { background: var(--panel); backdrop-filter: blur(10px); z-index: 100; }
        
        /* Call Overlay */
        #callUI { position: fixed; inset: 0; z-index: 8000; background: #000; display: none; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 40px; right: 20px; width: 100px; height: 150px; border-radius: 15px; border: 2px solid var(--accent); object-fit: cover; z-index: 8100; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loginDiv">
    <div class="w-full max-w-sm bg-[#111827] p-10 rounded-[40px] border border-white/5 text-center shadow-2xl">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968771.png" class="w-20 mx-auto mb-6">
        <h1 class="text-3xl font-extrabold mb-8">P2K SECURE</h1>
        <input id="user" type="text" placeholder="Enter Name" class="w-full bg-[#1f2937] rounded-2xl p-5 mb-4 outline-none border border-transparent focus:border-emerald-500">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-[#1f2937] rounded-2xl p-5 mb-10 outline-none border border-transparent focus:border-emerald-500">
        <button onclick="enter()" class="w-full bg-emerald-600 py-5 rounded-2xl font-bold text-white shadow-lg active:scale-95 transition-all">START CHATTING</button>
    </div>
</div>

<header class="h-20 flex items-center justify-between px-6 border-b border-white/5">
    <div>
        <div id="userCounter" class="text-xs text-emerald-400 font-bold">● Connecting...</div>
        <div id="typingInfo" class="text-[10px] text-emerald-200 italic"></div>
    </div>
    <div class="flex gap-4">
        <button onclick="askNotify()"><img src="https://cdn-icons-png.flaticon.com/512/3602/3602145.png" class="icon-meme"></button>
        <button onclick="startCall()"><img src="https://cdn-icons-png.flaticon.com/512/4359/4359042.png" class="icon-meme"></button>
    </div>
</header>

<div id="chatBox" class="msg-container"></div>

<footer class="p-4 border-t border-white/5">
    <div class="flex items-center gap-3 bg-[#1f2937] rounded-full px-5 py-2">
        <input type="file" id="fileInput" accept="image/*" onchange="sendPhoto(this)" class="hidden">
        <button onclick="document.getElementById('fileInput').click()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435911.png" class="icon-meme"></button>
        <input id="msgInput" type="text" placeholder="Type here..." class="flex-1 bg-transparent py-3 text-sm outline-none text-white">
        <button onclick="sendMsg()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435882.png" class="icon-meme"></button>
    </div>
</footer>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="fixed bottom-10 left-0 right-0 flex justify-center gap-6">
        <button onclick="endCall()" class="bg-red-600 p-5 rounded-full shadow-xl"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435930.png" class="w-8"></button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", authDomain: "p2kc-b0553.firebaseapp.com", databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", projectId: "p2kc-b0553" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName, myRoom;

    // Screenshot Protection
    window.addEventListener('keyup', (e) => { if (e.key === 'PrintScreen') { navigator.clipboard.writeText(""); alert("Blocked!"); } });

    function enter() {
        myName = user.value.trim(); myRoom = pass.value.trim();
        if(!myName || !myRoom) return;
        loginDiv.style.display="none";
        db.ref(`rooms/${myRoom}/msgs`).push({ type:'system', val: `${myName} joined` });
        db.ref(`rooms/${myRoom}/users/${myName}`).set(true);
        db.ref(`rooms/${myRoom}/users`).on('value', s => userCounter.innerText = "● " + s.numChildren() + " Online");
        listenMsgs();
    }

    function sendMsg() {
        const txt = msgInput.value.trim(); if(!txt) return;
        const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: txt, type: 'text', time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
        msgInput.value=""; setTimeout(() => ref.remove(), 60000);
    }

    function listenMsgs() {
        db.ref(`rooms/${myRoom}/msgs`).on("child_added", s => {
            const d = s.val(), id = s.key;
            const div = document.createElement("div");
            if(d.type === 'system') {
                div.className = "text-center text-[10px] text-gray-500 my-2";
                div.innerText = d.val;
            } else {
                const isMe = (d.u === myName);
                div.className = `msg ${isMe ? 'outgoing' : 'incoming'}`;
                div.id = "msg-"+id;
                div.innerHTML = `<div class="text-[10px] font-bold opacity-50 mb-1">${d.u}</div>${d.val}<div class="text-[8px] text-right mt-1 opacity-40">${d.time}</div>`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
        db.ref(`rooms/${myRoom}/msgs`).on("child_removed", s => document.getElementById("msg-"+s.key)?.remove());
    }

    function askNotify() { Notification.requestPermission(); }
    function endCall() { document.getElementById('callUI').style.display="none"; }
</script>
</body>
</html>
