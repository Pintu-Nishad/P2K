<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>101%Secure Chat + Admin</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef3f8;display:flex;flex-direction:column;height:100vh;}
.login,.chat-container,.admin-panel{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.login-box{background:#fff;padding:30px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);display:flex;flex-direction:column;gap:15px;width:90%;max-width:350px;}
.login-box input{padding:10px 15px;border-radius:10px;border:1px solid #ccc;outline:none;}
.login-box button{padding:10px;border-radius:10px;border:none;background:#4a90e2;color:white;font-weight:bold;cursor:pointer;}
.header{background:#4a90e2;color:white;padding:15px;font-size:18px;font-weight:bold;width:100%;display:flex;justify-content:space-between;align-items:center;}
.chat-box{flex:1;padding:10px;overflow-y:auto;background:#eef3f8;display:flex;flex-direction:column;gap:5px;width:100%;}
.message{max-width:70%;padding:8px 12px;border-radius:15px;background:#ffffff;align-self:flex-start;word-wrap:break-word;}
.input-area{display:flex;gap:5px;padding:10px;background:#fff;}
.input-area input[type="text"]{flex:1;padding:10px;border-radius:25px;border:1px solid #ccc;outline:none;}
.input-area button{padding:10px 15px;border-radius:25px;border:none;background:#4a90e2;color:white;font-weight:bold;cursor:pointer;}
.bottom-buttons{display:flex;justify-content:space-between;padding:10px;background:#fff;width:100%;}
.bottom-buttons button{flex:1;margin:0 5px;padding:10px;border-radius:25px;border:none;cursor:pointer;font-weight:bold;}
.call-controls{display:none;gap:10px;margin-top:5px;}
.call-controls button{background:orange;color:white;}
img.preview{max-width:100px;max-height:100px;border-radius:10px;margin-top:5px;}
.active-users{font-size:14px;color:#fff;}
.admin-panel{display:none;background:#fff;width:90%;max-width:500px;padding:20px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.3);}
.admin-panel h2{margin:0 0 10px 0;text-align:center;}
.user-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #ccc;}
.user-item button{margin-left:5px;}
</style>
</head>
<body>

<!-- Login -->
<div class="login" id="loginDiv">
  <div class="login-box">
    <input type="text" id="username" placeholder="Username 👤">
    <input type="password" id="password" placeholder="Room Password 🔒">
    <input type="text" id="adminId" placeholder="Admin ID (Optional)">
    <input type="password" id="adminPass" placeholder="Admin Password (Optional)">
    <button onclick="login()">Login / Enter Room</button>
  </div>
</div>

<!-- Chat -->
<div class="chat-container" id="chatDiv" style="display:none; flex:1; width:100%;">
  <div class="header">
    <div id="roomName">Room</div>
    <div class="active-users" id="activeUsers">Active Users: </div>
  </div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Message... 😊">
    <button onclick="sendMessage()">Send</button>
  </div>
  <div class="bottom-buttons">
    <input type="file" id="photoInput" style="display:none;" onchange="sendPhoto(event)">
    <button onclick="document.getElementById('photoInput').click()">📷 Photo</button>
    <button id="callButton" onclick="startCall()">📞 Call</button>
    <button id="muteButton" class="call-controls" onclick="toggleMute()">🔇 Mute</button>
    <button onclick="exitRoom()">❌ Exit Room</button>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin-panel" id="adminPanel">
  <h2>Admin Panel</h2>
  <div id="adminUsers"></div>
  <button onclick="closeAdmin()">Close Admin Panel</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// === Firebase Config ===
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553",
  storageBucket: "p2kc-b0553.firebasestorage.app",
  messagingSenderId: "939347031406",
  appId: "1:939347031406:web:998f52b262a0cecf11bd7f",
  measurementId: "G-55RFHDZ3H0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomName = "";
let username = "";
let audio = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg');
const muteButton = document.getElementById('muteButton');
const callButton = document.getElementById('callButton');
let isAdmin = false;

// === Login / Admin check ===
function login(){
  username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const adminId = document.getElementById('adminId').value.trim();
  const adminPass = document.getElementById('adminPass').value.trim();

  if(!username || !password){ alert("Username & Room Password required!"); return; }

  // Admin Login
  if(adminId && adminPass){
    if(adminId==="admin123" && adminPass==="adminpass"){ // change credentials as needed
      isAdmin = true;
      document.getElementById('loginDiv').style.display='none';
      document.getElementById('adminPanel').style.display='flex';
      loadAdminUsers();
      return;
    }else{ alert("Admin ID or Password incorrect!"); return;}
  }

  roomName = password;
  document.getElementById('loginDiv').style.display='none';
  document.getElementById('chatDiv').style.display='flex';
  document.getElementById('roomName').textContent = username + " - " + roomName;

  joinRoom();
  listenMessages();
  listenCall();
  updateActiveUsers();
}

// === Join Room & Active Users ===
function joinRoom(){
  const userRef = db.ref('rooms/'+roomName+'/users/'+username);
  userRef.set({name: username, joined: Date.now()});
  userRef.onDisconnect().remove();
}

function updateActiveUsers(){
  const activeDiv = document.getElementById('activeUsers');
  db.ref('rooms/'+roomName+'/users').on('value', snap=>{
    const users = snap.val() || {};
    activeDiv.textContent = "Active Users: " + Object.keys(users).join(", ");
  });
}

// === Chat ===
function sendMessage(){
  const msg = document.getElementById('messageInput').value.trim();
  if(!msg) return;
  const msgRef = db.ref('rooms/'+roomName+'/messages').push({ user: username, text: msg, type:'text', time: Date.now() });
  document.getElementById('messageInput').value='';
  setTimeout(()=>{ msgRef.remove(); }, 60000);
}

// === Photo Send ===
function sendPhoto(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    const imgRef = db.ref('rooms/'+roomName+'/messages').push({ user: username, type:'photo', data: reader.result, time: Date.now() });
    setTimeout(()=>{ imgRef.remove(); }, 60000);
  }
  reader.readAsDataURL(file);
}

// === Exit Room ===
function exitRoom(){
  if(confirm("Pakka Nikalna Chahte Ho?")){
    db.ref('rooms/'+roomName+'/users/'+username).remove();
    document.getElementById('chatDiv').style.display='none';
    document.getElementById('loginDiv').style.display='flex';
  }
}

// === Admin Panel Functions ===
function loadAdminUsers(){
  const container = document.getElementById('adminUsers');
  db.ref('rooms').on('value', snap=>{
    container.innerHTML='';
    const rooms = snap.val()||{};
    for(const r in rooms){
      const users = rooms[r].users||{};
      for(const u in users){
        const div = document.createElement('div');
        div.className='user-item';
        div.innerHTML=`${u} <button onclick="removeUser('${r}','${u}')">Remove</button>`;
        container.appendChild(div);
      }
    }
  });
}
function removeUser(r,u){
  db.ref('rooms/'+r+'/users/'+u).remove();
}
function closeAdmin(){ document.getElementById('adminPanel').style.display='none'; document.getElementById('loginDiv').style.display='flex'; }

// === Listen Messages ===
function listenMessages(){
  const chatBox = document.getElementById('chatBox');
  db.ref('rooms/'+roomName+'/messages').on('child_added', snap=>{
    const msg = snap.val();
    const div = document.createElement('div');
    div.className='message';
    if(msg.type==='text') div.textContent = `${msg.user}: ${msg.text}`;
    else if(msg.type==='photo'){ 
      const img = document.createElement('img'); img.src=msg.data; img.className='preview';
      div.textContent = `${msg.user}: `; div.appendChild(img);
    }
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// === Call Placeholder ===
function startCall(){
  muteButton.style.display='inline-block';
  alert("Call started... (Placeholder, no real WebRTC implemented)");
}
function toggleMute(){ alert("Mute toggled"); }
</script>
</body>
</html>
