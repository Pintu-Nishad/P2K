<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K SECURE V13</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="zoomOverlay" onclick="this.style.display='none'"><img id="zoomImg" src=""></div>

<div id="loginDiv" class="fixed inset-0 z-[3000] bg-[#111b21] flex items-center justify-center p-6 text-center">
    <div class="w-full max-w-sm bg-[#202c33] p-8 rounded-2xl shadow-2xl border border-gray-800">
        <h1 class="text-3xl font-bold mb-2 text-[#00a884]">P2K SECURE</h1>
        <p class="text-gray-400 text-xs mb-8 uppercase tracking-widest">Professional Edition</p>
        <input id="user" type="text" placeholder="Name" class="w-full bg-[#2a3942] rounded-lg p-4 mb-4 outline-none text-white border border-transparent focus:border-[#00a884]">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-[#2a3942] rounded-lg p-4 mb-8 outline-none text-white border border-transparent focus:border-[#00a884]">
        <button onclick="enter()" class="w-full bg-[#00a884] py-4 rounded-xl font-bold text-[#111b21] active:scale-95 transition-all">CONNECT</button>
    </div>
</div>

<div id="chatDiv" class="hidden h-full flex flex-col">
    <header class="h-16 bg-[#202c33] flex items-center justify-between px-4 border-b border-gray-800">
        <button onclick="location.reload()" class="text-red-500 text-[10px] font-bold border border-red-900 px-2 py-1 rounded">EXIT</button>
        <div class="text-center">
            <b id="roomTitle" class="text-sm text-white block">Room</b>
            <span id="userCounter" class="text-[10px] text-[#00a884]">Online: 0</span>
        </div>
        <button onclick="startCall()" class="bg-[#00a884] text-[#111b21] px-4 py-2 rounded-full font-bold text-xs">VIDEO CALL</button>
    </header>

    <div id="chatBox"></div>

    <footer class="input-area">
        <input type="checkbox" id="ghostMode" class="w-5 h-5 accent-[#00a884]">
        <input type="file" id="fileInput" accept="image/*" onchange="sendPhoto(this)" class="hidden">
        <button onclick="document.getElementById('fileInput').click()" class="text-[#8696a0] text-2xl">📎</button>
        <input id="msgInput" type="text" placeholder="Message..." class="flex-1 bg-[#2a3942] rounded-full px-4 py-2.5 text-sm outline-none text-white">
        <button onclick="sendMsg()" class="bg-[#00a884] p-3 rounded-full text-[#111b21]">➤</button>
    </footer>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="call-tools">
        <button onclick="toggleFlash()" class="tool-btn">💡</button>
        <button onclick="switchCamera()" class="tool-btn">🔄</button>
        <button onclick="endCall()" class="tool-btn bg-red-600">📞</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
