<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure Audio Chat & Translator</title>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: sans-serif; background:#e5ddd5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  /* --- Login --- */
  #loginDiv { position: fixed; inset: 0; background: #075e54; display: flex; justify-content: center; align-items: center; z-index: 1000; }
  .login-box { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 320px; text-align: center; }
  .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
  .login-box button { width: 100%; padding: 12px; background: #128c7e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

  #chatDiv { display: none; flex-direction: column; height: 100vh; }
  
  /* --- Header & Translator --- */
  .header { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
  #google_translate_element { margin-left: 10px; }
  /* Google Translate के एक्स्ट्रा बार को छुपाने के लिए */
  .goog-te-banner-frame.skiptranslate { display: none !important; } 
  body { top: 0px !important; }

  /* Call Info Bar */
  #callInfoBar { background: #128c7e; color: white; padding: 10px; display: none; font-size: 13px; text-align: center; }
  #timer { font-weight: bold; font-family: monospace; font-size: 16px; margin-right: 15px; }

  /* --- Chat Box --- */
  #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
  .msg { background: white; padding: 10px; border-radius: 10px; max-width: 80%; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
  .msg-username { font-size: 11px; font-weight: bold; color: #075e54; display: block; margin-bottom: 3px; }
  .my-msg { background: #dcf8c6; align-self: flex-end; }
  .msg-img { max-width: 100%; border-radius: 8px; margin-top: 5px; }

  /* --- Footer --- */
  .footer { background: #f0f0f0; padding: 10px; border-top: 1px solid #ddd; }
  .button-row { display: flex; gap: 5px; margin-bottom: 8px; }
  .button-row button { flex: 1; padding: 10px; border-radius: 20px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 13px; }
  
  #callBtn { background: #25d366; }
  #callBtn.calling { background: #e53935; animation: blink 1s infinite; }
  @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
  .btn-photo { background: #5c6bc0; }
  .btn-exit { background: #777; max-width: 60px; }

  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
  .input-row button { background: #075e54; color: white; border: none; width: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }
</style>
</head>
<body class="notranslate"> <div id="loginDiv">
  <div class="login-box">
    <h2 style="color:#075e54;">Audio Room</h2>
    <input type="text" id="user" placeholder="अपना नाम">
    <input type="password" id="pass" placeholder="पासवर्ड">
    <button onclick="enter()">Join</button>
  </div>
</div>

<div id="chatDiv">
  <div class="header">
    <b id="roomTitle">Room</b>
    <div id="google_translate_element"></div>
  </div>

  <div id="callInfoBar">
    <span id="timer">00:00</span>
    <span id="participants">कॉल चालू है...</span>
  </div>

  <div id="chatBox" class="translate"></div>

  <div class="footer">
    <div class="button-row">
      <input type="file" id="fileInp" style="display:none;" accept="image/*" onchange="upPhoto(event)">
      <button class="btn-photo" onclick="document.getElementById('fileInp').click()">📷 Photo</button>
      <button id="callBtn" onclick="handleCallToggle()">📞 Call</button>
      <button class="btn-exit" onclick="location.reload()">Exit</button>
    </div>
    
    <div class="input-row">
      <input type="text" id="msgInput" placeholder="Message...">
      <button onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<audio id="remoteAudio" autoplay></audio>
<audio id="ringtone" loop src="https://www.soundjay.com/phone/phone-calling-1.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- Google Translate Init ---
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'hi', 
    includedLanguages: 'hi,en', 
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE
  }, 'google_translate_element');
}

// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553",
  storageBucket: "p2kc-b0553.firebasestorage.app",
  appId: "1:939347031406:web:998f52b262a0cecf11bd7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let myName, myRoom, myStream, isCalling = false;
let callStartTime, timerInterval;

function enter() {
  myName = document.getElementById('user').value.trim();
  myRoom = document.getElementById('pass').value.trim();
  if(!myName || !myRoom) return alert("नाम और पासवर्ड भरें!");

  document.getElementById('loginDiv').style.display='none';
  document.getElementById('chatDiv').style.display='flex';
  document.getElementById('roomTitle').innerText = "Room: " + myRoom;

  db.ref(`rooms/${myRoom}/users/${myName}`).set({active:true});
  db.ref(`rooms/${myRoom}/users/${myName}`).onDisconnect().remove();

  listenMsgs();
  listenCalls();
  listenParticipants();
}

function sendMsg() {
  const inp = document.getElementById('msgInput');
  if(!inp.value.trim()) return;
  db.ref(`rooms/${myRoom}/msgs`).push({u:myName, val:inp.value, t:'text'});
  inp.value = '';
}

function listenMsgs() {
  const box = document.getElementById('chatBox');
  db.ref(`rooms/${myRoom}/msgs`).on('child_added', snap => {
    const d = snap.val();
    const div = document.createElement('div');
    div.className = 'msg' + (d.u === myName ? ' my-msg' : '');
    
    if (d.t === 'img') {
      div.innerHTML = `<span class="msg-username">${d.u}</span> <img src="${d.val}" class="msg-img">`;
    } else {
      div.innerHTML = `<span class="msg-username">${d.u}</span> ${d.val}`;
    }
    
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  });
}

// --- Call Logic (Timer & Signal) ---
function startTimer() {
  callStartTime = Date.now();
  timerInterval = setInterval(() => {
    let diff = Math.floor((Date.now() - callStartTime) / 1000);
    let m = Math.floor(diff / 60).toString().padStart(2, '0');
    let s = (diff % 60).toString().padStart(2, '0');
    document.getElementById('timer').innerText = `${m}:${s}`;
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); document.getElementById('timer').innerText = "00:00"; }

function listenParticipants() {
  db.ref(`rooms/${myRoom}/callActive`).on('value', snap => {
    const users = snap.val() || {};
    const names = Object.keys(users);
    if(names.length > 0) {
      document.getElementById('callInfoBar').style.display = 'block';
      document.getElementById('participants').innerText = "On Call: " + names.join(", ");
    } else {
      document.getElementById('callInfoBar').style.display = 'none';
      stopTimer();
    }
  });
}

async function handleCallToggle() {
  const btn = document.getElementById('callBtn');
  if (!isCalling) {
    try {
      myStream = await navigator.mediaDevices.getUserMedia({audio:true});
      isCalling = true;
      btn.innerText = "🛑 End Call";
      btn.classList.add('calling');
      db.ref(`rooms/${myRoom}/callActive/${myName}`).set(true);
      db.ref(`rooms/${myRoom}/callActive/${myName}`).onDisconnect().remove();
      db.ref(`rooms/${myRoom}/callSignal`).set({ from: myName, time: Date.now() });
      startTimer();
    } catch(e) { alert("Mic required!"); }
  } else {
    if(myStream) myStream.getTracks().forEach(t => t.stop());
    isCalling = false;
    btn.innerText = "📞 Call";
    btn.classList.remove('calling');
    db.ref(`rooms/${myRoom}/callActive/${myName}`).remove();
    db.ref(`rooms/${myRoom}/callSignal`).remove();
    stopTimer();
  }
}

function listenCalls() {
  db.ref(`rooms/${myRoom}/callSignal`).on('value', snap => {
    const data = snap.val();
    const btn = document.getElementById('callBtn');
    if (data && data.from !== myName) {
      document.getElementById('ringtone').play();
      btn.innerText = "🔊 Answer (" + data.from + ")";
      btn.style.background = "orange";
    } else {
      document.getElementById('ringtone').pause();
    }
  });
}

function upPhoto(e) {
  const f = e.target.files[0];
  const r = new FileReader();
  r.onload = () => db.ref(`rooms/${myRoom}/msgs`).push({u:myName, val:r.result, t:'img'});
  r.readAsDataURL(f);
}
</script>
</body>
</html>
