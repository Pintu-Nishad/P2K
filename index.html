<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K SECURE V24 - BEAST</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Manrope:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #10b981; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Manrope', sans-serif; height: 100vh; overflow: hidden; }
        
        /* 3D Glass UI */
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; background: radial-gradient(circle at top, #1e293b 0%, #020617 100%); display: flex; flex-direction: column; gap: 15px; }
        
        /* Meme Bubble Style */
        .msg { padding: 14px 18px; border-radius: 25px; max-width: 85%; font-weight: 500; box-shadow: 0 8px 20px rgba(0,0,0,0.5); animation: bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        @keyframes bounceIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .in { background: #334155; align-self: flex-start; border-bottom-left-radius: 5px; }
        .out { background: linear-gradient(135deg, #059669, #10b981); align-self: flex-end; border-bottom-right-radius: 5px; }

        /* Icon Animation */
        .meme-btn { width: 42px; height: 42px; transition: 0.3s; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); cursor: pointer; }
        .meme-btn:active { transform: rotate(15deg) scale(0.8); }

        /* Fix Bottom Input Position */
        .input-bar { padding-bottom: env(safe-area-inset-bottom); background: rgba(15, 23, 42, 0.9); }
        
        /* Video Call */
        #callUI { position: fixed; inset: 0; z-index: 9999; background: #000; display: none; flex-direction: column; }
        #remoteVid { width: 100%; height: 100%; object-fit: cover; }
        #localVid { position: absolute; top: 30px; right: 20px; width: 110px; height: 160px; border-radius: 20px; border: 2px solid var(--accent); object-fit: cover; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loginDiv" class="fixed inset-0 z-[10000] bg-slate-950 flex items-center justify-center p-6">
    <div class="w-full max-w-md glass p-10 rounded-[40px] text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/10435/10435921.png" class="w-24 mx-auto mb-4 animate-bounce">
        <h1 style="font-family: 'Orbitron';" class="text-4xl font-black text-emerald-400 mb-8 tracking-widest">P2K SECURE</h1>
        <input id="user" type="text" placeholder="WHO ARE YOU?" class="w-full bg-slate-800 rounded-2xl p-5 mb-4 outline-none border-2 border-transparent focus:border-emerald-500 text-white">
        <input id="pass" type="password" placeholder="SECRET ROOM ID" class="w-full bg-slate-800 rounded-2xl p-5 mb-8 outline-none border-2 border-transparent focus:border-emerald-500 text-white">
        <button onclick="enter()" class="w-full bg-emerald-600 py-5 rounded-2xl font-black text-xl hover:bg-emerald-500 active:scale-95 transition-all shadow-[0_0_20px_rgba(16,185,129,0.4)]">ENTER THE VAULT</button>
    </div>
</div>

<div id="mainUI" class="hidden h-full flex flex-col">
    <header class="h-24 glass flex items-center justify-between px-6 border-b border-white/5">
        <div>
            <div id="userCounter" class="text-emerald-400 font-black text-sm uppercase tracking-tighter">● Online: 0</div>
            <div id="typingInfo" class="text-[10px] text-emerald-200 italic font-bold"></div>
        </div>
        <div class="flex gap-5">
            <button onclick="askNotify()"><img src="https://cdn-icons-png.flaticon.com/512/3602/3602145.png" class="meme-btn"></button>
            <button onclick="startCall()"><img src="https://cdn-icons-png.flaticon.com/512/4359/4359042.png" class="meme-btn"></button>
        </div>
    </header>

    <div id="chatBox" class="msg-area"></div>

    <footer class="input-bar glass px-6 py-4">
        <div class="flex items-center gap-4 bg-slate-800/80 rounded-[30px] px-5 py-2 border border-white/10">
            <input type="file" id="fileIn" accept="image/*" onchange="sendPhoto(this)" class="hidden">
            <button onclick="document.getElementById('fileIn').click()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435911.png" class="meme-btn"></button>
            <input id="msgInput" type="text" placeholder="Say something funny..." class="flex-1 bg-transparent py-3 text-white outline-none font-bold">
            <button onclick="sendMsg()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435882.png" class="meme-btn"></button>
        </div>
    </footer>
</div>

<div id="callUI">
    <video id="remoteVid" autoplay playsinline></video>
    <video id="localVid" autoplay playsinline muted onclick="this.classList.toggle('scale-150')"></video>
    <div class="absolute bottom-12 w-full flex justify-center gap-8">
        <button onclick="toggleMute()" id="mBtn" class="bg-white/10 p-6 rounded-full backdrop-blur-md border border-white/20"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435905.png" class="w-8"></button>
        <button onclick="endCall()" class="bg-red-600 p-6 rounded-full shadow-[0_0_30px_rgba(220,38,38,0.6)]"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435930.png" class="w-10"></button>
        <button onclick="switchCam()" class="bg-white/10 p-6 rounded-full backdrop-blur-md border border-white/20"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435932.png" class="w-8"></button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", authDomain: "p2kc-b0553.firebaseapp.com", databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", projectId: "p2kc-b0553" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName, myRoom, localStream, peerConn, facing="user";

    // SECURITY: Screenshot & Right Click
    window.addEventListener('keyup', e => { if(e.key==='PrintScreen'){ navigator.clipboard.writeText(""); alert("🔒 SECURED!"); }});
    document.addEventListener('keydown', e => { if(e.ctrlKey && (e.key==='p' || e.key==='u')) e.preventDefault(); });

    function enter() {
        myName = user.value.trim(); myRoom = pass.value.trim();
        if(!myName || !myRoom) return;
        loginDiv.style.display="none"; mainUI.classList.remove('hidden');
        db.ref(`rooms/${myRoom}/msgs`).push({ type:'sys', val: `${myName} enters the vault` });
        db.ref(`rooms/${myRoom}/users/${myName}`).set(true);
        db.ref(`rooms/${myRoom}/users`).on('value', s => userCounter.innerText = "● Online: " + s.numChildren());
        listenMsgs(); listenCall(); setupTyping();
    }

    function sendMsg() {
        const t = msgInput.value.trim(); if(!t) return;
        const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: t, type: 'text', time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
        msgInput.value=""; setTimeout(() => ref.remove(), 60000);
    }

    function sendPhoto(input) {
        if(!input.files[0]) return;
        const r = new FileReader();
        r.onload = e => {
            const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: e.target.result, type: 'img', time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
            setTimeout(() => ref.remove(), 60000);
        };
        r.readAsDataURL(input.files[0]);
    }

    function listenMsgs() {
        db.ref(`rooms/${myRoom}/msgs`).on("child_added", s => {
            const d = s.val(), id = s.key;
            const div = document.createElement("div");
            if(d.type === 'sys') {
                div.className = "text-center text-[10px] text-emerald-500 uppercase tracking-[4px] font-black my-4 opacity-50";
                div.innerText = d.val;
            } else {
                const isMe = d.u === myName;
                div.className = `msg ${isMe ? 'out' : 'in'}`;
                div.id = "m-"+id;
                const del = isMe ? `<button onclick="db.ref('rooms/${myRoom}/msgs/${id}').remove()" class="ml-3 opacity-30">🗑️</button>` : "";
                const content = d.type==='img' ? `<img src="${d.val}" class="rounded-2xl max-h-60 shadow-xl">` : d.val;
                div.innerHTML = `<div class="flex justify-between text-[10px] font-black opacity-60 mb-1"><span>${d.u}</span>${del}</div>${content}<div class="text-[8px] text-right mt-1 opacity-50">${d.time}</div>`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
        db.ref(`rooms/${myRoom}/msgs`).on("child_removed", s => document.getElementById("m-"+s.key)?.remove());
    }

    // CALL LOGIC (RE-FIXED)
    async function startCall() {
        callUI.style.display="flex";
        localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:{facingMode:facing}});
        localVid.srcObject = localStream;
        peerConn = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
        localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));
        peerConn.ontrack = e => remoteVid.srcObject = e.streams[0];
        peerConn.onicecandidate = e => { if(e.candidate) db.ref(`calls/${myRoom}/cand/${myName}`).push(e.candidate.toJSON()); };
        const offer = await peerConn.createOffer();
        await peerConn.setLocalDescription(offer);
        db.ref(`calls/${myRoom}`).set({offer, caller:myName});
    }

    function listenCall() {
        db.ref(`calls/${myRoom}`).on("value", async s => {
            const d = s.val(); if(!d) return;
            if(d.offer && d.caller !== myName && !peerConn) {
                if(confirm("Incoming Call from "+d.caller)) {
                    callUI.style.display="flex";
                    localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:true});
                    localVid.srcObject = localStream;
                    peerConn = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
                    localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));
                    peerConn.ontrack = e => remoteVid.srcObject = e.streams[0];
                    await peerConn.setRemoteDescription(new RTCSessionDescription(d.offer));
                    const ans = await peerConn.createAnswer();
                    await peerConn.setLocalDescription(ans);
                    db.ref(`calls/${myRoom}`).update({ans});
                }
            }
            if(d.ans && d.caller === myName) await peerConn.setRemoteDescription(new RTCSessionDescription(d.ans));
        });
        db.ref(`calls/${myRoom}/cand`).on("child_added", s => { if(s.key!==myName) s.ref.on("child_added", c => peerConn?.addIceCandidate(new RTCIceCandidate(c.val()))); });
    }

    function endCall() { db.ref(`calls/${myRoom}`).remove(); localStream?.getTracks().forEach(t=>t.stop()); peerConn?.close(); peerConn=null; callUI.style.display="none"; }
    function toggleMute() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; mBtn.classList.toggle('bg-red-500'); }
    async function switchCam() { facing = (facing==="user"?"environment":"user"); endCall(); startCall(); }
    function setupTyping() { 
        msgInput.oninput = () => { db.ref(`rooms/${myRoom}/typing/${myName}`).set(true); clearTimeout(window.t); window.t = setTimeout(()=>db.ref(`rooms/${myRoom}/typing/${myName}`).remove(),2000); };
        db.ref(`rooms/${myRoom}/typing`).on('value', s => { let t=[]; s.forEach(u=>{ if(u.key!==myName) t.push(u.key); }); typingInfo.innerText = t.length>0 ? t.join(",")+" is typing..." : ""; });
    }
    function askNotify() { Notification.requestPermission(); }
</script>
</body>
</html>
