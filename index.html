<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>तिउरी - स्मार्ट AI गेम</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@700&display=swap');
        body { background: #1e1b4b; font-family: sans-serif; touch-action: manipulation; }
        .tiuri-font { font-family: 'Kalam', cursive; }
        .board-container {
            background: #4c4177; position: relative;
            width: 95vw; max-width: 400px; aspect-ratio: 1 / 1.5;
            border: 8px solid #312e81; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .lines-svg { position: absolute; width: 100%; height: 100%; stroke: rgba(255, 255, 255, 0.8); stroke-width: 2.5; fill: none; }
        .node { width: 32px; height: 32px; position: absolute; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; z-index: 30; }
        .guti { width: 90%; height: 90%; border-radius: 50%; box-shadow: 0 4px 6px rgba(0,0,0,0.5); border: 2px solid white; cursor: pointer; transition: 0.2s; }
        .orange { background: radial-gradient(circle at 30% 30%, #f97316, #9a3412); }
        .green { background: radial-gradient(circle at 30% 30%, #84cc16, #365314); }
        .selected .guti { transform: scale(1.3); ring: 4px solid #fbbf24; }
        .turn-indicator { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2 text-white">

    <div id="menu" class="text-center space-y-6">
        <h1 class="text-7xl text-yellow-500 tiuri-font mb-4">तिउरी</h1>
        <button onclick="startMode('ai')" class="block w-64 bg-orange-600 p-4 rounded-xl font-bold shadow-lg">🤖
