<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K Pro V13 - Delete & Call Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #0b141a; color: #e9edef; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Message Bubbles */
        .msg { background: #202c33; padding: 10px; border-radius: 14px; max-width: 85%; align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .my-msg { background: #005c4b; align-self: flex-end; }
        
        /* Icons for Actions */
        .msg-actions { display: flex; gap: 8px; position: absolute; top: -10px; right: 5px; opacity: 0; transition: 0.3s; }
        .msg:hover .msg-actions { opacity: 1; }
        .icon-btn { background: #111b21; border-radius: 50%; width: 22px; height: 22px; display: flex; items-center; justify-content: center; font-size: 10px; border: 1px solid #333; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        .img-wrap { position: relative; margin-top: 5px; border-radius: 8px; overflow: hidden; background: #000; }
        .msg img { width: 100%; max-height: 280px; object-fit: cover; cursor: pointer; display: block; }

        /* Zoom Overlay */
        #zoomOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        #zoomImg { max-width: 100%; transition: 0.2s; }

        .input-area { background: #202c33; padding: 15px 15px 35px 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        
        /* Video Call UI */
        #callUI { position: fixed; inset: 0; z-index: 500; background: black; display: none; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 90px; height: 130px; border-radius: 12px; border: 2px solid #00a884; z-index: 550; }
        .call-tools { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 15px; }
        .tool-btn { background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="zoomOverlay" onclick="this.style.display='none'"><img id="zoomImg" src=""></div>

<div id="loginDiv" class="fixed inset-0 z-[1000] bg-[#111b21] flex items-center justify-center p-6 text-center">
    <div class="w-full max-w-sm bg-[#202c33] p-8 rounded-2xl">
        <h1 class="text-2xl font-bold mb-6 text-[#00a884]">P2K Secure V13</h1>
        <input id="user" type="text" placeholder="Name" class="w-full bg-[#2a3942] rounded-lg p-3 mb-4 outline-none text-white">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-[#2a3942] rounded-lg p-3 mb-6 outline-none text-white">
        <button onclick="enter()" class="w-full bg-[#00a884] py-3 rounded-lg font-bold text-[#111b21]">Join Chat</button>
    </div>
</div>

<div id="chatDiv" class="hidden h-full flex flex-col">
    <header class="h-14 bg-[#202c33] flex items-center justify-between px-4 border-b border-gray-800">
        <button onclick="location.reload()" class="text-red-400 text-[10px] font-bold">EXIT</button>
        <div class="text-center">
            <b id="roomTitle" class="text-xs">Room</b>
            <span id="userCounter" class="text-[8px] block text-[#00a884]">Online: 0</span>
        </div>
        <button onclick="startCall()" class="bg-[#00a884] text-[#111b21] px-4 py-1.5 rounded-full font-bold text-xs">VIDEO CALL</button>
    </header>

    <div id="chatBox"></div>

    <footer class="input-area">
        <input type="checkbox" id="ghostMode" class="w-4 h-4 accent-[#00a884]">
        <input type="file" id="fileInput" accept="image/*" onchange="sendPhoto(this)" class="hidden">
        <button onclick="document.getElementById('fileInput').click()" class="text-[#8696a0] text-xl">📎</button>
        <input id="msgInput" type="text" placeholder="Message..." class="flex-1 bg-[#2a3942] rounded-full px-4 py-2 text-sm outline-none text-white">
        <button onclick="sendMsg()" class="bg-[#00a884] p-2.5 rounded-full text-[#111b21]">➤</button>
    </footer>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="call-tools">
        <button onclick="toggleFlash()" class="tool-btn">💡</button>
        <button onclick="switchCamera()" class="tool-btn">🔄</button>
        <button onclick="endCall()" class="tool-btn bg-red-600">📞</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", authDomain: "p2kc-b0553.firebaseapp.com", databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", projectId: "p2kc-b0553" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName, myRoom, localStream, peerConnection, currentFacingMode="user";

function enter(){
    myName = user.value.trim(); myRoom = pass.value.trim();
    if(!myName || !myRoom) return;
    loginDiv.style.display="none"; chatDiv.classList.remove('hidden');
    roomTitle.innerText = "ID: " + myRoom;
    db.ref(`rooms/${myRoom}/users/${myName}`).set(true);
    db.ref(`rooms/${myRoom}/users`).on('value', s => document.getElementById('userCounter').innerText = "Online: " + s.numChildren());
    listenMsgs(); listenCall();
}

function sendMsg(){
    if(!msgInput.value.trim()) return;
    const isGhost = ghostMode.checked;
    const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: msgInput.value, type: 'text', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    if(isGhost) setTimeout(() => ref.remove(), 30000);
    msgInput.value="";
}

function sendPhoto(input) {
    if (!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
        const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: e.target.result, type: 'image', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        if(ghostMode.checked) setTimeout(() => ref.remove(), 30000);
    };
    reader.readAsDataURL(input.files[0]);
}

function listenMsgs(){
    db.ref(`rooms/${myRoom}/msgs`).on("child_added", s=>{
        let d = s.val(), id = s.key;
        let div = document.createElement("div");
        div.className = "msg" + (d.u == myName ? " my-msg" : "");
        div.id = "msg-"+id;
        
        let actions = `<div class="msg-actions">
            <div class="icon-btn" onclick="deleteMsg('${id}')">🗑️</div>
            ${d.type === 'image' ? `<div class="icon-btn" onclick="downloadImg('${d.val}')">⬇️</div>` : ''}
        </div>`;

        let content = d.type === 'image' ? `<div class="img-wrap"><img src="${d.val}" onclick="openZoom('${d.val}')"></div>` : `<div class="text-sm">${d.val}</div>`;
        
        div.innerHTML = `${actions}<div class="text-[8px] opacity-40 font-bold uppercase">${d.u}</div>${content}<div class="text-[7px] opacity-40 mt-1 text-right">${d.time}</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
    db.ref(`rooms/${myRoom}/msgs`).on("child_removed", s => {
        const el = document.getElementById("msg-"+s.key);
        if(el) el.remove();
    });
}

function deleteMsg(id) { if(confirm("Delete this message?")) db.ref(`rooms/${myRoom}/msgs/${id}`).remove(); }
function openZoom(src) { zoomImg.src = src; zoomOverlay.style.display = 'flex'; }
function downloadImg(b64) { const a = document.createElement('a'); a.href = b64; a.download = `P2K_${Date.now()}.png`; a.click(); }

// --- VIDEO CALL FIX (Signal Sync) ---
async function startCall(){
    callUI.style.display = "block";
    localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video: { facingMode: "user" } });
    document.getElementById('localVideo').srcObject = localStream;
    setupPeer();
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    db.ref(`calls/${myRoom}`).set({ offer:offer, caller:myName });
}

function setupPeer(){
    peerConnection = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
    peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${myRoom}/candidates/${myName}`).push(e.candidate.toJSON()); };
}

function listenCall(){
    db.ref(`calls/${myRoom}`).on("value", async snap=>{
        let d = snap.val();
        if(!d) { if(peerConnection) endCall(); return; }
        if(d.offer && d.caller !== myName && !peerConnection) {
            if(confirm(d.caller + " is calling...")) {
                callUI.style.display="block";
                localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:true });
                document.getElementById('localVideo').srcObject = localStream;
                setupPeer();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                db.ref(`calls/${myRoom}`).update({answer:answer});
            }
        }
        if(d.answer && d.caller === myName) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
    });
    // ICE Candidate Sync (Crucial for Video display)
    db.ref(`calls/${myRoom}/candidates`).on("child_added", s => {
        if(s.key !== myName) {
            s.ref.on("child_added", c => {
                if(peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(c.val())).catch(e=>{});
            });
        }
    });
}

function endCall(){
    db.ref(`calls/${myRoom}`).remove();
    if(localStream) localStream.getTracks().forEach(t => t.stop());
    if(peerConnection) peerConnection.close();
    peerConnection = null; callUI.style.display = "none";
}

async function switchCamera() {
    currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
    const track = localStream.getVideoTracks()[0]; track.stop();
    const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
    const newTrack = newStream.getVideoTracks()[0];
    peerConnection.getSenders().find(s => s.track.kind === 'video').replaceTrack(newTrack);
    localStream.removeTrack(track); localStream.addTrack(newTrack);
    document.getElementById('localVideo').srcObject = localStream;
}
</script>
</body>
</html>
