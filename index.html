<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10 Species - Nishad Crafts Killer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');
        body { font-family: sans-serif; overflow: hidden; touch-action: none; background: #000; color: white; margin: 0; }
        .game-font { font-family: 'Bungee', cursive; }
        
        .room-bg { 
            background-size: cover; background-position: center; 
            height: 100vh; width: 100vw; position: relative; 
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.5)), url('https://picsum.photos/seed/nishad786/1200/800');
        }

        /* मच्छर बेस स्टाइल */
        .mosquito {
            position: absolute; z-index: 50; cursor: pointer;
            user-select: none; transition: transform 0.1s;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- 10 अलग-अलग प्रजातियों के एनीमेशन --- */
        .sp-1 { font-size: 2.5rem; animation: zigZag 2s infinite; filter: sepia(1); } /* Common */
        .sp-2 { font-size: 2rem; animation: hyper 1.5s infinite; filter: hue-rotate(90deg) brightness(1.5); } /* Neon Green (Fast) */
        .sp-3 { font-size: 4rem; animation: heavy 4s infinite; filter: grayscale(1) contrast(2); } /* Dark Giant (Slow) */
        .sp-4 { font-size: 3rem; animation: circleFly 3s infinite linear; filter: hue-rotate(200deg); } /* Blue Buzzer */
        .sp-5 { font-size: 2.8rem; animation: bounce 2.5s infinite; filter: drop-shadow(0 0 5px red); } /* Red Eye */
        .sp-6 { font-size: 3.2rem; animation: wave 3.5s infinite; filter: invert(1); } /* Ghost White */
        .sp-7 { font-size: 2.2rem; animation: spiral 4s infinite; filter: saturate(5) hue-rotate(45deg); } /* Golden Tiger */
        .sp-8 { font-size: 3.5rem; animation: flash 0.5s infinite; filter: opacity(0.7); } /* Glitchy Fly */
        .sp-9 { font-size: 2.6rem; animation: drift 5s infinite; filter: brightness(0.5) sepia(1); } /* Jungle Brown */
        .sp-10 { font-size: 3.8rem; animation: dive 2s infinite; filter: contrast(3) hue-rotate(300deg); } /* Purple Assassin */

        /* एनीमेशन की परिभाषाएं */
        @keyframes zigZag { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(40px, -40px); } 75% { transform: translate(-40px, 40px); } }
        @keyframes hyper { 0% { transform: scale(1) translate(0,0); } 50% { transform: scale(1.3) translate(60px, 20px); } }
        @keyframes heavy { 0% { transform: translateY(0); } 50% { transform: translateY(-30px) scale(1.05); } }
        @keyframes circleFly { from { transform: rotate(0deg) translateX(30px) rotate(0deg); } to { transform: rotate(360deg) translateX(30px) rotate(-360deg); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-100px); } }
        @keyframes wave { 0% { transform: translateX(0); } 50% { transform: translateX(50px) skewY(10deg); } }
        @keyframes spiral { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(0.5); } 100% { transform: rotate(360deg) scale(1); } }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        @keyframes drift { 0% { left: 0%; } 100% { left: 100%; } }
        @keyframes dive { 0% { transform: scale(1); } 50% { transform: scale(1.5) rotate(45deg); } }

        /* असली खून का छींटा */
        .blood-stain {
            position: absolute; pointer-events: none; z-index: 40;
            width: 130px; height: 130px;
            background-image: url('https://www.transparentpng.com/download/blood/red-blood-splatter-png-21.png');
            background-size: contain; background-repeat: no-repeat;
            animation: splatFade 1.2s forwards;
        }

        @keyframes splatFade {
            0% { transform: scale(0.3) rotate(0deg); opacity: 0; }
            20% { transform: scale(1) rotate(20deg); opacity: 1; }
            100% { transform: scale(1.1) translateY(30px); opacity: 0; }
        }

        .mic-container { position: absolute; bottom: 170px; left: 50%; transform: translateX(-50%); z-index: 100; }
    </style>
</head>
<body>

    <audio id="slap-sound" src="kill.mp3" preload="auto"></audio>
    <audio id="buzz-sound" src="mos.mp3" loop preload="auto"></audio>

    <div id="home-screen" class="fixed inset-0 z-[110] flex flex-col items-center justify-center bg-slate-950 p-6 text-center">
        <h1 class="text-5xl text-red-600 game-font mb-4">NISHAD CRAFTS<br><span class="text-white text-3xl">10 SPECIES EDITION</span></h1>
        <div class="flex flex-col gap-6 w-full max-w-xs mt-10">
            <button onclick="window.startMode('ai')" class="bg-red-700 p-6 rounded-3xl font-black text-2xl shadow-[0_8px_0_#450a0a] active:translate-y-1">🤖 VS COMPUTER</button>
            <button onclick="window.startMode('user')" class="bg-orange-600 p-6 rounded-3xl font-black text-2xl shadow-[0_8px_0_#c2410c] active:translate-y-1">👥 ONLINE BATTLE</button>
        </div>
    </div>

    <div id="game-room" class="hidden room-bg flex flex-col">
        <div class="w-full p-4 flex justify-between items-center bg-black/90 border-b-2 border-red-900/50 backdrop-blur-xl">
            <div class="text-center"><p class="text-[10px] text-blue-400 font-bold uppercase">You</p><div id="score1" class="text-4xl font-black">0</div></div>
            <div id="timer" class="text-5xl font-black text-white game-font">30</div>
            <div class="text-center"><p id="p2-label" class="text-[10px] text-red-500 font-bold uppercase">Enemy</p><div id="score2" class="text-4xl font-black">0</div></div>
        </div>
        <div id="room-area" class="relative flex-grow overflow-hidden"></div>

        <div id="mic-section" class="hidden mic-container flex flex-col items-center gap-2">
            <button id="mic-btn" onclick="window.toggleMic()" class="bg-black/90 border-2 border-red-600 p-6 rounded-full shadow-[0_0_25px_rgba(220,38,38,0.5)]">
                <span id="mic-icon" class="text-3xl">🎙️</span>
            </button>
            <span id="mic-text" class="text-[12px] font-bold text-red-500 uppercase">Mic Active</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzvw8YGIdYQ3YxB9NCMqjXL-yIWfuQPxs",
            authDomain: "ml-killer.firebaseapp.com",
            projectId: "ml-killer",
            storageBucket: "ml-killer.firebasestorage.app",
            messagingSenderId: "481192438237",
            appId: "1:481192438237:web:20cd6e7022738bf3d62e34",
            databaseURL: "https://ml-killer-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let peer, conn, localStream, myScore = 0, oppScore = 0, timeLeft = 30, gameActive = false, isMuted = false, mode = '';
        const slap = document.getElementById('slap-sound');
        const buzz = document.getElementById('buzz-sound');

        window.startMode = async function(m) {
            mode = m;
            try { buzz.volume = 0.4; await buzz.play(); } catch(e) {}
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-room').classList.remove('hidden');
            if(mode === 'user') { document.getElementById('mic-section').classList.remove('hidden'); setupPeer(); }
            startGame();
        };

        function setupPeer() {
            peer = new Peer();
            peer.on('open', (id) => {
                onDisconnect(ref(db, 'lobby/' + id)).remove();
                get(ref(db, 'lobby')).then(snap => {
                    let tid = null;
                    if(snap.exists()) { for(let k in snap.val()) { if(k !== id) { tid = k; break; } } }
                    if(tid) { connectTo(tid); remove(ref(db, 'lobby/' + tid)); }
                    else { set(ref(db, 'lobby/' + id), { status: 'waiting' }); }
                });
            });
            peer.on('connection', c => { conn = c; handleSync(); });
            peer.on('call', async call => {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                call.answer(localStream);
                call.on('stream', rs => { const a = new Audio(); a.srcObject = rs; a.play(); });
            });
        }

        async function connectTo(tid) {
            conn = peer.connect(tid);
            handleSync();
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const call = peer.call(tid, localStream);
            call.on('stream', rs => { const a = new Audio(); a.srcObject = rs; a.play(); });
        }

        function handleSync() {
            conn.on('data', d => { if(d.type === 'kill') { oppScore = d.score; document.getElementById('score2').innerText = oppScore; } });
        }

        function startGame() {
            gameActive = true;
            if(mode === 'ai') document.getElementById('p2-label').innerText = "COMPUTER";
            setInterval(() => { if(gameActive) spawn(); }, 600);
            if(mode === 'ai') setInterval(() => { if(gameActive) { oppScore += 10; document.getElementById('score2').innerText = oppScore; } }, 1200);
            const clk = setInterval(() => { 
                timeLeft--; 
                document.getElementById('timer').innerText = timeLeft; 
                if(timeLeft <= 0) { clearInterval(clk); endGame(); } 
            }, 1000);
        }

        function spawn() {
            const area = document.getElementById('room-area');
            const m = document.createElement('div');
            // 1 से 10 के बीच रैंडम प्रजाति चुनना
            const speciesId = Math.floor(Math.random() * 10) + 1;
            m.className = `mosquito sp-${speciesId}`;
            m.innerHTML = '🦟';
            m.style.left = Math.random() * (window.innerWidth - 80) + 'px';
            m.style.top = Math.random() * (window.innerHeight - 450) + 'px';
            
            m.onclick = (e) => { 
                myScore += 10; document.getElementById('score1').innerText = myScore;
                slap.currentTime = 0; slap.play();
                createSplatter(e.clientX, e.clientY);
                if(conn) conn.send({type:'kill', score:myScore});
                m.remove();
            };
            area.appendChild(m);
            setTimeout(() => { if(m.parentNode) m.remove(); }, 3000);
        }

        function createSplatter(x, y) {
            const splat = document.createElement('div');
            splat.className = 'blood-stain';
            splat.style.left = (x - 65) + 'px';
            splat.style.top = (y - 65) + 'px';
            splat.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.getElementById('room-area').appendChild(splat);
            setTimeout(() => splat.remove(), 1200);
        }

        window.toggleMic = function() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            document.getElementById('mic-icon').innerText = isMuted ? "🔇" : "🎙️";
            document.getElementById('mic-text').innerText = isMuted ? "Mic: Muted" : "Mic: Active";
        };

        function endGame() { gameActive = false; buzz.pause(); alert("Nishad Crafts Game Over! Score: " + myScore); location.reload(); }
    </script>
</body>
</html>
