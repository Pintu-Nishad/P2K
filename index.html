<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Chat</title>

<style>
body{background:black;color:#0f0;font-family:monospace;text-align:center;margin:0;}
.box{margin:10px;padding:10px;border:1px solid #0f0;}

input,button{
width:90%;padding:10px;margin:5px;background:black;color:#0f0;border:1px solid #0f0;
}

button:active{background:#0f0;color:black;}

#recBtn.recording{
background:red !important;
color:white;
}

video{width:45%;border:1px solid #0f0;margin:5px;}

#callWindow{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;
}
</style>
</head>

<body>

<h2>💀 PRO CHAT 💀</h2>

<div class="box" id="menu">
<input id="name" placeholder="Enter Your Name">
<input id="room" type="password" inputmode="numeric" placeholder="Enter Room">
<button onclick="createRoom()">Create</button>
<button onclick="joinRoom()">Join</button>
</div>

<div id="chatBox" style="display:none;">
<input id="msg"><button onclick="sendMsg()">Send</button>
<ul id="chat"></ul>

<button id="recBtn">🎤 Hold to Record</button>

<br>
<button onclick="callUser()">📞 Call</button>
</div>

<div id="incoming" style="display:none;">
<p id="callerName"></p>
<button onclick="acceptCall()">Accept</button>
<button onclick="rejectCall()">Reject</button>
</div>

<div id="callWindow">
<h3>📞 Call Active</h3>
<video id="local" autoplay muted></video>
<video id="remote" autoplay></video>

<br>
<button onclick="toggleMute(event)">🔇 Mute</button>
<button onclick="endCall()">❌ End</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, get, onValue } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
databaseURL:"https://p2kc-b0553-default-rtdb.firebaseio.com"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let roomId,chatRef,name,pc,localStream;

// ROOM
window.createRoom=()=>{
name=document.getElementById("name").value;
roomId=document.getElementById("room").value;
set(ref(db,"rooms/"+roomId),{created:true});
enterRoom();
}

window.joinRoom=async()=>{
name=document.getElementById("name").value;
roomId=document.getElementById("room").value;
let s=await get(ref(db,"rooms/"+roomId));
if(s.exists()) enterRoom();
else alert("Room not found");
}

function enterRoom(){
chatRef=ref(db,"chat/"+roomId);
document.getElementById("menu").style.display="none";
document.getElementById("chatBox").style.display="block";

// CHAT
onChildAdded(chatRef,d=>{
let li=document.createElement("li");
li.innerText=d.val().user + ": " + d.val().msg;
document.getElementById("chat").appendChild(li);
});

// CALL LISTENER
onValue(ref(db,"call/"+roomId),(snap)=>{
if(snap.exists()){
let data=snap.val();

// ❌ caller ko popup nahi
if(data.caller !== name){
document.getElementById("incoming").style.display="block";
document.getElementById("callerName").innerText =
"📞 Call from: " + data.caller;
}
}
});
}

// SEND MSG
window.sendMsg=()=>{
let m=document.getElementById("msg").value;
if(m!=="") push(chatRef,{user:name,msg:m});
}

// 🎤 RECORD
let mediaRecorder,chunks=[];
let recBtn=document.getElementById("recBtn");

recBtn.onmousedown=async()=>{
recBtn.classList.add("recording");

let s=await navigator.mediaDevices.getUserMedia({audio:true});
mediaRecorder=new MediaRecorder(s);

mediaRecorder.ondataavailable=e=>chunks.push(e.data);

mediaRecorder.onstop=()=>{
let blob=new Blob(chunks);
let url=URL.createObjectURL(blob);

let audio=document.createElement("audio");
audio.src=url;
audio.controls=true;

document.getElementById("chat").appendChild(audio);
chunks=[];
}

mediaRecorder.start();
}

recBtn.onmouseup=()=>{
recBtn.classList.remove("recording");
if(mediaRecorder) mediaRecorder.stop();
}

// CALL
window.callUser=()=>{
set(ref(db,"call/"+roomId),{caller:name});
}

window.acceptCall=async()=>{
document.getElementById("incoming").style.display="none";
document.getElementById("callWindow").style.display="block";

localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
document.getElementById("local").srcObject=localStream;
}

window.rejectCall=()=>{
set(ref(db,"call/"+roomId),null);
document.getElementById("incoming").style.display="none";
}

// MUTE
window.toggleMute=(e)=>{
let t=localStream.getAudioTracks()[0];
t.enabled=!t.enabled;
e.target.innerText=t.enabled?"🔇 Mute":"🤫 Muted";
}

// END
window.endCall=()=>{
document.getElementById("callWindow").style.display="none";
set(ref(db,"call/"+roomId),null);
}
</script>

</body>
</html>
