<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>P2K Real-Time WebRTC Call</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, sans-serif; background:#efe7dd; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  #chatBox { flex: 1; overflow-y: auto; padding: 15px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 8px; }
  .msg { background: white; padding: 8px 12px; border-radius: 15px; max-width: 80%; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
  .my-msg { background: #dcf8c6; align-self: flex-end; }
  #callOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; color: white; }
  .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<div id="loginDiv" class="fixed inset-0 bg-[#075e54] flex items-center justify-center z-[9999]">
  <div class="bg-white p-8 rounded-2xl w-80 text-center shadow-2xl">
    <h2 class="text-2xl font-bold mb-4 text-[#075e54]">P2K Secure</h2>
    <input type="text" id="user" placeholder="अपना नाम..." class="w-full p-3 mb-3 border rounded-lg outline-none">
    <input type="password" id="pass" placeholder="रूम कोड..." class="w-full p-3 mb-4 border rounded-lg outline-none">
    <button onclick="enter()" class="w-full bg-[#128c7e] text-white py-3 rounded-lg font-bold">Join Room</button>
  </div>
</div>

<div id="chatDiv" class="hidden flex-col h-screen">
  <div class="h-[60px] bg-[#075e54] text-white flex justify-between items-center px-4">
    <b id="roomTitle">Room</b>
    <div class="flex items-center gap-3">
        <button onclick="startWebRTCCall()" class="bg-[#25d366] px-4 py-1 rounded-full text-sm font-bold">📞 Call</button>
        <span id="userCount" class="text-xs">Online: 0</span>
    </div>
  </div>

  <div id="chatBox"></div>

  <div class="p-3 bg-[#f0f0f0] flex gap-2">
    <input type="text" id="msgInput" placeholder="Type..." class="flex-1 p-2 rounded-full border px-4 outline-none">
    <button onclick="sendMsg()" class="bg-[#075e54] text-white w-10 h-10 rounded-full">➤</button>
  </div>
</div>

<div id="callOverlay">
    <div class="text-2xl mb-4 pulse" id="callStatus">Calling...</div>
    <div class="flex gap-10">
        <button id="answerBtn" onclick="answerCall()" class="bg-green-500 p-5 rounded-full hidden">📞 Accept</button>
        <button onclick="endCall()" class="bg-red-500 p-5 rounded-full">❌ End</button>
    </div>
    <audio id="remoteAudio" autoplay></audio>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553",
  storageBucket: "p2kc-b0553.firebasestorage.app",
  appId: "1:939347031406:web:998f52b262a0cecf11bd7f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName, myRoom, pc;
const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

function enter() {
  myName = document.getElementById('user').value.trim();
  myRoom = document.getElementById('pass').value.trim();
  if(!myName || !myRoom) return alert("Details fill karein!");

  document.getElementById('loginDiv').style.display='none';
  document.getElementById('chatDiv').style.display='flex';
  document.getElementById('roomTitle').innerText = myRoom;

  // Online Presence
  const userRef = db.ref(`rooms/${myRoom}/users/${myName}`);
  userRef.set({ lastSeen: Date.now() });
  userRef.onDisconnect().remove();

  listenMsgs();
  listenForInboundCalls();
}

// --- WebRTC Logic ---

async function startWebRTCCall() {
    showOverlay("Calling Everyone...");
    pc = new RTCPeerConnection(servers);
    
    // Get Audio
    const localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    // Handle candidates
    pc.onicecandidate = e => {
        if (e.candidate) db.ref(`rooms/${myRoom}/call/candidates`).push(e.candidate.toJSON());
    };

    // Create Offer
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    db.ref(`rooms/${myRoom}/call`).set({
        offer: { type: offer.type, sdp: offer.sdp },
        caller: myName,
        active: true
    });
}

function listenForInboundCalls() {
    db.ref(`rooms/${myRoom}/call`).on('value', async snap => {
        const data = snap.val();
        if (data && data.active && data.caller !== myName) {
            showOverlay(data.caller + " is calling...");
            document.getElementById('answerBtn').classList.remove('hidden');
        } else if (!data || !data.active) {
            hideOverlay();
        }
    });
}

async function answerCall() {
    document.getElementById('answerBtn').classList.add('hidden');
    pc = new RTCPeerConnection(servers);

    const localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.onicecandidate = e => {
        if (e.candidate) db.ref(`rooms/${myRoom}/call/candidates`).push(e.candidate.toJSON());
    };

    pc.ontrack = e => {
        document.getElementById('remoteAudio').srcObject = e.streams[0];
    };

    const callData = (await db.ref(`rooms/${myRoom}/call`).once('value')).val();
    await pc.setRemoteDescription(new RTCSessionDescription(callData.offer));
    
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    db.ref(`rooms/${myRoom}/call/answer`).set({ type: answer.type, sdp: answer.sdp });

    // Listen for ICE candidates
    db.ref(`rooms/${myRoom}/call/candidates`).on('child_added', snap => {
        pc.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
}

// --- Chat & UI Helpers ---

function showOverlay(txt) {
    document.getElementById('callOverlay').style.display = 'flex';
    document.getElementById('callStatus').innerText = txt;
}

function hideOverlay() {
    document.getElementById('callOverlay').style.display = 'none';
    if(pc) { pc.close(); pc = null; }
}

function endCall() {
    db.ref(`rooms/${myRoom}/call`).remove();
    hideOverlay();
}

function sendMsg() {
  const inp = document.getElementById('msgInput');
  if(!inp.value.trim()) return;
  db.ref(`rooms/${myRoom}/msgs`).push({u:myName, val:inp.value});
  inp.value = '';
}

function listenMsgs() {
  db.ref(`rooms/${myRoom}/msgs`).on('child_added', snap => {
    const d = snap.val();
    const div = document.createElement('div');
    div.className = 'msg' + (d.u === myName ? ' my-msg' : '');
    div.innerHTML = `<b class="text-[10px] block opacity-50">${d.u}</b>${d.val}`;
    document.getElementById('chatBox').appendChild(div);
    document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
  });
}
</script>
</body>
</html>
