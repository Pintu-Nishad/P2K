<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2K Chat + Call</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body { margin:0; font-family:sans-serif; }
#chatBox { height:70vh; overflow:auto; padding:10px; }
.msg { background:#eee; padding:6px 10px; margin:5px; border-radius:10px; }
.my-msg { background:#dcf8c6; text-align:right; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginDiv" style="padding:20px;">
<input id="user" placeholder="Name"><br><br>
<input id="pass" placeholder="Room"><br><br>
<button onclick="enter()">Join</button>
</div>

<!-- CHAT -->
<div id="chatDiv" style="display:none;">
<h3 id="roomTitle"></h3>

<div id="chatBox"></div>

<input id="msgInput" placeholder="message">
<button onclick="sendMsg()">Send</button>

<br><br>
<button onclick="startCall()">📞 Call</button>
</div>

<!-- CALL UI -->
<div id="callUI" style="display:none; position:fixed; inset:0; background:black; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center;">
<h2 id="callStatus">Calling...</h2>

<div id="incomingBox" style="display:none;">
<p id="callerName"></p>
<button onclick="acceptCall()">Accept</button>
<button onclick="rejectCall()">Reject</button>
</div>

<button onclick="endCall()">End Call</button>
</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName, myRoom;
let localStream, peerConnection;
let isCaller = false;

// 🔑 ENTER
function enter(){
  myName = user.value;
  myRoom = pass.value;

  loginDiv.style.display="none";
  chatDiv.style.display="block";
  roomTitle.innerText="Room: "+myRoom;

  listenMsgs();
  listenCall();
}

// 💬 CHAT
function sendMsg(){
  db.ref("rooms/"+myRoom+"/msgs").push({
    u: myName,
    val: msgInput.value
  });
  msgInput.value="";
}

function listenMsgs(){
  db.ref("rooms/"+myRoom+"/msgs").on("child_added", s=>{
    let d = s.val();
    let div = document.createElement("div");
    div.className="msg"+(d.u==myName?" my-msg":"");
    div.innerText=d.u+": "+d.val;
    chatBox.appendChild(div);
  });
}

// 🎤 MEDIA
async function getMedia(){
  return await navigator.mediaDevices.getUserMedia({
    audio:{
      echoCancellation:true,
      noiseSuppression:true,
      autoGainControl:true
    },
    video:false
  });
}

const servers = { iceServers:[{urls:"stun:stun.l.google.com:19302"}] };

// 📞 CALL START
async function startCall(){
  isCaller=true;
  callUI.style.display="flex";

  localStream = await getMedia();
  peerConnection = new RTCPeerConnection(servers);

  localStream.getTracks().forEach(t=>{
    peerConnection.addTrack(t,localStream);
  });

  peerConnection.ontrack = e=>{
    let audio = new Audio();
    audio.srcObject = e.streams[0];
    audio.play();
  };

  peerConnection.onicecandidate = e=>{
    if(e.candidate){
      db.ref("calls/"+myRoom+"/candidates").push(e.candidate.toJSON());
    }
  };

  let offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);

  db.ref("calls/"+myRoom).set({
    offer:offer,
    caller:myName
  });
}

// 📲 LISTEN CALL
function listenCall(){
  db.ref("calls/"+myRoom).on("value", async snap=>{
    let d = snap.val();
    if(!d) return;

    if(d.offer && !isCaller){
      callUI.style.display="flex";
      incomingBox.style.display="block";
      callerName.innerText=d.caller+" calling...";
    }

    if(d.answer && isCaller){
      await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
      callStatus.innerText="Connected";
    }
  });

  db.ref("calls/"+myRoom+"/candidates").on("child_added", snap=>{
    let c = new RTCIceCandidate(snap.val());
    peerConnection?.addIceCandidate(c);
  });
}

// ✅ ACCEPT
async function acceptCall(){
  isCaller=false;
  incomingBox.style.display="none";

  localStream = await getMedia();
  peerConnection = new RTCPeerConnection(servers);

  localStream.getTracks().forEach(t=>{
    peerConnection.addTrack(t,localStream);
  });

  peerConnection.ontrack = e=>{
    let audio = new Audio();
    audio.srcObject = e.streams[0];
    audio.play();
  };

  peerConnection.onicecandidate = e=>{
    if(e.candidate){
      db.ref("calls/"+myRoom+"/candidates").push(e.candidate.toJSON());
    }
  };

  let data = (await db.ref("calls/"+myRoom).get()).val();

  await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));

  let answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);

  db.ref("calls/"+myRoom).update({answer:answer});

  callStatus.innerText="Connected";
}

// ❌ REJECT
function rejectCall(){
  db.ref("calls/"+myRoom).remove();
  callUI.style.display="none";
}

// 🔴 END
function endCall(){
  peerConnection?.close();
  db.ref("calls/"+myRoom).remove();
  callUI.style.display="none";
}

</script>

</body>
</html>
