<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K SECURE V13</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        body, html { height: 100%; margin: 0; background-color: #0b141a; color: #e9edef; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .msg { background: #202c33; padding: 10px; border-radius: 12px; max-width: 85%; align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }
        .my-msg { background: #005c4b; align-self: flex-end; border-top-right-radius: 2px; }
        .input-area { background: #202c33; padding: 10px 15px 30px 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
        #callUI { position: fixed; inset: 0; z-index: 2000; background: black; display: none; flex-direction: column; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 140px; border-radius: 12px; border: 2px solid #00a884; z-index: 2100; }
        .call-tools { position: absolute; bottom: 50px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 2200; }
        .tool-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="loginDiv" class="fixed inset-0 z-[3000] bg-[#111b21] flex items-center justify-center p-6 text-center">
    <div class="w-full max-w-sm bg-[#202c33] p-8 rounded-2xl shadow-2xl border border-gray-800">
        <h1 class="text-3xl font-bold mb-2 text-[#00a884]">P2K SECURE</h1>
        <p class="text-gray-400 text-xs mb-8 uppercase tracking-widest">Professional Edition</p>
        <input id="user" type="text" placeholder="Your Name" class="w-full bg-[#2a3942] rounded-lg p-4 mb-4 outline-none text-white focus:border-[#00a884] border border-transparent">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-[#2a3942] rounded-lg p-4 mb-8 outline-none text-white focus:border-[#00a884] border border-transparent">
        <button onclick="enter()" class="w-full bg-[#00a884] py-4 rounded-xl font-bold text-[#111b21] active:scale-95 transition-all">CONNECT</button>
    </div>
</div>

<div id="chatDiv" class="hidden h-full flex flex-col">
    <header class="h-16 bg-[#202c33] flex items-center justify-between px-4 border-b border-gray-800 shadow-md">
        <button onclick="location.reload()" class="text-red-500 font-bold text-xs border border-red-900 px-2 py-1 rounded">EXIT</button>
        <div class="text-center">
            <b id="roomTitle" class="text-sm text-white block">Room ID</b>
            <span id="userCounter" class="text-[10px] text-[#00a884]">Online: 0</span>
        </div>
        <button onclick="startCall()" class="bg-[#00a884] text-[#111b21] px-4 py-2 rounded-full font-bold text-xs">VIDEO CALL</button>
    </header>

    <div id="chatBox"></div>

    <footer class="input-area">
        <input type="checkbox" id="ghostMode" class="w-5 h-5 accent-[#00a884]">
        <input type="file" id="fileInput" accept="image/*" onchange="sendPhoto(this)" class="hidden">
        <button onclick="document.getElementById('fileInput').click()" class="text-[#8696a0] text-2xl">📎</button>
        <input id="msgInput" type="text" placeholder="Type message..." class="flex-1 bg-[#2a3942] rounded-full px-5 py-2 text-sm outline-none text-white">
        <button onclick="sendMsg()" class="bg-[#00a884] p-3 rounded-full text-[#111b21]">➤</button>
    </footer>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="call-tools">
        <button onclick="toggleFlash()" class="tool-btn">💡</button>
        <button onclick="switchCamera()" class="tool-btn">🔄</button>
        <button onclick="endCall()" class="tool-btn bg-red-600 border-none">📞</button>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = { 
    apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", 
    authDomain: "p2kc-b0553.firebaseapp.com", 
    databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", 
    projectId: "p2kc-b0553" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName, myRoom, localStream, peerConnection, currentFacingMode="user", isFlash=false;

function enter(){
    myName = user.value.trim(); myRoom = pass.value.trim();
    if(!myName || !myRoom) return;
    loginDiv.style.display="none"; chatDiv.classList.remove('hidden');
    roomTitle.innerText = "ROOM: " + myRoom;
    db.ref(`rooms/${myRoom}/users/${myName}`).set(true);
    db.ref(`rooms/${myRoom}/users`).on('value', s => document.getElementById('userCounter').innerText = "Online: " + s.numChildren());
    listenMsgs(); listenCall();
}

function sendMsg(){
    const text = msgInput.value.trim();
    if(!text) return;
    const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: text, type: 'text', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    if(ghostMode.checked) setTimeout(() => ref.remove(), 30000);
    msgInput.value="";
}

function sendPhoto(input) {
    if (!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
        const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: e.target.result, type: 'image', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        if(ghostMode.checked) setTimeout(() => ref.remove(), 30000);
    };
    reader.readAsDataURL(input.files[0]);
}

function listenMsgs(){
    db.ref(`rooms/${myRoom}/msgs`).on("child_added", s=>{
        let d = s.val(), id = s.key;
        let div = document.createElement("div");
        div.className = "msg" + (d.u == myName ? " my-msg" : "");
        let content = d.type === 'image' ? `<img src="${d.val}" class="rounded-lg max-h-60">` : `<div>${d.val}</div>`;
        div.innerHTML = `<div class="text-[9px] text-[#00a884] font-bold uppercase mb-1">${d.u}</div>${content}<div class="text-[7px] opacity-40 text-right mt-1">${d.time}</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// Video Call Functions
async function startCall(){
    callUI.style.display = "flex";
    localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video: { facingMode: "user" } });
    document.getElementById('localVideo').srcObject = localStream;
    setupPeer();
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    db.ref(`calls/${myRoom}`).set({ offer:offer, caller:myName });
}

function setupPeer(){
    peerConnection = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
    peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${myRoom}/candidates/${myName}`).push(e.candidate.toJSON()); };
}

function listenCall(){
    db.ref(`calls/${myRoom}`).on("value", async snap=>{
        let d = snap.val();
        if(!d) { if(peerConnection) endCall(); return; }
        if(d.offer && d.caller !== myName && !peerConnection) {
            if(confirm("Call from " + d.caller)) {
                callUI.style.display="flex";
                localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:true });
                document.getElementById('localVideo').srcObject = localStream;
                setupPeer();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                db.ref(`calls/${myRoom}`).update({answer:answer});
            }
        }
        if(d.answer && d.caller === myName) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
    });
    db.ref(`calls/${myRoom}/candidates`).on("child_added", s => {
        if(s.key !== myName) s.ref.on("child_added", c => { if(peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(c.val())); });
    });
}

function endCall(){ 
    db.ref(`calls/${myRoom}`).remove(); 
    if(localStream) localStream.getTracks().forEach(t => t.stop()); 
    if(peerConnection) peerConnection.close(); 
    peerConnection = null; callUI.style.display = "none"; 
}

async function toggleFlash() {
    const track = localStream.getVideoTracks()[0];
    isFlash = !isFlash;
    track.applyConstraints({ advanced: [{ torch: isFlash }] }).catch(e => alert("Back Camera needed for Flash"));
}

async function switchCamera() {
    currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
    const track = localStream.getVideoTracks()[0]; track.stop();
    const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
    const newTrack = newStream.getVideoTracks()[0];
    peerConnection.getSenders().find(s => s.track.kind === 'video').replaceTrack(newTrack);
    localStream.removeTrack(track); localStream.addTrack(newTrack);
    document.getElementById('localVideo').srcObject = localStream;
}
</script>
</body>
</html>
