<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K Private Chat & Video Call</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        body { background-color: #0b141a; color: #e9edef; font-family: sans-serif; overflow: hidden; }
        #chatBox { 
            height: calc(100vh - 130px); 
            overflow-y: auto; 
            padding: 15px; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-color: #0b141a;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg { background: #202c33; padding: 8px 12px; border-radius: 8px; max-width: 85%; align-self: flex-start; }
        .my-msg { background: #005c4b; align-self: flex-end; }
        
        /* Video Styling */
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #2a3942; }
        #localVideo { 
            position: absolute; top: 20px; right: 20px; 
            width: 100px; height: 150px; 
            object-fit: cover; border-radius: 10px; 
            border: 2px solid #00a884; z-index: 10; 
        }
    </style>
</head>
<body class="h-screen flex flex-col">

<div id="loginDiv" class="fixed inset-0 z-50 bg-[#111b21] flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-[#202c33] p-8 rounded-2xl text-center border border-gray-700">
        <h1 class="text-2xl font-bold mb-6">P2K Video Chat</h1>
        <input id="user" type="text" placeholder="Name" class="w-full bg-[#2a3942] rounded-lg p-3 mb-4 outline-none text-white">
        <input id="pass" type="password" placeholder="Room" class="w-full bg-[#2a3942] rounded-lg p-3 mb-6 outline-none text-white">
        <button onclick="enter()" class="w-full bg-[#00a884] py-3 rounded-lg font-bold text-[#111b21]">Join Room</button>
    </div>
</div>

<div id="chatDiv" class="hidden flex flex-col h-full w-full">
    <header class="h-16 bg-[#202c33] flex items-center justify-between px-4 border-b border-gray-700">
        <div class="flex items-center gap-3">
            <b id="roomTitle">Room</b>
        </div>
        <button onclick="startCall()" class="bg-[#00a884] p-2.5 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#111b21]" viewBox="0 0 20 20" fill="currentColor">
                <path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zM14.553 7.106A1 1 0 0014 8v4a1 1 0 00.553.894l2 1A1 1 0 0018 13V7a1 1 0 00-1.447-.894l-2 1z" />
            </svg>
        </button>
    </header>

    <div id="chatBox"></div>

    <footer class="p-3 bg-[#202c33] flex items-center gap-2">
        <input id="msgInput" type="text" placeholder="Message" class="flex-1 bg-[#2a3942] rounded-full px-5 py-2.5 outline-none">
        <button onclick="sendMsg()" class="bg-[#00a884] p-3 rounded-full text-[#111b21] font-bold">Send</button>
    </footer>
</div>

<div id="callUI" class="hidden fixed inset-0 z-[100] bg-black">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    
    <div id="incomingBox" class="hidden absolute inset-0 bg-black/80 flex flex-center flex-col justify-center items-center z-20">
        <h2 id="callerName" class="text-xl mb-4 text-white">Incoming Video Call...</h2>
        <div class="flex gap-4">
            <button onclick="acceptCall()" class="bg-green-500 px-8 py-3 rounded-full font-bold">Accept</button>
            <button onclick="rejectCall()" class="bg-red-500 px-8 py-3 rounded-full font-bold">Reject</button>
        </div>
    </div>

    <div class="absolute bottom-10 left-0 right-0 flex justify-center gap-6">
        <h2 id="callStatus" class="absolute -top-10 text-white font-bold w-full text-center"></h2>
        <button onclick="endCall()" class="bg-red-600 p-5 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white rotate-[135deg]" viewBox="0 0 20 20" fill="currentColor">
                <path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 005.456 5.456l.773-1.548a1 1 0 011.06-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z" />
            </svg>
        </button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName, myRoom, localStream, peerConnection, isCaller = false;
const servers = { iceServers:[{urls:"stun:stun.l.google.com:19302"}] };

function enter(){
  myName = document.getElementById('user').value;
  myRoom = document.getElementById('pass').value;
  if(!myName || !myRoom) return;
  document.getElementById('loginDiv').style.display="none";
  document.getElementById('chatDiv').classList.remove('hidden');
  document.getElementById('roomTitle').innerText="Room: "+myRoom;
  listenMsgs();
  listenCall();
}

function sendMsg(){
  const input = document.getElementById('msgInput');
  if(!input.value) return;
  db.ref("rooms/"+myRoom+"/msgs").push({ u: myName, val: input.value });
  input.value="";
}

function listenMsgs(){
  db.ref("rooms/"+myRoom+"/msgs").on("child_added", s=>{
    let d = s.val();
    let div = document.createElement("div");
    div.className="msg"+(d.u==myName?" my-msg":"");
    div.innerHTML=`<div class="text-[10px] opacity-60 font-bold uppercase">${d.u}</div>${d.val}`;
    document.getElementById('chatBox').appendChild(div);
    document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
  });
}

// VIDEO CALL LOGIC
async function getMedia(){
  return await navigator.mediaDevices.getUserMedia({ audio:true, video:true });
}

async function startCall(){
  isCaller=true;
  document.getElementById('callUI').classList.remove('hidden');
  localStream = await getMedia();
  document.getElementById('localVideo').srcObject = localStream;

  peerConnection = new RTCPeerConnection(servers);
  localStream.getTracks().forEach(t=> peerConnection.addTrack(t,localStream));
  peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
  peerConnection.onicecandidate = e => {
    if(e.candidate) db.ref("calls/"+myRoom+"/candidates").push(e.candidate.toJSON());
  };

  let offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  db.ref("calls/"+myRoom).set({ offer:offer, caller:myName });
}

function listenCall(){
  db.ref("calls/"+myRoom).on("value", async snap=>{
    let d = snap.val();
    if(!d) return;
    if(d.offer && !isCaller){
      document.getElementById('callUI').classList.remove('hidden');
      document.getElementById('incomingBox').classList.remove('hidden');
      document.getElementById('callerName').innerText = d.caller + " video calling...";
    }
    if(d.answer && isCaller){
      await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
      document.getElementById('callStatus').innerText="Connected";
    }
  });
  db.ref("calls/"+myRoom+"/candidates").on("child_added", snap=>{
    let c = new RTCIceCandidate(snap.val());
    peerConnection?.addIceCandidate(c);
  });
}

async function acceptCall(){
  isCaller=false;
  document.getElementById('incomingBox').classList.add('hidden');
  localStream = await getMedia();
  document.getElementById('localVideo').srcObject = localStream;

  peerConnection = new RTCPeerConnection(servers);
  localStream.getTracks().forEach(t=> peerConnection.addTrack(t,localStream));
  peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
  peerConnection.onicecandidate = e => {
    if(e.candidate) db.ref("calls/"+myRoom+"/candidates").push(e.candidate.toJSON());
  };

  let data = (await db.ref("calls/"+myRoom).get()).val();
  await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
  let answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  db.ref("calls/"+myRoom).update({answer:answer});
}

function endCall(){
  peerConnection?.getSenders().forEach(sender => sender.track.stop());
  peerConnection?.close();
  db.ref("calls/"+myRoom).remove();
  document.getElementById('callUI').classList.add('hidden');
  location.reload(); // Refresh to clear streams
}
function rejectCall(){ endCall(); }
</script>
</body>
</html>
