<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosquito Killer - Nishad Crafts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');
        body { font-family: sans-serif; overflow: hidden; touch-action: none; background: #020617; color: white; }
        .game-font { font-family: 'Bungee', cursive; }
        .room-bg { background-size: cover; background-position: center; height: 100vh; width: 100vw; position: relative; transition: 1s; }
        .mosquito { position: absolute; font-size: 3.5rem; z-index: 50; cursor: pointer; user-select: none; }
    </style>
</head>
<body>

    <audio id="slap-sound" src="https://assets.mixkit.co/active_storage/sfx/2157/2157-preview.mp3"></audio>

    <div id="home-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-slate-950">
        <h1 class="text-6xl text-red-600 game-font mb-12 text-center">MOSQUITO<br><span class="text-white text-4xl">KILLER</span></h1>
        <div class="flex flex-col gap-6 w-80">
            <button onclick="window.startMode('ai')" class="bg-blue-600 p-6 rounded-3xl font-black text-2xl shadow-[0_8px_0_#1d4ed8] active:translate-y-1">🤖 कंप्यूटर</button>
            <button id="match-btn" onclick="window.startMode('user')" class="bg-orange-600 p-6 rounded-3xl font-black text-2xl shadow-[0_8px_0_#c2410c] active:translate-y-1">👥 ऑनलाइन (Auto-Match)</button>
        </div>
        <p class="mt-8 text-slate-500 text-[10px] tracking-widest uppercase">Nishad Crafts Edition</p>
    </div>

    <div id="status-screen" class="hidden fixed inset-0 z-[90] flex flex-col items-center justify-center bg-black/95">
        <div class="w-16 h-16 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <div id="status-msg" class="text-xl font-bold animate-pulse">खिलाड़ी खोज रहे हैं...</div>
        <div id="countdown-text" class="hidden text-9xl font-black game-font text-yellow-500">3</div>
    </div>

    <div id="game-room" class="hidden room-bg flex flex-col">
        <div class="w-full p-4 flex justify-between items-center bg-black/80 border-b border-white/10">
            <div class="text-center"><p class="text-[10px] text-blue-400 font-bold">YOU</p><div id="score1" class="text-4xl font-black">0</div></div>
            <div class="text-center"><div id="timer" class="text-5xl font-black text-yellow-500 game-font">00</div></div>
            <div class="text-center"><p id="p2-label" class="text-[10px] text-red-400 font-bold">OPPONENT</p><div id="score2" class="text-4xl font-black">0</div></div>
        </div>
        <div id="room-area" class="relative flex-grow overflow-hidden"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzvw8YGIdYQ3YxB9NCMqjXL-yIWfuQPxs",
            authDomain: "ml-killer.firebaseapp.com",
            projectId: "ml-killer",
            storageBucket: "ml-killer.firebasestorage.app",
            messagingSenderId: "481192438237",
            appId: "1:481192438237:web:20cd6e7022738bf3d62e34",
            databaseURL: "https://ml-killer-default-rtdb.firebaseio.com" // ध्यान दें: यहाँ आपकी अपनी DB URL होनी चाहिए
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let peer, conn, myScore = 0, oppScore = 0, timeLeft = 0, gameActive = false, mode = '';
        const slap = document.getElementById('slap-sound');

        // फंक्शन को ग्लोबल बनाना ताकि बटन से कॉल हो सके
        window.startMode = function(m) {
            mode = m;
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('status-screen').classList.remove('hidden');

            if(mode === 'ai') {
                runCountdown(30);
            } else {
                initMultiplayer();
            }
        };

        function initMultiplayer() {
            peer = new Peer();
            peer.on('open', (myId) => {
                const lobbyRef = ref(db, 'lobby');
                
                get(lobbyRef).then((snapshot) => {
                    let found = false;
                    if (snapshot.exists()) {
                        snapshot.forEach((childSnap) => {
                            if (childSnap.val().status === 'waiting' && childSnap.key !== myId) {
                                found = true;
                                connectToPlayer(childSnap.key);
                                remove(ref(db, 'lobby/' + childSnap.key));
                                return true;
                            }
                        });
                    }

                    if (!found) {
                        set(ref(db, 'lobby/' + myId), { status: 'waiting' });
                        peer.on('connection', (c) => {
                            conn = c;
                            setupData();
                            runCountdown(90);
                        });
                    }
                });
            });

            peer.on('call', call => {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    call.answer(stream);
                    call.on('stream', remStream => { 
                        const audio = new Audio(); audio.srcObject = remStream; audio.play();
                    });
                });
            });
        }

        function connectToPlayer(tid) {
            conn = peer.connect(tid);
            setupData();
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                peer.call(tid, stream);
            });
            runCountdown(90);
        }

        function setupData() {
            conn.on('data', d => { if(d.type === 'kill') { oppScore = d.score; document.getElementById('score2').innerText = oppScore; } });
        }

        function runCountdown(time) {
            timeLeft = time;
            // रैंडम बैकग्राउंड (50+ options from Unsplash)
            const randomID = Math.floor(Math.random() * 500);
            document.querySelector('.room-bg').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1513694203232-719a280e022f?sig=${randomID}&w=1000')`;
            
            document.getElementById('status-msg').classList.add('hidden');
            const cd = document.getElementById('countdown-text');
            cd.classList.remove('hidden');

            let c = 3;
            const int = setInterval(() => {
                c--;
                if(c > 0) cd.innerText = c;
                else if(c === 0) cd.innerText = "GO!";
                else { 
                    clearInterval(int); 
                    document.getElementById('status-screen').classList.add('hidden'); 
                    document.getElementById('game-room').classList.remove('hidden'); 
                    startGame(); 
                }
            }, 1000);
        }

        function startGame() {
            gameActive = true;
            document.getElementById('p2-label').innerText = (mode === 'ai') ? "COMPUTER" : "PLAYER 2";
            setInterval(() => { if(gameActive) spawn(); }, 700);
            if(mode === 'ai') setInterval(() => { if(gameActive) aiAction(); }, 1100);
            const clock = setInterval(() => { 
                timeLeft--; 
                document.getElementById('timer').innerText = timeLeft; 
                if(timeLeft <= 0) { clearInterval(clock); endGame(); } 
            }, 1000);
        }

        function spawn() {
            const area = document.getElementById('room-area');
            const m = document.createElement('div');
            m.className = 'mosquito'; m.innerHTML = '🦟';
            m.style.left = Math.random() * (window.innerWidth - 80) + 'px';
            m.style.top = Math.random() * (window.innerHeight - 200) + 'px';
            m.onclick = () => { 
                myScore += 10; 
                document.getElementById('score1').innerText = myScore; 
                slap.currentTime = 0; slap.play(); 
                if(conn) conn.send({type:'kill', score:myScore}); 
                m.remove(); 
            };
            area.appendChild(m);
            setTimeout(() => { if(m.parentNode) m.remove(); }, 2500);
        }

        function aiAction() {
            const targets = Array.from(document.querySelectorAll('.mosquito'));
            if(targets.length > 0) { oppScore += 10; document.getElementById('score2').innerText = oppScore; targets[0].remove(); }
        }

        function endGame() { 
            gameActive = false; 
            alert(`खेल समाप्त!\nआपका स्कोर: ${myScore}\nविपक्षी: ${oppScore}`); 
            location.reload(); 
        }
    </script>
</body>
</html>
