<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Chat</title>

<style>
body{background:black;color:#0f0;font-family:monospace;text-align:center;margin:0;}
.box{margin:10px;padding:10px;border:1px solid #0f0;}

input,button{
width:90%;padding:10px;margin:5px;background:black;color:#0f0;border:1px solid #0f0;
}

video{width:45%;border:1px solid #0f0;margin:5px;}

#callWindow{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;
}
</style>
</head>

<body>

<h2 id="title">💀 SECRET CHAT 💀</h2>

<div class="box" id="menu">
<input id="name" placeholder="Enter Name">
<input id="room" type="password" inputmode="numeric" placeholder="Enter Room">
<button onclick="joinRoom()">Enter</button>
</div>

<div id="chatBox" style="display:none;">
<input id="msg"><button onclick="sendMsg()">Send</button>
<ul id="chat"></ul>

<button onclick="callUser()">📞 Call</button>
</div>

<div id="incoming" style="display:none;">
<p id="callerName"></p>
<button onclick="acceptCall()">Accept</button>
<button onclick="rejectCall()">Reject</button>
</div>

<div id="callWindow">
<h3>📞 Call Active</h3>
<video id="local" autoplay muted></video>
<video id="remote" autoplay></video>

<br>
<button onclick="toggleMute(event)">🔇 Mute</button>
<button onclick="endCall()">❌ End</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, get, onValue } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
databaseURL:"https://p2kc-b0553-default-rtdb.firebaseio.com"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let roomId,chatRef,name,pc,localStream;

// ENTER ROOM
window.joinRoom=async()=>{
name=document.getElementById("name").value;
roomId=document.getElementById("room").value;

if(name==="" || roomId===""){
alert("Name aur Room dono daal bhai 😅");
return;
}

chatRef=ref(db,"chat/"+roomId);

document.getElementById("menu").style.display="none";
document.getElementById("chatBox").style.display="block";
document.getElementById("title").innerText="🔐 Secret Chat - "+name;

// CHAT
onChildAdded(chatRef,d=>{
let li=document.createElement("li");
li.innerText=d.val().user + ": " + d.val().msg;
document.getElementById("chat").appendChild(li);
});

// CALL LISTENER
onValue(ref(db,"call/"+roomId),(snap)=>{
if(snap.exists()){
let data=snap.val();

if(data.caller !== name){
document.getElementById("incoming").style.display="block";
document.getElementById("callerName").innerText="📞 "+data.caller+" calling...";
}
}
});

// OFFER LISTENER (caller fix)
onValue(ref(db,"webrtc/"+roomId+"/answer"),async snap=>{
if(snap.exists() && pc){
let ans=new RTCSessionDescription(JSON.parse(snap.val()));
await pc.setRemoteDescription(ans);
}
});
}

// SEND MSG
window.sendMsg=()=>{
let m=document.getElementById("msg").value;
if(m!=="") push(chatRef,{user:name,msg:m});
}

// CREATE PEER
function createPeer(){
return new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});
}

// CALL
window.callUser=async()=>{
await set(ref(db,"call/"+roomId),{caller:name});

localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
document.getElementById("local").srcObject=localStream;

pc=createPeer();

localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

pc.ontrack=e=>{
document.getElementById("remote").srcObject=e.streams[0];
};

pc.onicecandidate=e=>{
if(e.candidate){
set(ref(db,"webrtc/"+roomId+"/candidate"),JSON.stringify(e.candidate));
}
};

let offer=await pc.createOffer();
await pc.setLocalDescription(offer);

set(ref(db,"webrtc/"+roomId+"/offer"),JSON.stringify(offer));

document.getElementById("callWindow").style.display="block";
}

// ACCEPT
window.acceptCall=async()=>{
document.getElementById("incoming").style.display="none";
document.getElementById("callWindow").style.display="block";

localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
document.getElementById("local").srcObject=localStream;

pc=createPeer();

localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

pc.ontrack=e=>{
document.getElementById("remote").srcObject=e.streams[0];
};

onValue(ref(db,"webrtc/"+roomId+"/offer"),async snap=>{
if(snap.exists()){
let offer=new RTCSessionDescription(JSON.parse(snap.val()));
await pc.setRemoteDescription(offer);

let answer=await pc.createAnswer();
await pc.setLocalDescription(answer);

set(ref(db,"webrtc/"+roomId+"/answer"),JSON.stringify(answer));
}
});

onValue(ref(db,"webrtc/"+roomId+"/candidate"),async snap=>{
if(snap.exists()){
let c=new RTCIceCandidate(JSON.parse(snap.val()));
await pc.addIceCandidate(c);
}
});
}

// REJECT
window.rejectCall=()=>{
set(ref(db,"call/"+roomId),null);
document.getElementById("incoming").style.display="none";
}

// MUTE
window.toggleMute=(e)=>{
let t=localStream.getAudioTracks()[0];
t.enabled=!t.enabled;
e.target.innerText=t.enabled?"🔇 Mute":"🤫 Muted";
}

// END
window.endCall=()=>{
document.getElementById("callWindow").style.display="none";
set(ref(db,"call/"+roomId),null);
}
</script>

</body>
</html>
