<!DOCTYPE html>
<html>
<head>
  <title>Private Chat</title>
</head>
<body>

<h2>🔐 Private Chat</h2>

<div id="login">
  <input id="room" placeholder="Enter Password">
  <button onclick="joinRoom()">Join</button>
</div>

<div id="chatBox" style="display:none;">
  <input id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send</button>
  <ul id="chat"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let chatRef;

// 🔐 Join room
window.joinRoom = function(){
  let room = document.getElementById("room").value;

  if(room == ""){
    alert("Password daalo bhai 😅");
    return;
  }

  chatRef = ref(db, "chat/" + room);

  document.getElementById("login").style.display = "none";
  document.getElementById("chatBox").style.display = "block";

  // receive msg
  onChildAdded(chatRef, (data)=>{
    let li = document.createElement("li");
    li.innerText = data.val();
    document.getElementById("chat").appendChild(li);
  });
}

// 💬 Send msg
window.sendMsg = function(){
  let msg = document.getElementById("msg").value;
  push(chatRef, msg);
}
</script>

</body>
</html>
