<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nishad Crafts - Pro Sync Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');
        body { font-family: sans-serif; overflow: hidden; touch-action: none; background: #000; color: white; margin: 0; }
        .game-font { font-family: 'Bungee', cursive; }
        
        .room-bg { 
            background-size: cover; background-position: center; 
            height: 100vh; width: 100vw; position: relative; 
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.5)), url('https://picsum.photos/seed/sync/1200/800');
        }

        /* 10 Species Styles */
        .mosquito { position: absolute; z-index: 50; cursor: pointer; user-select: none; }
        .sp-1 { font-size: 2.5rem; filter: sepia(1); animation: move1 3s infinite; }
        .sp-2 { font-size: 2rem; filter: hue-rotate(90deg); animation: move2 1s infinite; }
        .sp-3 { font-size: 4rem; filter: brightness(0.5); animation: move3 5s infinite; }
        .sp-4 { font-size: 3rem; filter: hue-rotate(200deg); animation: move1 2s infinite; }
        .sp-5 { font-size: 2.8rem; filter: drop-shadow(0 0 5px red); animation: move2 4s infinite; }
        .sp-6 { font-size: 3.2rem; filter: invert(1); animation: move3 2s infinite; }
        .sp-7 { font-size: 2.2rem; filter: saturate(5); animation: move1 1.5s infinite; }
        .sp-8 { font-size: 3.5rem; opacity: 0.6; animation: move2 0.5s infinite; }
        .sp-9 { font-size: 2.6rem; filter: sepia(0.8); animation: move3 3s infinite; }
        .sp-10 { font-size: 3.8rem; filter: contrast(2); animation: move1 4s infinite; }

        @keyframes move1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px, 30px); } }
        @keyframes move2 { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3) translateX(20px); } }
        @keyframes move3 { 0%,100% { transform: rotate(0); } 50% { transform: rotate(20deg) translateY(-20px); } }

        /* Realistic Blood Image Splatter */
        .blood-stain {
            position: absolute; pointer-events: none; z-index: 40;
            width: 140px; height: 140px;
            /* Yahan apni image ka link dalein */
            background-image: url('https://www.transparentpng.com/download/blood/red-blood-splatter-png-21.png');
            background-size: contain; background-repeat: no-repeat;
            animation: splatAnim 1s forwards;
        }

        @keyframes splatAnim {
            0% { transform: scale(0); opacity: 0; }
            20% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1) translateY(40px); opacity: 0; }
        }

        .mic-container { position: absolute; bottom: 175px; left: 50%; transform: translateX(-50%); z-index: 100; }
    </style>
</head>
<body>

    <audio id="slap-sound" src="kill.mp3" preload="auto"></audio>
    <audio id="buzz-sound" src="mos.mp3" loop preload="auto"></audio>

    <div id="home-screen" class="fixed inset-0 z-[110] flex flex-col items-center justify-center bg-slate-950 p-6 text-center">
        <h1 class="text-5xl text-red-600 game-font mb-4">NISHAD CRAFTS<br><span class="text-white text-3xl">STABLE SYNC v3</span></h1>
        <div class="flex flex-col gap-6 w-full max-w-xs mt-10">
            <button onclick="window.startMode('ai')" class="bg-red-700 p-6 rounded-3xl font-black text-2xl shadow-[0_8px_0_#450a0a]">VS COMPUTER</button>
            <button onclick="window.startMode('user')" class="bg-orange-600 p-6 rounded-3xl font-black text-2xl shadow-[0_8px_0_#c2410c]">ONLINE BATTLE</button>
        </div>
    </div>

    <div id="game-room" class="hidden room-bg flex flex-col">
        <div class="w-full p-4 flex justify-between items-center bg-black/90 border-b-2 border-red-900/50">
            <div class="text-center"><p class="text-[10px] text-blue-400 font-bold uppercase">You</p><div id="score1" class="text-4xl font-black">0</div></div>
            <div id="timer" class="text-5xl font-black text-white game-font">30</div>
            <div class="text-center"><p id="p2-label" class="text-[10px] text-red-500 font-bold uppercase">Enemy</p><div id="score2" class="text-4xl font-black">0</div></div>
        </div>
        <div id="room-area" class="relative flex-grow overflow-hidden"></div>
        <div id="mic-section" class="hidden mic-container flex flex-col items-center gap-2">
            <button id="mic-btn" onclick="window.toggleMic()" class="bg-black/90 border-2 border-red-600 p-6 rounded-full shadow-[0_0_20px_red]">
                <span id="mic-icon" class="text-3xl">🎙️</span>
            </button>
            <p id="mic-status" class="text-[10px] font-bold text-red-500">VOICE SYNCED</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzvw8YGIdYQ3YxB9NCMqjXL-yIWfuQPxs",
            authDomain: "ml-killer.firebaseapp.com",
            projectId: "ml-killer",
            storageBucket: "ml-killer.firebasestorage.app",
            messagingSenderId: "481192438237",
            appId: "1:481192438237:web:20cd6e7022738bf3d62e34",
            databaseURL: "https://ml-killer-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let peer, conn, localStream, myScore = 0, oppScore = 0, timeLeft = 30, gameActive = false, mode = '';
        const slap = document.getElementById('slap-sound');
        const buzz = document.getElementById('buzz-sound');

        window.startMode = async function(m) {
            mode = m;
            try { buzz.volume = 0.3; await buzz.play(); } catch(e) {}
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-room').classList.remove('hidden');
            
            if(mode === 'user') {
                document.getElementById('mic-section').classList.remove('hidden');
                initPeerConnection();
            } else {
                startGame();
            }
        };

        function initPeerConnection() {
            peer = new Peer();
            peer.on('open', (id) => {
                onDisconnect(ref(db, 'lobby/' + id)).remove();
                get(ref(db, 'lobby')).then(snap => {
                    let target = null;
                    if(snap.exists()) {
                        for(let k in snap.val()) { if(k !== id) { target = k; break; } }
                    }
                    if(target) { connect(target); remove(ref(db, 'lobby/' + target)); }
                    else { set(ref(db, 'lobby/' + id), { status: 'waiting' }); }
                });
            });

            peer.on('connection', c => { conn = c; setupDataChannel(); startGame(); });
            peer.on('call', async call => {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                call.answer(localStream);
                call.on('stream', s => { const a = new Audio(); a.srcObject = s; a.play(); });
            });
        }

        async function connect(tid) {
            conn = peer.connect(tid);
            setupDataChannel();
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const call = peer.call(tid, localStream);
            call.on('stream', s => { const a = new Audio(); a.srcObject = s; a.play(); });
            startGame();
        }

        function setupDataChannel() {
            conn.on('data', d => {
                if(d.type === 'score') {
                    oppScore = d.val;
                    document.getElementById('score2').innerText = oppScore;
                }
            });
        }

        function startGame() {
            gameActive = true;
            if(mode === 'ai') document.getElementById('p2-label').innerText = "COMPUTER";
            
            const spawner = setInterval(() => { if(gameActive) spawn(); }, 700);
            if(mode === 'ai') setInterval(() => { if(gameActive) { oppScore += 10; document.getElementById('score2').innerText = oppScore; } }, 1500);
            
            const timerInt = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(timerInt); clearInterval(spawner); endGame(); }
            }, 1000);
        }

        function spawn() {
            const area = document.getElementById('room-area');
            const m = document.createElement('div');
            const sid = Math.floor(Math.random() * 10) + 1;
            m.className = `mosquito sp-${sid}`;
            m.innerHTML = '🦟';
            m.style.left = Math.random() * (window.innerWidth - 80) + 'px';
            m.style.top = Math.random() * (window.innerHeight - 450) + 'px';
            
            m.onclick = (e) => {
                myScore += 10;
                document.getElementById('score1').innerText = myScore;
                slap.currentTime = 0; slap.play();
                createSplat(e.clientX, e.clientY);
                if(conn && conn.open) conn.send({type: 'score', val: myScore});
                m.remove();
            };
            area.appendChild(m);
            setTimeout(() => { if(m.parentNode) m.remove(); }, 2500);
        }

        function createSplat(x, y) {
            const s = document.createElement('div');
            s.className = 'blood-stain';
            s.style.left = (x - 70) + 'px';
            s.style.top = (y - 70) + 'px';
            s.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.getElementById('room-area').appendChild(s);
            setTimeout(() => s.remove(), 1000);
        }

        window.toggleMic = function() {
            if(!localStream) return;
            const enabled = localStream.getAudioTracks()[0].enabled;
            localStream.getAudioTracks()[0].enabled = !enabled;
            document.getElementById('mic-icon').innerText = !enabled ? "🎙️" : "🔇";
        };

        function endGame() { gameActive = false; buzz.pause(); alert("Game Over! Nishad Crafts Score: " + myScore); location.reload(); }
    </script>
</body>
</html>
