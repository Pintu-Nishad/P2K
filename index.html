<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K SECURE V13 PRO - FIXED</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --accent: #00a884; --outgoing: #005c4b; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: #e9edef; font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: linear-gradient(rgba(11,20,26,0.9), rgba(11,20,26,0.9)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { position: relative; padding: 10px; border-radius: 12px; max-width: 85%; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .incoming { background: var(--panel); align-self: flex-start; border-bottom-left-radius: 2px; }
        .outgoing { background: var(--outgoing); align-self: flex-end; border-bottom-right-radius: 2px; }
        
        #callUI { position: fixed; inset: 0; z-index: 2000; background: #000; display: none; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        /* Video Size Toggle Logic */
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 10px; border: 2px solid var(--accent); object-fit: cover; z-index: 2100; transition: 0.3s; }
        #localVideo.large { width: 100%; height: 100%; top: 0; right: 0; border-radius: 0; border: none; }
        
        .call-tools { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 12px; z-index: 2200; }
        .t-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; items-center; justify-content: center; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="loginDiv" class="fixed inset-0 z-[3000] bg-[#0b141a] flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-[#111b21] p-8 rounded-3xl border border-[#202c33] text-center">
        <h1 class="text-2xl font-bold text-white mb-6 uppercase tracking-widest">P2K SECURE</h1>
        <input id="user" type="text" placeholder="Name" class="w-full bg-[#2a3942] rounded-xl p-4 mb-4 outline-none text-white">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-[#2a3942] rounded-xl p-4 mb-8 outline-none text-white">
        <button onclick="enter()" class="w-full bg-[#00a884] py-4 rounded-xl font-bold text-[#111b21]">CONNECT</button>
    </div>
</div>

<div id="chatDiv" class="hidden h-full flex flex-col">
    <header class="h-16 bg-[#111b21] flex items-center justify-between px-4 border-b border-white/5">
        <div id="userCounter" class="text-[11px] text-[#00a884]">● 0 Online</div>
        <h2 id="roomTitle" class="text-xs font-bold text-white uppercase tracking-tighter">Room</h2>
        <button onclick="startCall()" class="bg-[#00a884] px-4 py-2 rounded-full text-[#111b21] font-bold text-xs">CALL</button>
    </header>
    <div id="chatBox"></div>
    <footer class="p-4 bg-[#111b21] pb-8">
        <div class="flex items-center gap-3">
            <input type="file" id="fileInput" accept="image/*" onchange="sendPhoto(this)" class="hidden">
            <button onclick="document.getElementById('fileInput').click()" class="text-[#8696a0]">📎</button>
            <input id="msgInput" type="text" placeholder="Message..." class="flex-1 bg-[#2a3942] rounded-full px-4 py-2 text-sm outline-none text-white">
            <button onclick="sendMsg()" class="bg-[#00a884] p-2 rounded-full text-[#111b21]">➤</button>
        </div>
    </footer>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted onclick="this.classList.toggle('large')"></video>
    <div class="call-tools">
        <button id="muteBtn" onclick="toggleMute()" class="t-btn">🎤</button>
        <button id="camBtn" onclick="toggleCam()" class="t-btn">📹</button>
        <button onclick="switchCamera()" class="t-btn">🔄</button>
        <button onclick="endCall()" class="t-btn bg-red-600">📞</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", authDomain: "p2kc-b0553.firebaseapp.com", databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", projectId: "p2kc-b0553" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName, myRoom, localStream, peerConnection, currentFacingMode="user", isMuted=false, isCamOff=false, callAccepted=false;

    function enter(){
        myName = user.value.trim(); myRoom = pass.value.trim();
        if(!myName || !myRoom) return;
        loginDiv.style.display="none"; chatDiv.classList.remove('hidden');
        roomTitle.innerText = myRoom;
        db.ref(`rooms/${myRoom}/users/${myName}`).set(true);
        db.ref(`rooms/${myRoom}/users/${myName}`).onDisconnect().remove();
        db.ref(`rooms/${myRoom}/users`).on('value', s => userCounter.innerText = "● " + s.numChildren() + " Online");
        listenMsgs(); listenCall();
    }

    function sendMsg(){
        const text = msgInput.value.trim(); if(!text) return;
        const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: text, type: 'text', time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
        msgInput.value=""; setTimeout(() => ref.remove(), 60000);
    }

    function sendPhoto(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = e => {
            const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: e.target.result, type: 'image', time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
            setTimeout(() => ref.remove(), 60000);
        };
        reader.readAsDataURL(input.files[0]);
    }

    function listenMsgs(){
        db.ref(`rooms/${myRoom}/msgs`).on("child_added", s=>{
            let d = s.val(), id = s.key, isMe = (d.u == myName);
            let div = document.createElement("div");
            div.className = `msg ${isMe ? 'outgoing' : 'incoming'}`;
            div.id = "msg-"+id;
            
            let delBtn = isMe ? `<button onclick="db.ref('rooms/${myRoom}/msgs/${id}').remove()" class="text-[10px] ml-2 opacity-50">🗑️</button>` : "";
            let downBtn = (!isMe && d.type==='image') ? `<button onclick="saveImg('${d.val}')" class="text-[10px] text-blue-400 ml-2">⬇️</button>` : "";

            div.innerHTML = `<div class="flex justify-between text-[9px] font-bold mb-1"><span>${d.u}</span><div>${downBtn}${delBtn}</div></div>
                ${d.type==='image' ? `<img src="${d.val}" class="rounded-lg max-h-64">` : d.val}
                <div class="text-[7px] text-right mt-1 opacity-50">${d.time}</div>`;
            chatBox.appendChild(div); chatBox.scrollTop = chatBox.scrollHeight;
        });
        db.ref(`rooms/${myRoom}/msgs`).on("child_removed", s => { document.getElementById("msg-"+s.key)?.remove(); });
    }

    function saveImg(url) { const a = document.createElement('a'); a.href=url; a.download="secure_p2k.jpg"; a.click(); }

    // Video Call Logic
    async function startCall(){
        callUI.style.display="block";
        localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:{width:1280, height:720, facingMode:currentFacingMode}});
        document.getElementById('localVideo').srcObject = localStream;
        setupPeer();
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        db.ref(`calls/${myRoom}`).set({offer:offer, caller:myName});
    }

    function setupPeer(){
        peerConnection = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
        localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
        peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
        peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${myRoom}/candidates/${myName}`).push(e.candidate.toJSON()); };
    }

    function listenCall(){
        db.ref(`calls/${myRoom}`).on("value", async snap=>{
            let d = snap.val(); 
            if(!d) { if(peerConnection) endCall(); return; }
            if(d.offer && d.caller !== myName && !callAccepted){
                if(confirm("Call from " + d.caller)){
                    callAccepted = true;
                    callUI.style.display="block";
                    localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:true});
                    document.getElementById('localVideo').srcObject = localStream;
                    setupPeer();
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer));
                    const ans = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(ans);
                    db.ref(`calls/${myRoom}`).update({answer:ans});
                }
            }
            if(d.answer && d.caller === myName) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
        });
        db.ref(`calls/${myRoom}/candidates`).on("child_added", s=>{
            if(s.key !== myName) s.ref.on("child_added", c=>{ if(peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(c.val())); });
        });
    }

    function endCall(){ 
        db.ref(`calls/${myRoom}`).remove(); 
        if(localStream) localStream.getTracks().forEach(t=>t.stop()); 
        if(peerConnection) peerConnection.close(); 
        peerConnection=null; callUI.style.display="none"; callAccepted=false;
    }

    function toggleMute(){ isMuted=!isMuted; localStream.getAudioTracks()[0].enabled=!isMuted; muteBtn.classList.toggle('bg-red-500', isMuted); }
    function toggleCam(){ isCamOff=!isCamOff; localStream.getVideoTracks()[0].enabled=!isCamOff; camBtn.classList.toggle('bg-red-500', isCamOff); }

    async function switchCamera(){
        if(!localStream) return;
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        const videoTrack = localStream.getVideoTracks()[0];
        videoTrack.stop();
        const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
        const newTrack = newStream.getVideoTracks()[0];
        localStream.removeTrack(videoTrack);
        localStream.addTrack(newTrack);
        document.getElementById('localVideo').srcObject = localStream;
        if(peerConnection){
            const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
            sender.replaceTrack(newTrack);
        }
    }
</script>
<script src="extra-features.js"></script>

</body>
</html>
