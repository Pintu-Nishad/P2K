<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K SECURE V29 - RTC PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Manrope:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #10b981; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Manrope', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        .header { height: 70px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; z-index: 50; }
        .msg-area { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle, #0f172a 0%, #020617 100%); padding-bottom: 140px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px); padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); animation: slide 0.3s ease; }
        @keyframes slide { from { transform: translateY(5px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .in { background: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; }
        .out { background: linear-gradient(135deg, #059669, #10b981); align-self: flex-end; border-bottom-right-radius: 4px; }
        .btn-meme { width: 35px; height: 35px; cursor: pointer; transition: 0.2s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        #loginDiv { position: fixed; inset: 0; z-index: 10001; background: #020617; display: flex; align-items: center; justify-content: center; padding: 20px; }
        audio { height: 35px; width: 180px; filter: invert(1); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loginDiv">
    <div class="w-full max-w-sm bg-slate-900/50 p-10 rounded-[40px] border border-white/10 text-center">
        <h1 style="font-family: 'Orbitron';" class="text-3xl font-black text-emerald-400 mb-8 tracking-wider">P2K SECURE</h1>
        <input id="user" type="text" placeholder="Name" class="w-full bg-slate-800 rounded-2xl p-5 mb-4 outline-none border border-transparent focus:border-emerald-500">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-slate-800 rounded-2xl p-5 mb-8 outline-none border border-transparent focus:border-emerald-500">
        <button onclick="enter()" class="w-full bg-emerald-600 py-5 rounded-2xl font-bold text-white shadow-xl active:scale-95 transition-all">CONNECT</button>
    </div>
</div>

<div id="appUI" class="hidden h-full flex flex-col">
    <header class="header flex items-center justify-between px-6">
        <div>
            <div id="userCounter" class="text-emerald-400 font-bold text-xs">● Loading...</div>
            <div id="typingInfo" class="text-[9px] text-white/50 italic"></div>
        </div>
        <div class="flex gap-4">
            <button onclick="startCall()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435905.png" class="btn-meme"></button>
            <button onclick="askNotify()"><img src="https://cdn-icons-png.flaticon.com/512/3602/3602145.png" class="btn-meme"></button>
        </div>
    </header>

    <div id="chatBox" class="msg-area"></div>

    <footer class="footer">
        <div class="flex items-center gap-3 bg-slate-800/60 rounded-full px-5 py-1.5 border border-white/5">
            <input type="file" id="fileIn" accept="image/*" onchange="sendPhoto(this)" class="hidden">
            <button onclick="document.getElementById('fileIn').click()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435911.png" class="btn-meme"></button>
            <button id="recBtn"><img src="https://cdn-icons-png.flaticon.com/512/3602/3602157.png" class="btn-meme"></button>
            <input id="msgInput" type="text" placeholder="Message..." class="flex-1 bg-transparent py-3 text-sm outline-none text-white">
            <button onclick="sendMsg()"><img src="https://cdn-icons-png.flaticon.com/512/10435/10435882.png" class="btn-meme"></button>
        </div>
        <button id="hangupBtn" onclick="endRTC()" class="hidden w-full mt-3 bg-red-600 py-2 rounded-full font-black text-[10px] uppercase">Leave Call</button>
    </footer>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", authDomain: "p2kc-b0553.firebaseapp.com", databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", projectId: "p2kc-b0553" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName, myRoom, localStream, pc, mediaRec, chunks = [];
    const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

    // Security
    window.onkeyup = e => { if(e.key==='PrintScreen') { navigator.clipboard.writeText(""); alert("🔒"); }};

    function enter() {
        myName = user.value.trim(); myRoom = pass.value.trim();
        if(!myName || !myRoom) return;
        loginDiv.style.display="none"; appUI.classList.remove('hidden');
        db.ref(`rooms/${myRoom}/users/${myName}`).set(true);
        db.ref(`rooms/${myRoom}/users`).on('value', s => userCounter.innerText = "● Online: " + s.numChildren());
        listenMsgs(); setupVoice(); setupTyping(); listenForRTC();
    }

    // --- REAL RTC LOGIC (THE HEART) ---
    async function startCall() {
        hangupBtn.classList.remove('hidden');
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        pc = new RTCPeerConnection(config);
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        
        pc.onicecandidate = e => { if(e.candidate) db.ref(`rooms/${myRoom}/rtc/ice/${myName}`).push(e.candidate.toJSON()); };
        pc.ontrack = e => { let a = document.createElement("audio"); a.autoplay = true; a.srcObject = e.streams[0]; document.body.appendChild(a); };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        db.ref(`rooms/${myRoom}/rtc/offer`).set({ sdp: offer.sdp, type: offer.type, from: myName });
    }

    function listenForRTC() {
        db.ref(`rooms/${myRoom}/rtc/offer`).on('value', async s => {
            const d = s.val();
            if (d && d.from !== myName && !pc) {
                if(confirm("Incoming Audio Call... Answer?")) {
                    hangupBtn.classList.remove('hidden');
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    pc = new RTCPeerConnection(config);
                    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
                    pc.onicecandidate = e => { if(e.candidate) db.ref(`rooms/${myRoom}/rtc/ice/${myName}`).push(e.candidate.toJSON()); };
                    pc.ontrack = e => { let a = document.createElement("audio"); a.autoplay = true; a.srcObject = e.streams[0]; document.body.appendChild(a); };

                    await pc.setRemoteDescription(new RTCSessionDescription(d));
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    db.ref(`rooms/${myRoom}/rtc/answer`).set({ sdp: ans.sdp, type: ans.type, to: d.from });
                }
            }
        });

        db.ref(`rooms/${myRoom}/rtc/answer`).on('value', async s => {
            const d = s.val();
            if (d && d.to === myName && pc) await pc.setRemoteDescription(new RTCSessionDescription(d));
        });

        db.ref(`rooms/${myRoom}/rtc/ice`).on('child_added', s => {
            if (s.key !== myName) s.ref.on('child_added', c => { if (pc) pc.addIceCandidate(new RTCIceCandidate(c.val())); });
        });
    }

    function endRTC() {
        localStream?.getTracks().forEach(t => t.stop());
        pc?.close(); pc = null;
        db.ref(`rooms/${myRoom}/rtc`).remove();
        location.reload();
    }

    // --- MESSAGING & VOICE NOTES ---
    function sendMsg() { const v = msgInput.value.trim(); if(v) sendData(v, 'text'); msgInput.value=""; }
    function sendPhoto(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => sendData(e.target.result, 'img'); r.readAsDataURL(i.files[0]); } }
    function sendData(val, type) {
        const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val, type, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
        setTimeout(() => ref.remove(), 60000); 
    }

    async function setupVoice() {
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(s);
        mediaRec.ondataavailable = e => chunks.push(e.data);
        mediaRec.onstop = () => {
            const b = new Blob(chunks, { type: 'audio/webm' });
            const r = new FileReader();
            r.onload = e => sendData(e.target.result, 'voice');
            r.readAsDataURL(b); chunks = [];
        };
        recBtn.onmousedown = () => { mediaRec.start(); recBtn.style.filter="hue-rotate(90deg)"; };
        recBtn.onmouseup = () => { mediaRec.stop(); recBtn.style.filter="none"; };
    }

    function listenMsgs() {
        db.ref(`rooms/${myRoom}/msgs`).on("child_added", s => {
            const d = s.val(), id = s.key;
            const div = document.createElement("div");
            const isMe = d.u === myName;
            div.className = `msg ${isMe ? 'out' : 'in'}`;
            div.id = "m-"+id;
            let c = d.val;
            if(d.type==='img') c = `<img src="${d.val}" class="rounded-xl">`;
            if(d.type==='voice') c = `<audio controls src="${d.val}"></audio>`;
            div.innerHTML = `<div class="text-[9px] font-black opacity-50 mb-1">${d.u}</div>${c}<div class="text-[8px] text-right mt-1 opacity-30">${d.time}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
        db.ref(`rooms/${myRoom}/msgs`).on("child_removed", s => document.getElementById("m-"+s.key)?.remove());
    }

    function setupTyping() {
        msgInput.oninput = () => { db.ref(`rooms/${myRoom}/tp/${myName}`).set(true); clearTimeout(window.t); window.t = setTimeout(()=>db.ref(`rooms/${myRoom}/tp/${myName}`).remove(),2000); };
        db.ref(`rooms/${myRoom}/tp`).on('value', s => { let t=[]; s.forEach(u=>{ if(u.key!==myName) t.push(u.key); }); typingInfo.innerText = t.length>0 ? t.join(",")+" typing..." : ""; });
    }
    function askNotify() { Notification.requestPermission(); }
</script>
</body>
</html>
