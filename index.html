<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Secret Chat Audio</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;}
.container{max-width:450px;margin:auto;padding:16px;}
h2{text-align:center;background:#111827;padding:10px;border-radius:6px;}
input,button{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:none;}
button{background:#2563eb;color:white;font-weight:bold;cursor:pointer;}
ul{list-style:none;padding:0;}
li{background:#111827;margin:6px 0;padding:8px;border-radius:6px;}
audio{width:100%;}
.hidden{display:none;}
</style>
</head>
<body>

<h2>🔐 Secret Chat Audio</h2>

<div id="menu" class="container">
  <input id="name" placeholder="Your Name (min 4 letters)">
  <input id="room" type="password" placeholder="Room">
  <input id="phone" placeholder="+91xxxxxxxxxx">
  <div id="recaptcha-container"></div>
  <button onclick="sendOTP()">Send OTP</button>
  <input id="otp" placeholder="Enter OTP" class="hidden">
  <button id="verifyBtn" class="hidden" onclick="verifyOTP()">Verify OTP</button>
</div>

<div id="chatBox" class="container hidden">
  <p>Room: <span id="roomDisplay"></span></p>
  <button onclick="exitRoom()">Exit Room</button>

  <input id="msg" placeholder="Type message"><button onclick="sendMsg()">Send</button>
  <ul id="chat"></ul>

  <button onclick="callUser()">📞 Audio Call</button>
</div>

<div id="incoming" class="container hidden">
  <p id="callerName"></p>
  <button onclick="acceptCall()">Accept</button>
  <button onclick="rejectCall()">Reject</button>
</div>

<div id="callWindow" class="container hidden">
  <h3>📞 Audio Call</h3>
  <audio id="localAudio" autoplay muted></audio>
  <audio id="remoteAudio" autoplay></audio>
  <button onclick="toggleMute()">🔇 Mute/Unmute</button>
  <button onclick="endCall()">❌ End</button>
</div>

<audio id="ringtone" src="ring.mp3" loop></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, push, set, get, onValue, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// 🔥 Your Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553",
  storageBucket: "p2kc-b0553.appspot.com",
  messagingSenderId: "939347031406",
  appId: "1:939347031406:web:998f52b262a0cecf11bd7f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let name, roomId, phoneNumber, confirmationResult, pc, localStream;
let lastMsg="";

// Setup invisible reCAPTCHA
window.recaptchaVerifier = new RecaptchaVerifier('recaptcha-container', {
  'size': 'invisible'
}, auth);

function validName(n) {
  let l = n.replace(/[^A-Za-z]/g,'');
  return l.length >= 4 && l.length <= 15;
}

window.sendOTP = () => {
  phoneNumber = document.getElementById("phone").value.trim();
  if (!phoneNumber) return alert("Enter phone number");

  signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
    .then(result => {
       confirmationResult = result;
       alert("OTP sent ✓");
       document.getElementById("otp").classList.remove("hidden");
       document.getElementById("verifyBtn").classList.remove("hidden");
    })
    .catch(err => alert("Error sending OTP"));
};

window.verifyOTP = () => {
  const code = document.getElementById("otp").value.trim();
  confirmationResult.confirm(code)
    .then(resp => {
       alert("Phone verified ✓");
       document.getElementById("menu").classList.add("hidden");
       document.getElementById("chatBox").classList.remove("hidden");

       name = document.getElementById("name").value.trim();
       roomId = document.getElementById("room").value.trim();

       if (!validName(name)) return alert("Invalid name");
       if (!roomId) return alert("Room required");

       set(ref(db,"users/"+roomId+"/"+name),true);
       document.getElementById("roomDisplay").innerText = roomId;

       setupChat();
    })
    .catch(err => alert("Wrong OTP"));
};

function setupChat() {
  onChildAdded(ref(db,"chat/"+roomId),(d)=>{
    let li=document.createElement("li");
    li.innerText = d.val().user + ": " + d.val().msg;
    document.getElementById("chat").insertBefore(li, document.getElementById("chat").firstChild);
  });
}

// SEND MESSAGE
window.sendMsg = () => {
  let txt = document.getElementById("msg").value.trim();
  if (!txt || txt===lastMsg) return;
  lastMsg = txt;
  push(ref(db,"chat/"+roomId),{user:name,msg:txt});
  document.getElementById("msg").value="";
}

// AUDIO CALL
async function getAudio(){ return await navigator.mediaDevices.getUserMedia({audio:true}); }
function createPeer(){
  pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
  pc.ontrack = e => document.getElementById("remoteAudio").srcObject = e.streams[0];
  pc.onicecandidate = e => { if(e.candidate) push(ref(db,"webrtc/"+roomId+"/candidates"),JSON.stringify(e.candidate)); };
}

window.callUser = async () => {
  let snap = await get(ref(db,"call/"+roomId));
  if (snap.exists()) return alert("Call in progress");
  set(ref(db,"call/"+roomId),{caller:name});

  localStream = await getAudio();
  document.getElementById("localAudio").srcObject = localStream;

  createPeer();
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  let offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  set(ref(db,"webrtc/"+roomId+"/offer"),JSON.stringify(offer));

  onValue(ref(db,"webrtc/"+roomId+"/answer"),async s=>{
    if(s.exists() && !pc.currentRemoteDescription){
      await pc.setRemoteDescription(JSON.parse(s.val()));
      document.getElementById("callWindow").classList.remove("hidden");
    }
  });

};

window.acceptCall = async()=>{
  localStream = await getAudio();
  document.getElementById("localAudio").srcObject = localStream;

  createPeer();
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  let offerSnap = await get(ref(db,"webrtc/"+roomId+"/offer"));
  if(!offerSnap.exists()) return alert("No offer");
  await pc.setRemoteDescription(JSON.parse(offerSnap.val()));

  let answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  set(ref(db,"webrtc/"+roomId+"/answer"),JSON.stringify(answer));

  document.getElementById("callWindow").classList.remove("hidden");
};

window.rejectCall = ()=>{ remove(ref(db,"call/"+roomId)); };

window.toggleMute = ()=>{ let t=localStream.getAudioTracks()[0]; t.enabled=!t.enabled; };

window.endCall = ()=>{ remove(ref(db,"call/"+roomId)); document.getElementById("callWindow").classList.add("hidden"); };

</script>
</body>
</html>
