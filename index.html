<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K Pro Video Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        body { background-color: #0b141a; color: #e9edef; font-family: sans-serif; overflow: hidden; }
        #chatBox { height: calc(100vh - 130px); overflow-y: auto; padding: 15px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #0b141a; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #202c33; padding: 8px 12px; border-radius: 8px; max-width: 85%; align-self: flex-start; }
        .my-msg { background: #005c4b; align-self: flex-end; }
        
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 110px; height: 160px; object-fit: cover; border-radius: 12px; border: 2px solid #00a884; z-index: 50; background: #2a3942; }
        .control-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 12px; rounded-full: 50%; transition: all 0.3s; }
        .control-btn:active { transform: scale(0.9); }
        .btn-active { background: #00a884 !important; color: #000 !important; }
    </style>
</head>
<body class="h-screen flex flex-col">

<div id="loginDiv" class="fixed inset-0 z-[1000] bg-[#111b21] flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-[#202c33] p-8 rounded-2xl text-center border border-gray-700 shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-[#00a884]">P2K Pro Video</h1>
        <input id="user" type="text" placeholder="Your Name" class="w-full bg-[#2a3942] rounded-lg p-3 mb-4 outline-none text-white border border-transparent focus:border-[#00a884]">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-[#2a3942] rounded-lg p-3 mb-6 outline-none text-white border border-transparent focus:border-[#00a884]">
        <button onclick="enter()" class="w-full bg-[#00a884] py-3 rounded-lg font-bold text-[#111b21] hover:bg-[#06cf9c]">Join Room</button>
    </div>
</div>

<div id="chatDiv" class="hidden flex flex-col h-full w-full">
    <header class="h-16 bg-[#202c33] flex items-center justify-between px-4 border-b border-gray-700">
        <b id="roomTitle" class="text-[#00a884]">Room</b>
        <button onclick="startCall()" class="bg-[#00a884] text-[#111b21] px-4 py-2 rounded-full font-bold text-sm shadow-lg">Video Call</button>
    </header>

    <div id="chatBox"></div>

    <footer class="p-3 bg-[#202c33] flex items-center gap-2">
        <input id="msgInput" type="text" placeholder="Type a message..." class="flex-1 bg-[#2a3942] rounded-full px-5 py-2.5 outline-none border-none">
        <button onclick="sendMsg()" class="bg-[#00a884] p-3 rounded-full text-[#111b21] font-bold">Send</button>
    </footer>
</div>

<div id="callUI" class="hidden fixed inset-0 z-[500] bg-black">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    
    <div id="incomingBox" class="hidden absolute inset-0 bg-black/90 flex flex-col justify-center items-center z-[600] animate-pulse">
        <div class="w-24 h-24 bg-[#00a884] rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_#00a884]">
            <svg class="w-12 h-12 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zM14.553 7.106A1 1 0 0014 8v4a1 1 0 00.553.894l2 1A1 1 0 0018 13V7a1 1 0 00-1.447-.894l-2 1z"/></svg>
        </div>
        <h2 id="callerName" class="text-2xl font-bold mb-8 text-white"></h2>
        <div class="flex gap-6">
            <button onclick="acceptCall()" class="bg-green-500 text-white px-10 py-4 rounded-full font-bold text-lg shadow-lg">Answer</button>
            <button onclick="rejectCall()" class="bg-red-500 text-white px-10 py-4 rounded-full font-bold text-lg shadow-lg">Decline</button>
        </div>
    </div>

    <div class="absolute bottom-10 left-0 right-0 flex justify-center items-center gap-4 z-[700]">
        <button id="muteBtn" onclick="toggleMute()" class="control-btn rounded-full bg-white/10 text-white">🎤</button>
        <button onclick="endCall()" class="bg-red-600 p-5 rounded-full shadow-2xl transform hover:scale-110">
            <svg class="w-8 h-8 text-white rotate-[135deg]" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 005.456 5.456l.773-1.548a1 1 0 011.06-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"/></svg>
        </button>
        <button id="screenBtn" onclick="toggleScreenShare()" class="control-btn rounded-full bg-white/10 text-white">🖥️</button>
    </div>
    <div id="callStatus" class="absolute top-10 left-0 right-0 text-center text-white/50 text-sm italic">Connecting...</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName, myRoom, localStream, peerConnection, isCaller = false;
let isMuted = false, isScreenSharing = false;

const servers = { 
    iceServers:[{urls:["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302"]}],
    iceCandidatePoolSize: 10 
};

function enter(){
  myName = user.value.trim();
  myRoom = pass.value.trim();
  if(!myName || !myRoom) return alert("Details required!");
  loginDiv.style.display="none";
  chatDiv.classList.remove('hidden');
  roomTitle.innerText="Room: "+myRoom;
  listenMsgs();
  listenCall();
}

// CHAT LOGIC
function sendMsg(){
  if(!msgInput.value.trim()) return;
  db.ref("rooms/"+myRoom+"/msgs").push({ u: myName, val: msgInput.value });
  msgInput.value="";
}

function listenMsgs(){
  db.ref("rooms/"+myRoom+"/msgs").on("child_added", s=>{
    let d = s.val();
    let div = document.createElement("div");
    div.className="msg"+(d.u==myName?" my-msg":"");
    div.innerHTML=`<div class="text-[9px] opacity-50 uppercase font-bold">${d.u}</div>${d.val}`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// VIDEO CALL LOGIC
async function getMedia(){
  return await navigator.mediaDevices.getUserMedia({ 
    audio: true, 
    video: { width: {ideal: 1280}, height: {ideal: 720}, frameRate: {max: 30} } 
  });
}

async function startCall(){
  isCaller=true;
  callUI.classList.remove('hidden');
  localStream = await getMedia();
  localVideo.srcObject = localStream;

  setupPeerConnection();
  
  let offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  db.ref("calls/"+myRoom).set({ offer:offer, caller:myName });
}

function setupPeerConnection(){
  peerConnection = new RTCPeerConnection(servers);
  localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
  
  peerConnection.ontrack = e => {
    remoteVideo.srcObject = e.streams[0];
    callStatus.innerText = "Live";
  };
  
  peerConnection.onicecandidate = e => {
    if(e.candidate) db.ref("calls/"+myRoom+"/candidates").push(e.candidate.toJSON());
  };
}

function listenCall(){
  db.ref("calls/"+myRoom).on("value", async snap=>{
    let d = snap.val();
    if(!d) {
        if(!isCaller && callUI.offsetParent !== null) endCall();
        return;
    }
    if(d.offer && !isCaller && !peerConnection){
      callUI.classList.remove('hidden');
      incomingBox.classList.remove('hidden');
      callerName.innerText = d.caller + " is Video Calling...";
    }
    if(d.answer && isCaller){
      await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
    }
  });

  db.ref("calls/"+myRoom+"/candidates").on("child_added", snap=>{
    if(peerConnection && peerConnection.remoteDescription) {
        peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
    }
  });
}

async function acceptCall(){
  isCaller=false;
  incomingBox.classList.add('hidden'); // Fix: Popup hide immediately
  localStream = await getMedia();
  localVideo.srcObject = localStream;

  setupPeerConnection();

  let data = (await db.ref("calls/"+myRoom).get()).val();
  await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
  let answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  db.ref("calls/"+myRoom).update({answer:answer});
}

// Controls Logic
function toggleMute() {
    isMuted = !isMuted;
    localStream.getAudioTracks()[0].enabled = !isMuted;
    muteBtn.classList.toggle('btn-active', isMuted);
    muteBtn.innerText = isMuted ? "🔇" : "🎤";
}

async function toggleScreenShare() {
    if(!isScreenSharing) {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const videoTrack = screenStream.getVideoTracks()[0];
            const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
            sender.replaceTrack(videoTrack);
            isScreenSharing = true;
            screenBtn.classList.add('btn-active');
            
            videoTrack.onended = () => toggleScreenShare(); // Auto switch back
        } catch(e) { console.error(e); }
    } else {
        const videoTrack = localStream.getVideoTracks()[0];
        const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
        sender.replaceTrack(videoTrack);
        isScreenSharing = false;
        screenBtn.classList.remove('btn-active');
    }
}

function endCall(){
  if(localStream) localStream.getTracks().forEach(t => t.stop());
  if(peerConnection) peerConnection.close();
  db.ref("calls/"+myRoom).remove();
  location.reload(); 
}

function rejectCall(){ endCall(); }
</script>
</body>
</html>
