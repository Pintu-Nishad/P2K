<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>101% Secure Chat + Call</title>
<style>
  body{margin:0;font-family:Arial,sans-serif;background:#eef3f8;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  .login,.chat-container,.admin-panel{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;}
  .login-box{background:#fff;padding:30px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);display:flex;flex-direction:column;gap:15px;width:90%;max-width:350px;}
  .login-box input{padding:10px 15px;border-radius:10px;border:1px solid #ccc;outline:none;}
  .login-box button{padding:10px;border-radius:10px;border:none;background:#4a90e2;color:white;font-weight:bold;cursor:pointer;}
  .header{background:#4a90e2;color:white;padding:15px;font-size:18px;font-weight:bold;width:100%;display:flex;justify-content:space-between;align-items:center;box-sizing:border-box;}
  .chat-box{flex:1;padding:10px;overflow-y:auto;background:#eef3f8;display:flex;flex-direction:column;gap:8px;width:100%;box-sizing:border-box;}
  .message{max-width:75%;padding:10px;border-radius:15px;background:#ffffff;align-self:flex-start;word-wrap:break-word;box-shadow:0 2px 5px rgba(0,0,0,0.05);}
  .input-area{display:flex;gap:5px;padding:10px;background:#fff;border-top:1px solid #ddd;}
  .input-area input[type="text"]{flex:1;padding:10px;border-radius:25px;border:1px solid #ccc;outline:none;}
  .input-area button{padding:10px 15px;border-radius:25px;border:none;background:#4a90e2;color:white;font-weight:bold;cursor:pointer;}
  .bottom-buttons{display:flex;justify-content:space-between;padding:10px;background:#fff;width:100%;box-sizing:border-box;}
  .bottom-buttons button{flex:1;margin:0 5px;padding:10px;border-radius:25px;border:none;cursor:pointer;font-weight:bold;background:#f0f0f0;}
  .active-users{font-size:12px;color:#fff;opacity:0.9;}
  .admin-panel{display:none;background:#fff;width:90%;max-width:500px;padding:20px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.3);}
  .user-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #eee;}
  video{width:120px;height:90px;border-radius:10px;background:black;object-fit:cover;border:2px solid #4a90e2;}
  #callVideos{display:flex;gap:10px;padding:10px;overflow-x:auto;background:rgba(0,0,0,0.05);width:100%;box-sizing:border-box;}
  .preview{max-width:200px;border-radius:10px;display:block;margin-top:5px;}
</style>
</head>
<body>

<div class="login" id="loginDiv">
  <div class="login-box">
    <h2 style="text-align:center;color:#4a90e2;margin:0;">Secure Chat</h2>
    <input type="text" id="username" placeholder="Your Name 👤">
    <input type="password" id="password" placeholder="Room Password 🔒">
    <button onclick="login()">Enter Room</button>
  </div>
</div>

<div class="chat-container" id="chatDiv" style="display:none; width:100%;">
  <div class="header">
    <div id="roomDisplay">Room</div>
    <div class="active-users" id="activeUsers">Active: 0</div>
  </div>
  
  <div id="callVideos"></div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Type a message... 😊">
    <button onclick="sendMessage()">Send</button>
  </div>

  <div class="bottom-buttons">
    <input type="file" id="photoInput" style="display:none;" accept="image/*" onchange="sendPhoto(event)">
    <button onclick="document.getElementById('photoInput').click()">📷 Photo</button>
    <button id="callButton" onclick="startCall()" style="background:#28a745;color:white;">📞 Call</button>
    <button id="muteButton" onclick="toggleMute()" style="display:none;background:orange;color:white;">🔇 Mute</button>
    <button onclick="exitRoom()" style="background:#dc3545;color:white;">❌ Exit</button>
  </div>
</div>

<div class="admin-panel" id="adminPanel">
  <h2>Admin Dashboard</h2>
  <div id="adminUsers" style="max-height:300px;overflow-y:auto;width:100%;"></div>
  <button onclick="location.reload()" style="margin-top:15px;padding:10px;width:100%;">Logout Admin</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553",
  storageBucket: "p2kc-b0553.firebasestorage.app",
  messagingSenderId: "939347031406",
  appId: "1:939347031406:web:998f52b262a0cecf11bd7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomName = "";
let username = "";
let localStream;
let peerConnections = {};
const ADMIN_PW = "14665866";
const iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

// --- Auth Logic ---
function login(){
  username = document.getElementById('username').value.trim();
  const pw = document.getElementById('password').value.trim();
  if(!username || !pw) return alert("Fill all fields!");

  if(pw === ADMIN_PW){
    document.getElementById('loginDiv').style.display='none';
    document.getElementById('adminPanel').style.display='flex';
    loadAdminUsers();
    return;
  }

  roomName = pw; 
  document.getElementById('loginDiv').style.display='none';
  document.getElementById('chatDiv').style.display='flex';
  document.getElementById('roomDisplay').textContent = `Room: ${roomName}`;

  joinRoom();
  listenMessages();
  updateActiveUsers();
  listenIncomingCalls();
}

function joinRoom(){
  const ref = db.ref(`rooms/${roomName}/users/${username}`);
  ref.set({ name: username, lastSeen: Date.now() });
  ref.onDisconnect().remove();
}

function updateActiveUsers(){
  db.ref(`rooms/${roomName}/users`).on('value', snap => {
    const users = snap.val() || {};
    const count = Object.keys(users).length;
    document.getElementById('activeUsers').textContent = `Active: ${count} (${Object.keys(users).join(", ")})`;
  });
}

// --- Chat Logic ---
function sendMessage(){
  const input = document.getElementById('messageInput');
  if(!input.value.trim()) return;
  const msgRef = db.ref(`rooms/${roomName}/messages`).push({
    user: username, text: input.value, type: 'text', time: Date.now()
  });
  input.value = '';
  setTimeout(() => msgRef.remove(), 60000); // Auto-delete after 1 min
}

function sendPhoto(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const photoRef = db.ref(`rooms/${roomName}/messages`).push({
      user: username, data: reader.result, type: 'photo', time: Date.now()
    });
    setTimeout(() => photoRef.remove(), 60000);
  };
  reader.readAsDataURL(file);
}

function listenMessages(){
  const box = document.getElementById('chatBox');
  db.ref(`rooms/${roomName}/messages`).on('child_added', snap => {
    const m = snap.val();
    const div = document.createElement('div');
    div.className = 'message';
    div.innerHTML = `<strong>${m.user}:</strong> ` + (m.type === 'text' ? m.text : `<img src="${m.data}" class="preview">`);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  });
}

// --- WebRTC Call Logic ---
async function startCall(){
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    addVideoTrack(localStream, true);
    document.getElementById('muteButton').style.display = 'inline-block';
    document.getElementById('callButton').disabled = true;

    const usersSnap = await db.ref(`rooms/${roomName}/users`).once('value');
    const users = usersSnap.val();
    for(let peer in users){
      if(peer !== username) createOffer(peer);
    }
  } catch(e) { alert("Mic/Camera error: " + e); }
}

async function createOffer(peerId){
  const pc = new RTCPeerConnection(iceConfig);
  peerConnections[peerId] = pc;
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = e => {
    if(e.candidate) db.ref(`rooms/${roomName}/calls/${peerId}/${username}/ice`).push(e.candidate.toJSON());
  };
  pc.ontrack = e => addVideoTrack(e.streams[0], false);

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  db.ref(`rooms/${roomName}/calls/${peerId}/${username}/offer`).set({ sdp: offer.sdp, type: offer.type });

  // Listen for answer
  db.ref(`rooms/${roomName}/calls/${peerId}/${username}/answer`).on('value', async snap => {
    if(snap.exists()) await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
  });
}

function listenIncomingCalls(){
  db.ref(`rooms/${roomName}/calls/${username}`).on('child_added', async snap => {
    const callerId = snap.key;
    const pc = new RTCPeerConnection(iceConfig);
    peerConnections[callerId] = pc;

    if(!localStream) {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        addVideoTrack(localStream, true);
    }
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.onicecandidate = e => {
      if(e.candidate) db.ref(`rooms/${roomName}/calls/${callerId}/${username}/ice`).push(e.candidate.toJSON());
    };
    pc.ontrack = e => addVideoTrack(e.streams[0], false);

    // Handle Offer
    const offer = (await db.ref(`rooms/${roomName}/calls/${username}/${callerId}/offer`).once('value')).val();
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    db.ref(`rooms/${roomName}/calls/${callerId}/${username}/answer`).set({ sdp: answer.sdp, type: answer.type });

    // Handle ICE
    db.ref(`rooms/${roomName}/calls/${username}/${callerId}/ice`).on('child_added', s => {
      pc.addIceCandidate(new RTCIceCandidate(s.val()));
    });
  });
}

function addVideoTrack(stream, isLocal){
  const vid = document.createElement('video');
  vid.srcObject = stream;
  vid.autoplay = true;
  if(isLocal) vid.muted = true;
  document.getElementById('callVideos').appendChild(vid);
}

function toggleMute(){
  const audio = localStream.getAudioTracks()[0];
  audio.enabled = !audio.enabled;
  document.getElementById('muteButton').textContent = audio.enabled ? "🔇 Mute" : "🔊 Unmute";
}

function exitRoom(){
  if(confirm("Exit Room?")) location.reload();
}

// --- Admin Dashboard ---
function loadAdminUsers(){
  const container = document.getElementById('adminUsers');
  db.ref('rooms').on('value', snap => {
    container.innerHTML = '';
    const rooms = snap.val() || {};
    for(let r in rooms){
      const users = rooms[r].users || {};
      for(let u in users){
        const d = document.createElement('div');
        d.className = 'user-item';
        d.innerHTML = `<span>[${r}] <strong>${u}</strong></span> <button onclick="db.ref('rooms/${r}/users/${u}').remove()">Kick</button>`;
        container.appendChild(d);
      }
    }
  });
}
</script>
</body>
</html>
