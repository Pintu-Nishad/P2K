<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure Chat & Call</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: sans-serif; background:#e5ddd5; height: 100vh; display: flex; flex-direction: column; }
  
  /* Login Screen */
  #loginDiv { position: fixed; inset: 0; background: #4a90e2; display: flex; justify-content: center; align-items: center; z-index: 1000; }
  .login-box { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
  .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
  .login-box button { width: 100%; padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

  /* Chat Interface */
  #chatDiv { display: none; flex-direction: column; height: 100vh; width: 100%; }
  
  .header { background: #075e54; color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
  
  /* Video Area - Hamesha Top par rahega */
  #vids { display: flex; gap: 5px; padding: 5px; background: #333; min-height: 0; overflow-x: auto; }
  video { width: 120px; height: 120px; background: #000; border-radius: 8px; object-fit: cover; }

  #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
  .msg { background: white; padding: 8px 12px; border-radius: 8px; max-width: 85%; align-self: flex-start; box-shadow: 0 1px 1px rgba(0,0,0,0.1); line-height: 1.4; }
  .my-msg { background: #dcf8c6; align-self: flex-end; }

  /* Buttons & Input Area - Bottom Fixed */
  .footer { background: #f0f0f0; padding: 10px; border-top: 1px solid #ddd; }
  .button-row { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .button-row button, .button-row label { 
    flex: 1; padding: 10px; border-radius: 20px; border: none; color: white; 
    font-weight: bold; font-size: 13px; cursor: pointer; text-align: center;
  }
  
  .btn-photo { background: #5c6bc0; }
  .btn-call { background: #25d366; }
  .btn-exit { background: #e53935; }
  .btn-mute { background: #fb8c00; display: none; }

  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
  .input-row button { background: #075e54; color: white; border: none; width: 50px; height: 45px; border-radius: 50%; cursor: pointer; }
</style>
</head>
<body>

<div id="loginDiv">
  <div class="login-box">
    <h2 style="margin-top:0; color:#4a90e2;">Secure Room</h2>
    <input type="text" id="user" placeholder="Your Name">
    <input type="password" id="pass" placeholder="Room Password">
    <button onclick="enter()">Join Chat</button>
  </div>
</div>

<div id="chatDiv">
  <div class="header">
    <b id="roomTitle">Room</b>
    <span id="userCount">Users: 0</span>
  </div>

  <div id="vids"></div> <div id="chatBox"></div>

  <div class="footer">
    <div class="button-row">
      <input type="file" id="fileInp" style="display:none;" accept="image/*" onchange="upPhoto(event)">
      <label for="fileInp" class="btn-photo">📷 Photo</label>
      <button class="btn-call" id="callBtn" onclick="makeCall()">📞 Call Now</button>
      <button class="btn-mute" id="muteBtn" onclick="mute()">🔇 Mute</button>
      <button class="btn-exit" onclick="location.reload()">❌ Exit</button>
    </div>
    
    <div class="input-row">
      <input type="text" id="msgInput" placeholder="Type a message...">
      <button onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553",
  storageBucket: "p2kc-b0553.firebasestorage.app",
  appId: "1:939347031406:web:998f52b262a0cecf11bd7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let myName, myRoom, myStream;

function enter() {
  myName = document.getElementById('user').value.trim();
  myRoom = document.getElementById('pass').value.trim();
  if(!myName || !myRoom) return alert("Details bhariye!");

  document.getElementById('loginDiv').style.display='none';
  document.getElementById('chatDiv').style.display='flex';
  document.getElementById('roomTitle').innerText = myRoom;

  db.ref(`rooms/${myRoom}/users/${myName}`).set({active:true});
  db.ref(`rooms/${myRoom}/users/${myName}`).onDisconnect().remove();

  // Load Messages
  db.ref(`rooms/${myRoom}/msgs`).limitToLast(20).on('child_added', snap => {
    const d = snap.val();
    const div = document.createElement('div');
    div.className = 'msg' + (d.u === myName ? ' my-msg' : '');
    div.innerHTML = `<b>${d.u}</b><br>` + (d.t === 'img' ? `<img src="${d.val}" style="width:100%; border-radius:5px;">` : d.val);
    document.getElementById('chatBox').appendChild(div);
    document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
  });

  // Online count
  db.ref(`rooms/${myRoom}/users`).on('value', s => {
    document.getElementById('userCount').innerText = "Users: " + (s.numChildren() || 0);
  });
}

function sendMsg() {
  const inp = document.getElementById('msgInput');
  if(!inp.value.trim()) return;
  db.ref(`rooms/${myRoom}/msgs`).push({u:myName, val:inp.value, t:'text'});
  inp.value = '';
}

function upPhoto(e) {
  const f = e.target.files[0];
  const r = new FileReader();
  r.onload = () => db.ref(`rooms/${myRoom}/msgs`).push({u:myName, val:r.result, t:'img'});
  r.readAsDataURL(f);
}

// Fixed Call Function
async function makeCall() {
  try {
    myStream = await navigator.mediaDevices.getUserMedia({audio:true, video:true});
    const v = document.createElement('video');
    v.srcObject = myStream;
    v.autoplay = true; 
    v.muted = true;
    document.getElementById('vids').appendChild(v);
    
    document.getElementById('muteBtn').style.display='block';
    document.getElementById('callBtn').innerText = "Calling...";
    document.getElementById('callBtn').style.background = "#999";
  } catch(e) { 
    alert("Error: Camera ya Mic permission allow karni hogi. Settings check karein."); 
  }
}

function mute() {
  const track = myStream.getAudioTracks()[0];
  track.enabled = !track.enabled;
  document.getElementById('muteBtn').innerText = track.enabled ? "🔇 Mute" : "🔊 Unmute";
}
</script>
</body>
</html>
