<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Mosquito Killer - Nishad Crafts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');
        body { font-family: sans-serif; overflow: hidden; touch-action: none; background: #020617; color: white; }
        .game-font { font-family: 'Bungee', cursive; }
        
        .room-bg { 
            background-size: cover; background-position: center; 
            height: 100vh; width: 100vw; position: relative; transition: 1.5s ease-in-out;
        }

        /* मच्छर के पंख और उड़ने का एनीमेशन */
        .mosquito {
            position: absolute; font-size: 3.8rem; z-index: 50; cursor: pointer;
            user-select: none;
            animation: flyAround 3s infinite ease-in-out, wingVibrate 0.05s infinite;
            filter: drop-shadow(0 15px 8px rgba(0,0,0,0.7));
            transition: transform 0.2s;
        }

        @keyframes flyAround {
            0%, 100% { transform: translate(0, 0) rotate(5deg); }
            25% { transform: translate(25px, -35px) rotate(-10deg); }
            50% { transform: translate(-20px, 20px) rotate(15deg); }
            75% { transform: translate(-30px, -25px) rotate(-15deg); }
        }

        @keyframes wingVibrate {
            0% { skewX: 0deg; scale: 1; opacity: 0.9; }
            50% { skewX: 10deg; scale: 1.1; opacity: 1; }
            100% { skewX: -10deg; scale: 1; opacity: 0.9; }
        }

        /* माइक बटन की पोजीशन को ऊपर किया गया (150px from bottom) */
        .mic-container { position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .mic-btn { padding: 22px; border-radius: 999px; border: 4px solid; transition: 0.3s; background: rgba(0,0,0,0.85); backdrop-blur: 10px; }
        .active-mic { border-color: #22c55e; box-shadow: 0 0 30px rgba(34, 197, 94, 0.6); }
        .muted-mic { border-color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); }
        
        /* स्कोर बोर्ड चमक (Glow) */
        .score-glow { text-shadow: 0 0 10px rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <audio id="slap-sound" src="https://assets.mixkit.co/active_storage/sfx/2157/2157-preview.mp3" preload="auto"></audio>
    <audio id="buzz-sound" src="https://www.soundjay.com/nature/sounds/mosquito-flying-01.mp3" loop preload="auto"></audio>

    <div id="home-screen" class="fixed inset-0 z-[110] flex flex-col items-center justify-center bg-slate-950 text-center p-6">
        <h1 class="text-7xl text-red-600 game-font mb-2 drop-shadow-[0_5px_15px_rgba(220,38,38,0.5)]">MOSQUITO<br><span class="text-white text-4xl">KILLER 3D</span></h1>
        <p class="text-blue-500 mb-12 text-[12px] tracking-[0.4em] font-black uppercase">Nishad Crafts Reality Engine</p>
        
        <div class="flex flex-col gap-6 w-full max-w-xs">
            <button onclick="window.startMode('ai')" class="bg-blue-600 p-6 rounded-[2rem] font-black text-2xl shadow-[0_10px_0_#1d4ed8] active:translate-y-2 active:shadow-none transition-all">🤖 COMPUTER</button>
            <button onclick="window.startMode('user')" class="bg-orange-600 p-6 rounded-[2rem] font-black text-2xl shadow-[0_10px_0_#c2410c] active:translate-y-2 active:shadow-none transition-all">👥 ONLINE MULTIPLAYER</button>
        </div>
    </div>

    <div id="status-screen" class="hidden fixed inset-0 z-[105] flex flex-col items-center justify-center bg-black/95">
        <div class="w-20 h-20 border-8 border-orange-500 border-t-transparent rounded-full animate-spin mb-8"></div>
        <div id="status-msg" class="text-2xl font-black game-font animate-pulse tracking-widest">SEARCHING...</div>
        <div id="countdown-text" class="hidden text-[12rem] font-black game-font text-yellow-500">3</div>
    </div>

    <div id="game-room" class="hidden room-bg flex flex-col">
        <div class="w-full p-4 flex justify-between items-center bg-black/90 border-b-2 border-white/10 backdrop-blur-2xl">
            <div class="text-center"><p class="text-[12px] text-blue-400 font-black">YOU</p><div id="score1" class="text-5xl font-black score-glow">0</div></div>
            <div id="timer" class="text-6xl font-black text-yellow-500 game-font">00</div>
            <div class="text-center"><p id="p2-label" class="text-[12px] text-red-400 font-black uppercase">Enemy</p><div id="score2" class="text-5xl font-black score-glow">0</div></div>
        </div>
        
        <div id="room-area" class="relative flex-grow overflow-hidden"></div>

        <div id="mic-section" class="hidden mic-container flex flex-col items-center gap-3">
            <button id="mic-btn" onclick="window.toggleMic()" class="mic-btn active-mic active:scale-95 transition-all">
                <span id="mic-icon" class="text-4xl">🎙️</span>
            </button>
            <span id="mic-text" class="bg-black/60 px-4 py-1 rounded-full text-[12px] font-black text-green-500 uppercase tracking-widest border border-green-500/30">Voice: On</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzvw8YGIdYQ3YxB9NCMqjXL-yIWfuQPxs",
            authDomain: "ml-killer.firebaseapp.com",
            projectId: "ml-killer",
            storageBucket: "ml-killer.firebasestorage.app",
            messagingSenderId: "481192438237",
            appId: "1:481192438237:web:20cd6e7022738bf3d62e34",
            databaseURL: "https://ml-killer-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let peer, conn, localStream, myScore = 0, oppScore = 0, timeLeft = 0, gameActive = false, isMuted = false, mode = '';
        const slap = document.getElementById('slap-sound');
        const buzz = document.getElementById('buzz-sound');

        async function playBuzz() {
            try { await buzz.play(); buzz.volume = 0.5; } catch (e) { console.log("Sound ready"); }
        }

        window.toggleMic = function() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            document.getElementById('mic-icon').innerText = isMuted ? "🔇" : "🎙️";
            document.getElementById('mic-btn').className = isMuted ? "mic-btn muted-mic" : "mic-btn active-mic";
            document.getElementById('mic-text').innerText = isMuted ? "Voice: Off" : "Voice: On";
            document.getElementById('mic-text').className = isMuted ? "bg-black/60 px-4 py-1 rounded-full text-[12px] font-black text-red-500 uppercase tracking-widest border border-red-500/30" : "bg-black/60 px-4 py-1 rounded-full text-[12px] font-black text-green-500 uppercase tracking-widest border border-green-500/30";
        };

        window.startMode = async function(m) {
            mode = m;
            await playBuzz();
            const r = Math.floor(Math.random() * 1000);
            document.querySelector('.room-bg').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1513694203232-719a280e022f?sig=${r}&auto=format&w=1200')`;
            
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('status-screen').classList.remove('hidden');

            if(mode === 'ai') runCountdown(30);
            else { document.getElementById('mic-section').classList.remove('hidden'); initMultiplayer(); }
        };

        function initMultiplayer() {
            peer = new Peer();
            peer.on('open', (id) => {
                onDisconnect(ref(db, 'lobby/' + id)).remove();
                get(ref(db, 'lobby')).then(snap => {
                    let tid = null;
                    if(snap.exists()) {
                        for(let i in snap.val()) { if(i !== id) { tid = i; break; } }
                    }
                    if(tid) { connectTo(tid); remove(ref(db, 'lobby/' + tid)); }
                    else set(ref(db, 'lobby/' + id), { status: 'waiting' });
                });
            });
            peer.on('connection', c => { conn = c; handleData(); runCountdown(90); });
            peer.on('call', async call => {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                call.answer(localStream);
                call.on('stream', rs => { const a = new Audio(); a.srcObject = rs; a.play(); });
            });
        }

        async function connectTo(tid) {
            conn = peer.connect(tid);
            handleData();
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peer.call(tid, localStream);
            runCountdown(90);
        }

        function handleData() {
            conn.on('data', d => { if(d.type === 'kill') { oppScore = d.score; document.getElementById('score2').innerText = oppScore; } });
        }

        function runCountdown(t) {
            timeLeft = t;
            const cd = document.getElementById('countdown-text');
            cd.classList.remove('hidden');
            document.getElementById('status-msg').classList.add('hidden');
            let c = 3;
            const i = setInterval(() => {
                c--;
                if(c > 0) cd.innerText = c;
                else { clearInterval(i); document.getElementById('status-screen').classList.add('hidden'); document.getElementById('game-room').classList.remove('hidden'); startGame(); }
            }, 1000);
        }

        function startGame() {
            gameActive = true;
            if(mode === 'ai') document.getElementById('p2-label').innerText = "COMPUTER";
            setInterval(() => { if(gameActive) spawn(); }, 700);
            if(mode === 'ai') setInterval(() => { if(gameActive) aiPlay(); }, 1100);
            const clk = setInterval(() => { 
                timeLeft--; 
                document.getElementById('timer').innerText = timeLeft; 
                if(timeLeft <= 0) { clearInterval(clk); endGame(); } 
            }, 1000);
        }

        function spawn() {
            const area = document.getElementById('room-area');
            const m = document.createElement('div');
            m.className = 'mosquito'; m.innerHTML = '🦟';
            m.style.left = Math.random() * (window.innerWidth - 80) + 'px';
            m.style.top = Math.random() * (window.innerHeight - 450) + 'px';
            
            m.onclick = () => { 
                myScore += 10; document.getElementById('score1').innerText = myScore;
                slap.currentTime = 0; slap.play();
                if(conn) conn.send({type:'kill', score:myScore});
                m.style.transform = "scale(0) rotate(360deg)";
                setTimeout(() => m.remove(), 200);
            };
            area.appendChild(m);
            setTimeout(() => { if(m.parentNode) m.remove(); }, 2200);
        }

        function aiPlay() {
            const targets = document.querySelectorAll('.mosquito');
            if(targets.length > 0) {
                oppScore += 10;
                document.getElementById('score2').innerText = oppScore;
                targets[0].style.opacity = '0';
                setTimeout(() => targets[0].remove(), 100);
            }
        }

        function endGame() { gameActive = false; buzz.pause(); alert("Game Over! Score: " + myScore); location.reload(); }
    </script>
</body>
</html>
