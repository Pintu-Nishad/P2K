<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nishad Crafts - Ultimate Killer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');
        body { font-family: sans-serif; overflow: hidden; touch-action: none; background: #000; margin: 0; }
        .game-font { font-family: 'Bungee', cursive; }
        
        .room-bg { 
            height: 100vh; width: 100vw; position: relative;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos/seed/room99/1200/800') center/cover;
        }

        /* 10 अलग मच्छर प्रजातियाँ */
        .mosquito { position: absolute; z-index: 50; cursor: pointer; user-select: none; font-size: 3rem; }
        .sp-1 { filter: sepia(1); animation: fly1 3s infinite; }
        .sp-2 { filter: hue-rotate(90deg); animation: fly2 1.5s infinite; }
        .sp-3 { filter: brightness(0.5); animation: fly3 4s infinite; }
        .sp-4 { filter: hue-rotate(180deg); animation: fly1 2.5s infinite; }
        .sp-5 { filter: drop-shadow(0 0 5px red); animation: fly2 3s infinite; }
        .sp-6 { filter: invert(0.8); animation: fly3 2s infinite; }
        .sp-7 { filter: saturate(8); animation: fly1 2s infinite; }
        .sp-8 { opacity: 0.5; animation: fly2 0.8s infinite; }
        .sp-9 { filter: contrast(2); animation: fly3 3.5s infinite; }
        .sp-10 { filter: hue-rotate(300deg); animation: fly1 4s infinite; }

        @keyframes fly1 { 0%,100% { transform: translate(0,0) rotate(0); } 50% { transform: translate(50px, 50px) rotate(20deg); } }
        @keyframes fly2 { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4) translate(-30px, 20px); } }
        @keyframes fly3 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-60px) rotate(-15deg); } }

        /* असली ब्लड स्प्लैश */
        .blood-stain {
            position: absolute; pointer-events: none; z-index: 40;
            width: 120px; height: 120px;
            background: url('https://www.transparentpng.com/download/blood/red-blood-splatter-png-21.png') no-repeat center/contain;
            animation: splatFade 1s forwards;
        }
        @keyframes splatFade { 
            0% { transform: scale(0.1); opacity: 0; } 
            20% { transform: scale(1); opacity: 1; } 
            100% { transform: translateY(30px); opacity: 0; } 
        }

        .mic-ui { position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; }
    </style>
</head>
<body>

    <audio id="slap-sound" src="kill.mp3" preload="auto"></audio>
    <audio id="buzz-sound" src="mos.mp3" loop preload="auto"></audio>

    <div id="home-screen" class="fixed inset-0 z-[110] flex flex-col items-center justify-center bg-black p-6">
        <h1 class="text-5xl text-red-600 game-font mb-8 text-center">NISHAD CRAFTS<br><span class="text-white text-3xl">MOSQUITO KILLER</span></h1>
        <div class="flex flex-col gap-4 w-full max-w-xs">
            <button onclick="startApp('ai')" class="bg-red-700 p-5 rounded-2xl font-bold text-xl shadow-[0_6px_0_#450a0a] active:translate-y-1">AI COMPUTER</button>
            <button onclick="startApp('user')" class="bg-blue-600 p-5 rounded-2xl font-bold text-xl shadow-[0_6px_0_#1e3a8a] active:translate-y-1">ONLINE MULTIPLAYER</button>
        </div>
    </div>

    <div id="game-room" class="hidden room-bg flex flex-col">
        <div class="p-4 flex justify-between items-center bg-black/80 border-b border-red-900/50 backdrop-blur-md">
            <div class="text-center"><p class="text-xs text-blue-400">YOU</p><div id="score1" class="text-3xl font-black">0</div></div>
            <div id="timer" class="text-4xl font-bold text-yellow-500 game-font">30</div>
            <div class="text-center"><p id="p2-label" class="text-xs text-red-500">ENEMY</p><div id="score2" class="text-3xl font-black">0</div></div>
        </div>
        
        <div id="room-area" class="relative flex-grow overflow-hidden"></div>

        <div id="mic-section" class="hidden mic-ui">
            <button id="mic-btn" onclick="toggleMic()" class="bg-red-600 p-4 rounded-full shadow-lg mb-2">🎙️</button>
            <p id="conn-status" class="text-[10px] text-white font-bold">READY TO CONNECT</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzvw8YGIdYQ3YxB9NCMqjXL-yIWfuQPxs",
            authDomain: "ml-killer.firebaseapp.com",
            projectId: "ml-killer",
            storageBucket: "ml-killer.firebasestorage.app",
            messagingSenderId: "481192438237",
            appId: "1:481192438237:web:20cd6e7022738bf3d62e34",
            databaseURL: "https://ml-killer-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let peer, conn, localStream, myScore = 0, oppScore = 0, timeLeft = 30, gameActive = false, mode = '';
        const slap = document.getElementById('slap-sound');
        const buzz = document.getElementById('buzz-sound');

        window.startApp = async function(m) {
            mode = m;
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-room').classList.remove('hidden');

            // साउंड अनलॉक
            buzz.volume = 0.3;
            buzz.play().catch(() => console.log("Sound error"));

            if(mode === 'user') {
                document.getElementById('mic-section').classList.remove('hidden');
                initMultiplayer();
            }
            startEngine();
        }

        function initMultiplayer() {
            peer = new Peer();
            peer.on('open', (id) => {
                onDisconnect(ref(db, 'lobby/' + id)).remove();
                get(ref(db, 'lobby')).then(snap => {
                    let target = null;
                    if(snap.exists()) { for(let k in snap.val()) { if(k !== id) { target = k; break; } } }
                    if(target) { connectTo(target); remove(ref(db, 'lobby/' + target)); }
                    else { set(ref(db, 'lobby/' + id), { status: 'waiting' }); }
                });
            });

            peer.on('connection', c => { 
                conn = c; 
                document.getElementById('conn-status').innerText = "CONNECTED";
                setupData(); 
            });

            peer.on('call', async call => {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                call.answer(localStream);
                call.on('stream', s => { const a = new Audio(); a.srcObject = s; a.play(); });
            });
        }

        async function connectTo(tid) {
            conn = peer.connect(tid);
            setupData();
            document.getElementById('conn-status').innerText = "CONNECTED";
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const call = peer.call(tid, localStream);
            call.on('stream', s => { const a = new Audio(); a.srcObject = s; a.play(); });
        }

        function setupData() {
            conn.on('data', d => {
                if(d.type === 'kill') {
                    oppScore = d.val;
                    document.getElementById('score2').innerText = oppScore;
                }
            });
        }

        function startEngine() {
            gameActive = true;
            if(mode === 'ai') document.getElementById('p2-label').innerText = "COMPUTER";
            
            // मच्छरों का आना शुरू
            setInterval(() => { if(gameActive) spawnMosquito(); }, 700);
            if(mode === 'ai') setInterval(() => { if(gameActive) { oppScore += 10; document.getElementById('score2').innerText = oppScore; } }, 1400);

            const timerInt = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(timerInt); finish(); }
            }, 1000);
        }

        function spawnMosquito() {
            const area = document.getElementById('room-area');
            const m = document.createElement('div');
            const spId = Math.floor(Math.random() * 10) + 1;
            m.className = `mosquito sp-${spId}`;
            m.innerHTML = '🦟';
            m.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            m.style.top = Math.random() * (window.innerHeight - 400) + 'px';
            
            m.onclick = (e) => {
                myScore += 10;
                document.getElementById('score1').innerText = myScore;
                slap.currentTime = 0; slap.play(); // थप्पड़ की आवाज़
                createSplat(e.clientX, e.clientY); // खून का छींटा
                if(conn) conn.send({type: 'kill', val: myScore});
                m.remove();
            };
            area.appendChild(m);
            setTimeout(() => { if(m.parentNode) m.remove(); }, 2500);
        }

        function createSplat(x, y) {
            const s = document.createElement('div');
            s.className = 'blood-stain';
            s.style.left = (x - 60) + 'px';
            s.style.top = (y - 60) + 'px';
            s.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.getElementById('room-area').appendChild(s);
            setTimeout(() => s.remove(), 1000);
        }

        window.toggleMic = function() {
            if(!localStream) return;
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('mic-btn').innerText = track.enabled ? "🎙️" : "🔇";
        }

        function finish() { gameActive = false; buzz.pause(); alert("GAME OVER! YOUR SCORE: " + myScore); location.reload(); }
    </script>
</body>
</html>
