<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* SCREENSHOT PROTECTION CSS */
        @media screen {
            body {
                -webkit-user-select: none; 
                -moz-user-select: none; 
                -ms-user-select: none; 
                user-select: none;
            }
        }
        /* जब स्क्रीन रिकॉर्डर या प्रिंट कमांड चले तो कंटेंट को हाइड करना */
        @media print {
            body { display: none !important; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> <script>
    // --- SCREENSHOT & SECURITY LOGIC ---
    
    // 1. Keyboard Shortcuts Block (Ctrl+S, Ctrl+P, Ctrl+Shift+I, PrtScn)
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u' || e.shiftKey && e.key === 'i')) {
            e.preventDefault();
            alert("Security Alert: Action Blocked!");
        }
    });

    // 2. Clear Clipboard (ताकि स्क्रीनशॉट कॉपी न हो सके)
    window.addEventListener('keyup', (e) => {
        if (e.key === 'PrintScreen') {
            navigator.clipboard.writeText("");
            alert("Screenshot Disabled!");
        }
    });

    // 3. Screen Recording Visibility Change
    document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
            // जब यूज़र टैब बदलता है या रिकॉर्डिंग टूल ऑन होता है
            document.title = "🔒 Protected Mode";
        } else {
            document.title = "P2K SECURE";
        }
    });

    // 4. Android/Chrome Protection (Display-Capture block)
    if ('setAppBadge' in navigator) {
        // Modern browsers check
        try {
            window.onblur = function() { chatBox.style.filter = "blur(20px)"; };
            window.onfocus = function() { chatBox.style.filter = "none"; };
        } catch(e) {}
    }

    // --- बाकी आपका पुराना FIREBASE और CALL LOGIC यहाँ रहेगा ---
    // (sendMsg, sendPhoto, listenMsgs, setupPeer, etc.)
</script>
</body>
</html>
