<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>🔐 Secret Chat</h2>

<div id="loginBox">
    <input id="name" placeholder="Enter Name (any)">
    <input id="pass" placeholder="Enter Password (letters only)">
    <button id="enterBtn">Enter Room</button>
</div>

<div id="chatBox" class="hidden">
    <p>Room: <span id="roomDisplay"></span></p>
    <p>Active Users: <span id="usersList"></span></p>
    <button id="exitBtn">Exit Room</button>

    <input id="msgInput" placeholder="Type message">
    <button id="sendBtn">Send</button>
    <ul id="chatList"></ul>
</div>

<script type="module" src="auth.js"></script>
<script type="module" src="chat.js"></script>

</body>
</html>
