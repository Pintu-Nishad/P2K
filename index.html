<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>तिउरी (16 गोटी) - असली देसी खेल</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .tiuri-font { font-family: 'Kalam', cursive; }

        /* फोटो जैसा लकड़ी का बोर्ड */
        .wood-board {
            background-color: #d2b48c;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 80px rgba(0,0,0,0.2);
            border: 10px solid #5d4037;
            position: relative;
            aspect-ratio: 1/1.2; /* थोड़ा लंबा बोर्ड जैसा फोटो में है */
            width: 100%;
            max-width: 450px;
        }

        /* सटीक तिउरी लाइन्स (SVG) */
        .board-lines-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            stroke: #3e2723;
            stroke-width: 2;
            fill: none;
        }

        /* गोटियाँ (Gutis) */
        .point-node {
            width: 34px; height: 34px;
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .guti {
            width: 85%; height: 85%;
            border-radius: 50%;
            box-shadow: 0 4px 5px rgba(0,0,0,0.4), inset 0 -3px 3px rgba(0,0,0,0.2);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .red-guti { background: radial-gradient(circle at 35% 35%, #ff4b2b, #b71c1c); border: 2px solid #fff; }
        .blue-guti { background: radial-gradient(circle at 35% 35%, #2196f3, #0d47a1); border: 2px solid #fff; }
        
        .selected .guti { transform: scale(1.4); border-color: #facc15; box-shadow: 0 0 15px #facc15; }
        
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; align-items: center; width: 100%; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="home" class="screen active max-w-md bg-slate-900/80 backdrop-blur-xl p-10 rounded-3xl border border-slate-700 shadow-2xl text-center">
        <h1 class="text-7xl font-bold text-yellow-500 tiuri-font mb-4 drop-shadow-lg">तिउरी</h1>
        <p class="text-slate-400 text-xs tracking-[0.2em] uppercase mb-12 font-bold italic">16 Guti Traditional Game</p>
        
        <div class="space-y-4">
            <button onclick="changeScreen('game')" class="w-full bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-500 hover:to-red-500 py-4 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">👤 अकेले खेलें</button>
            <button onclick="startSearch()" class="w-full bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">👥 रैंडम खिलाड़ी</button>
        </div>
        <p class="mt-12 text-[10px] text-slate-500 font-bold uppercase tracking-widest">Powered by Nishad Crafts</p>
    </div>

    <div id="search" class="screen text-center">
        <div class="w-20 h-20 border-4 border-slate-800 border-t-yellow-500 rounded-full animate-spin mx-auto mb-8"></div>
        <h2 class="text-3xl font-black tiuri-font text-yellow-500">खिलाड़ी खोज रहे हैं...</h2>
        <button onclick="changeScreen('home')" class="mt-10 text-slate-500 underline hover:text-white transition">कैंसल करें</button>
    </div>

    <div id="game" class="screen max-w-lg">
        <div class="w-full flex justify-between items-center mb-6 bg-slate-900/90 p-4 rounded-2xl border border-slate-800 shadow-lg">
            <div class="flex gap-4">
                <div class="flex items-center gap-3 bg-red-950/30 px-4 py-2 rounded-xl border border-red-900/50">
                    <div class="red-guti w-4 h-4 rounded-full"></div>
                    <span id="s1" class="text-2xl font-black text-red-500">0</span>
                </div>
                <div class="flex items-center gap-3 bg-blue-950/30 px-4 py-2 rounded-xl border border-blue-900/50">
                    <div class="blue-guti w-4 h-4 rounded-full"></div>
                    <span id="s2" class="text-2xl font-black text-blue-400">0</span>
                </div>
            </div>
            
            <button onclick="toggleMute()" id="mute-btn" class="flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-xl border border-slate-700 hover:bg-slate-700 transition relative">
                <span id="mic-icon" class="text-xl">🎤</span>
                <div id="mic-dot" class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div>
            </button>
        </div>

        <div class="wood-board rounded-xl overflow-hidden shadow-2xl">
            <svg class="board-lines-svg" viewBox="0 0 100 120">
                <rect x="10" y="25" width="80" height="70" />
                <line x1="10" y1="42.5" x2="90" y2="42.5" />
                <line x1="10" y1="60" x2="90" y2="60" />
                <line x1="10" y1="77.5" x2="90" y2="77.5" />
                
                <line x1="30" y1="25" x2="30" y2="95" />
                <line x1="50" y1="25" x2="50" y2="95" />
                <line x1="70" y1="25" x2="70" y2="95" />
                
                <line x1="10" y1="25" x2="90" y2="95" />
                <line x1="10" y1="95" x2="90" y2="25" />

                <path d="M50,0 L10,25 L90,25 Z" />
                <line x1="50" y1="0" x2="50" y2="25" />
                <line x1="30" y1="12.5" x2="70" y2="12.5" />

                <path d="M50,120 L10,95 L90,95 Z" />
                <line x1="50" y1="120" x2="50" y2="95" />
                <line x1="30" y1="107.5" x2="70" y2="107.5" />
            </svg>

            <div id="tiuri-nodes" class="w-full h-full relative z-10"></div>
        </div>

        <button onclick="changeScreen('home')" class="mt-8 text-slate-500 hover:text-white transition-all font-bold text-sm uppercase tracking-widest">🏳️ गेम से बाहर निकलें</button>
    </div>

    <script>
        function changeScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'game') setupTiuri();
        }

        function startSearch() {
            changeScreen('search');
            setTimeout(() => changeScreen('game'), 2000);
        }

        let isMuted = false;
        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mic-icon').innerText = isMuted ? '🔇' : '🎤';
            document.getElementById('mic-dot').className = isMuted ? 'w-2.5 h-2.5 bg-red-500 rounded-full' : 'w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse';
        }

        function setupTiuri() {
            const container = document.getElementById('tiuri-nodes');
            container.innerHTML = '';
            
            // तिउरी के 37 सटीक पॉइंट्स (Coordinates in %)
            const points = [
                {x:50, y:0}, {x:30, y:12.5}, {x:50, y:12.5}, {x:70, y:12.5}, // Top House
                {x:10, y:25}, {x:30, y:25}, {x:50, y:25}, {x:70, y:25}, {x:90, y:25}, // Row 1
                {x:10, y:42.5}, {x:30, y:42.5}, {x:50, y:42.5}, {x:70, y:42.5}, {x:90, y:42.5}, // Row 2
                {x:10, y:60}, {x:30, y:60}, {x:50, y:60}, {x:70, y:60}, {x:90, y:60}, // Row 3
                {x:10, y:77.5}, {x:30, y:77.5}, {x:50, y:77.5}, {x:70, y:77.5}, {x:90, y:77.5}, // Row 4
                {x:10, y:95}, {x:30, y:95}, {x:50, y:95}, {x:70, y:95}, {x:90, y:95}, // Row 5
                {x:50, y:120}, {x:30, y:107.5}, {x:50, y:107.5}, {x:70, y:107.5} // Bottom House
            ];

            points.forEach((p, i) => {
                const node = document.createElement('div');
                node.className = 'node point-node';
                node.style.left = p.x + '%';
                node.style.top = p.y + '%';
                
                // गोटियाँ सेट करना (16 लाल, 16 नीली)
                if (i < 16) {
                    node.innerHTML = '<div class="guti red-guti"></div>';
                } else if (i >= points.length - 16) {
                    node.innerHTML = '<div class="guti blue-guti"></div>';
                }

                node.onclick = () => {
                    document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
                    if(node.children.length > 0) node.classList.add('selected');
                };
                container.appendChild(node);
            });
        }
    </script>
</body>
</html>
