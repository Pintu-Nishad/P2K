<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>101%Secure Chat Room</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #f0f4f8, #d9e2ec);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .login, .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .login-box {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 90%;
    max-width: 350px;
  }
  .login-box input {
    padding: 10px 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
  }
  .login-box button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #4a90e2;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }
  .header {
    background: #4a90e2;
    color: white;
    padding: 15px;
    font-size: 18px;
    text-align: center;
    font-weight: bold;
  }
  .chat-box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    background: #eef3f8;
    display: flex;
    flex-direction: column;
    gap: 5px;
    width: 100%;
  }
  .message {
    max-width: 70%;
    padding: 8px 12px;
    border-radius: 15px;
    background: #ffffff;
    align-self: flex-start;
    word-wrap: break-word;
  }
  .input-area {
    display: flex;
    gap: 5px;
    padding: 10px;
    background: #fff;
  }
  .input-area input[type="text"] {
    flex: 1;
    padding: 10px;
    border-radius: 25px;
    border: 1px solid #ccc;
    outline: none;
  }
  .input-area button {
    padding: 10px 15px;
    border-radius: 25px;
    border: none;
    background: #4a90e2;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }
  .bottom-buttons {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: #fff;
  }
  .bottom-buttons button {
    flex: 1;
    margin: 0 5px;
    padding: 10px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }
  .call-controls {
    display: none;
    gap: 10px;
    margin-top: 5px;
  }
  .call-controls button {
    background: orange;
    color: white;
  }
</style>
</head>
<body>

<div class="login" id="loginDiv">
  <div class="login-box">
    <input type="text" id="username" placeholder="Username 👤">
    <div style="position: relative;">
      <input type="password" id="password" placeholder="Password 🔒">
      <span style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;" onclick="togglePassword()">👁️</span>
    </div>
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="chat-container" id="chatDiv" style="display:none;">
  <div class="header" id="roomName">101%Secure</div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Message... 😊">
    <button onclick="sendMessage()">Send</button>
  </div>

  <div class="bottom-buttons">
    <button onclick="selectPhoto()">📷 Photo</button>
    <button id="callButton" onclick="startCall()">📞 Call</button>
    <button id="muteButton" class="call-controls" onclick="toggleMute()">🔇 Mute</button>
    <button onclick="exitRoom()">❌ Exit Room</button>
  </div>
</div>

<script>
  function togglePassword() {
    const pw = document.getElementById('password');
    if(pw.type === "password") pw.type = "text";
    else pw.type = "password";
  }

  function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if(username === '' || password === '') {
      alert("Username aur Password daalo! ⚠️");
      return;
    }
    document.getElementById('loginDiv').style.display = 'none';
    document.getElementById('chatDiv').style.display = 'flex';
    document.getElementById('roomName').textContent = username + " - 101%Secure";
  }

  const chatBox = document.getElementById('chatBox');
  const muteButton = document.getElementById('muteButton');
  const callButton = document.getElementById('callButton');

  function sendMessage() {
    const input = document.getElementById('messageInput');
    if(input.value.trim() === '') return;
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message');
    msgDiv.textContent = input.value;
    chatBox.appendChild(msgDiv);
    input.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function selectPhoto() {
    alert("Photo select ka option clicked! 📸");
  }

  function startCall() {
    alert("Call started... ☎️");
    muteButton.style.display = 'inline-block';
    callButton.disabled = true;
  }

  function toggleMute() {
    alert("Call muted/unmuted 🔇");
  }

  function exitRoom() {
    const confirmExit = confirm("Pakka Nikalna Chahte Ho? 🤔");
    if(confirmExit) {
      alert("Room se nikal gaye! 👋");
      location.reload();
    }
  }
</script>

</body>
</html>
