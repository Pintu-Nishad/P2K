<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K SECURE V14 - FINAL FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --accent: #00a884; --outgoing: #005c4b; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: #e9edef; font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: rgba(11,20,26,0.9); }
        .msg { position: relative; padding: 10px; border-radius: 12px; max-width: 85%; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .incoming { background: var(--panel); align-self: flex-start; border-bottom-left-radius: 2px; }
        .outgoing { background: var(--outgoing); align-self: flex-end; border-bottom-right-radius: 2px; }
        
        #callUI { position: fixed; inset: 0; z-index: 2000; background: #000; display: none; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 110px; height: 160px; border-radius: 12px; border: 2px solid var(--accent); object-fit: cover; z-index: 2100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #localVideo.large { width: 100% !important; height: 100% !important; top: 0 !important; right: 0 !important; border-radius: 0 !important; border: none !important; }
        
        .call-tools { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 15px; z-index: 2200; }
        .t-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; items-center; justify-content: center; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .active-red { background: #ef4444 !important; }

        #imgModal { position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; padding: 10px; }
        #fullImg { max-width: 100%; max-height: 90%; object-fit: contain; transform: scale(0.9); transition: 0.3s; border-radius: 4px; }
    </style>
</head>
<body>

<div id="loginDiv" class="fixed inset-0 z-[3000] bg-[#0b141a] flex items-center justify-center p-6 text-center">
    <div class="w-full max-w-sm bg-[#111b21] p-8 rounded-3xl border border-[#202c33]">
        <h1 class="text-2xl font-bold text-white mb-6 tracking-widest">P2K SECURE</h1>
        <input id="user" type="text" placeholder="Name" class="w-full bg-[#2a3942] rounded-xl p-4 mb-4 outline-none text-white border border-transparent focus:border-[#00a884]">
        <input id="pass" type="password" placeholder="Room ID / Admin Key" class="w-full bg-[#2a3942] rounded-xl p-4 mb-8 outline-none text-white border border-transparent focus:border-[#00a884]">
        <button onclick="enter()" class="w-full bg-[#00a884] py-4 rounded-xl font-bold text-[#111b21] active:scale-95 transition-transform">CONNECT</button>
    </div>
</div>

<div id="adminDiv" class="hidden fixed inset-0 z-[2500] bg-[#0b141a] p-6 overflow-y-auto text-white">
    <h1 class="text-xl font-bold text-red-500 mb-6 uppercase">Admin Control Panel</h1>
    <div id="userList" class="space-y-4"></div>
</div>

<div id="chatDiv" class="hidden h-full flex flex-col">
    <header class="h-16 bg-[#111b21] flex items-center justify-between px-4 border-b border-white/5">
        <div><div id="userCounter" class="text-[11px] text-[#00a884] font-bold">● Online</div><div id="typingInfo" class="text-[10px] text-green-400 italic"></div></div>
        <h2 id="roomTitle" class="text-xs font-bold text-white uppercase">Room</h2>
        <button onclick="startCall()" class="bg-[#00a884] px-4 py-2 rounded-full text-[#111b21] font-bold text-xs active:scale-90">CALL</button>
    </header>
    <div id="chatBox"></div>
    <footer class="p-4 bg-[#111b21] pb-10">
        <div class="flex items-center gap-3 bg-[#2a3942] rounded-full px-4 py-1">
            <input type="file" id="fileInput" accept="image/*" onchange="sendPhoto(this)" class="hidden"><button onclick="document.getElementById('fileInput').click()" class="text-[#8696a0] text-xl">📎</button>
            <input id="msgInput" type="text" placeholder="Message..." class="flex-1 bg-transparent py-3 text-sm outline-none text-white">
            <button onclick="sendMsg()" class="text-[#00a884] p-2 font-bold text-xl">➤</button>
        </div>
    </footer>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted onclick="this.classList.toggle('large')"></video>
    <div class="call-tools">
        <button id="muteBtn" onclick="toggleMute()" class="t-btn">🎤</button>
        <button id="camBtn" onclick="toggleCam()" class="t-btn">📹</button>
        <button onclick="switchCamera()" class="t-btn">🔄</button>
        <button onclick="endCall()" class="t-btn bg-red-600">📞</button>
    </div>
</div>

<div id="imgModal" onclick="closeFullImg()"><img id="fullImg" src=""></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", authDomain: "p2kc-b0553.firebaseapp.com", databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", projectId: "p2kc-b0553" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName, myRoom, localStream, peerConnection, currentFacingMode="user", isMuted=false, isCamOff=false, callInProg=false;

    function enter(){
        myName = user.value.trim(); myRoom = pass.value.trim();
        if(!myName || !myRoom) return;
        if(myName === "Admin" && myRoom === "14665866") { loginDiv.style.display="none"; adminDiv.classList.remove('hidden'); loadAdmin(); return; }
        
        loginDiv.style.display="none"; chatDiv.classList.remove('hidden');
        roomTitle.innerText = myRoom;
        
        const userRef = db.ref(`rooms/${myRoom}/users/${myName}`);
        userRef.set({status:"online", lastActive: Date.now()});
        userRef.onDisconnect().remove();

        userRef.on('value', s => { if(!s.exists()) location.reload(); if(s.val()?.mute) toggleMute(); });
        db.ref(`rooms/${myRoom}/users`).on('value', s => userCounter.innerText = "● " + s.numChildren() + " Online");
        
        listenMsgs(); listenCall(); setupTyping();
    }

    function sendMsg(){
        const text = msgInput.value.trim(); if(!text) return;
        const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: text, type: 'text', time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
        msgInput.value=""; setTimeout(() => ref.remove(), 60000);
    }

    function sendPhoto(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = e => {
            const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: e.target.result, type: 'image', time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
            setTimeout(() => ref.remove(), 60000);
        };
        reader.readAsDataURL(input.files[0]);
    }

    function listenMsgs(){
        db.ref(`rooms/${myRoom}/msgs`).on("child_added", s=>{
            let d = s.val(), id = s.key, isMe = (d.u == myName);
            let div = document.createElement("div"); div.className = `msg ${isMe ? 'outgoing' : 'incoming'}`; div.id = "msg-"+id;
            let delBtn = isMe ? `<button onclick="db.ref('rooms/${myRoom}/msgs/${id}').remove()" class="text-[10px] ml-2 opacity-40">🗑️</button>` : "";
            let downBtn = (!isMe && d.type==='image') ? `<button onclick="saveImg('${d.val}')" class="text-[10px] text-blue-400 ml-2">⬇️</button>` : "";
            let content = d.type==='image' ? `<img src="${d.val}" onclick="openFullImg('${d.val}')" class="rounded-lg max-h-72 cursor-pointer shadow-lg active:scale-95 transition-all">` : d.val;
            div.innerHTML = `<div class="flex justify-between text-[10px] font-bold mb-1 opacity-60"><span>${d.u}</span><div>${downBtn}${delBtn}</div></div>${content}<div class="text-[8px] text-right mt-1 opacity-40">${d.time}</div>`;
            chatBox.appendChild(div); chatBox.scrollTop = chatBox.scrollHeight;
        });
        db.ref(`rooms/${myRoom}/msgs`).on("child_removed", s => { document.getElementById("msg-"+s.key)?.remove(); });
    }

    function openFullImg(src) { const m=document.getElementById('imgModal'); const i=document.getElementById('fullImg'); i.src=src; m.style.display="flex"; setTimeout(()=>i.style.transform="scale(1)",50); }
    function closeFullImg() { document.getElementById('fullImg').style.transform="scale(0.9)"; setTimeout(()=>document.getElementById('imgModal').style.display="none",200); }
    function saveImg(u){ const a=document.createElement('a'); a.href=u; a.download="P2K_SECURE.jpg"; a.click(); }

    function setupTyping() {
        msgInput.addEventListener('input', () => { db.ref(`rooms/${myRoom}/typing/${myName}`).set(true); clearTimeout(window.tT); window.tT = setTimeout(() => db.ref(`rooms/${myRoom}/typing/${myName}`).remove(), 2500); });
        db.ref(`rooms/${myRoom}/typing`).on('value', s => { let t=[]; s.forEach(u=>{ if(u.key!==myName) t.push(u.key); }); typingInfo.innerText = t.length>0 ? t.join(',')+" typing..." : ""; });
    }

    async function startCall(){
        if(callInProg) return; callInProg=true;
        callUI.style.display="block";
        localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:{width:1280, height:720, facingMode:currentFacingMode}});
        document.getElementById('localVideo').srcObject = localStream;
        setupPeer();
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        db.ref(`calls/${myRoom}`).set({offer:offer, caller:myName});
    }

    function setupPeer(){
        peerConnection = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
        localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
        peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
        peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${myRoom}/candidates/${myName}`).push(e.candidate.toJSON()); };
    }

    function listenCall(){
        db.ref(`calls/${myRoom}`).on("value", async snap=>{
            let d = snap.val(); if(!d){ if(peerConnection) endCall(); return; }
            if(d.offer && d.caller !== myName && !callInProg){
                if(confirm("Video call from " + d.caller)){
                    callInProg=true; callUI.style.display="block";
                    localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:true});
                    document.getElementById('localVideo').srcObject = localStream;
                    setupPeer();
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer));
                    const ans = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(ans);
                    db.ref(`calls/${myRoom}`).update({answer:ans});
                }
            }
            if(d.answer && d.caller === myName) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
        });
        db.ref(`calls/${myRoom}/candidates`).on("child_added", s=>{ if(s.key!==myName) s.ref.on("child_added", c=>{ if(peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(c.val())); }); });
    }

    function endCall(){ db.ref(`calls/${myRoom}`).remove(); if(localStream) localStream.getTracks().forEach(t=>t.stop()); if(peerConnection) peerConnection.close(); peerConnection=null; callUI.style.display="none"; callInProg=false; }
    function toggleMute(){ isMuted=!isMuted; localStream.getAudioTracks()[0].enabled=!isMuted; muteBtn.classList.toggle('active-red', isMuted); }
    function toggleCam(){ isCamOff=!isCamOff; localStream.getVideoTracks()[0].enabled=!isCamOff; camBtn.classList.toggle('active-red', isCamOff); }

    async function switchCamera(){
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        const vt = localStream.getVideoTracks()[0]; vt.stop();
        const ns = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
        const nt = ns.getVideoTracks()[0];
        localStream.removeTrack(vt); localStream.addTrack(nt);
        document.getElementById('localVideo').srcObject = localStream;
        if(peerConnection) { const sender = peerConnection.getSenders().find(s => s.track.kind === 'video'); sender.replaceTrack(nt); }
    }

    function loadAdmin(){
        let target = prompt("Target Room ID:");
        db.ref(`rooms/${target}/users`).on('value', snap => {
            userList.innerHTML = "";
            snap.forEach(u => {
                let div = document.createElement('div'); div.className = "bg-[#111b21] p-4 rounded-xl flex justify-between";
                div.innerHTML = `<span>${u.key}</span><div>
                <button onclick="db.ref('rooms/${target}/users/${u.key}').remove()" class="text-red-500 mr-4">REMOVE</button>
                <button onclick="db.ref('rooms/${target}/users/${u.key}').update({mute:true})" class="text-blue-400">MUTE</button></div>`;
                userList.appendChild(div);
            });
        });
    }
</script>
</body>
</html>
