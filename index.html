<!DOCTYPE html>
<html>
<head>
  <title>Hacker Secure Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: monospace;
      background: black;
      color: #00ff00;
      text-align: center;
    }

    h2 {
      text-shadow: 0 0 10px #00ff00;
    }

    .box {
      background: rgba(0,0,0,0.9);
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px #00ff00;
    }

    input, button, select {
      width: 90%;
      padding: 12px;
      margin: 5px;
      background: black;
      border: 1px solid #00ff00;
      color: #00ff00;
      border-radius: 5px;
      font-size: 16px;
    }

    ul {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
      padding: 0;
      text-align: left;
    }

    li {
      padding: 5px;
      border-bottom: 1px solid #00ff00;
    }

    video {
      width: 100%;
      max-width: 300px;
      margin: 5px;
      border: 1px solid #00ff00;
    }
  </style>
</head>

<body>

<h2>💀 Hacker Secure Chat 💀</h2>

<div class="box" id="menu">
  <input id="room" placeholder="Enter Password">
  <button onclick="createRoom()">🔐 Create Room</button>
  <button onclick="joinRoom()">🔓 Join Room</button>
</div>

<div class="box" id="chatBox" style="display:none;">
  <h3 id="roomName"></h3>

  <input id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send SMS</button>

  <ul id="chat"></ul>

  <select id="quality">
    <option value="auto">Auto</option>
    <option value="144">144p</option>
    <option value="240">240p</option>
    <option value="360">360p</option>
    <option value="480">480p</option>
    <option value="720">720p</option>
    <option value="1080">1080p</option>
  </select>

  <button onclick="startVideo()">📹 Video</button>
  <button onclick="startVoice()">🎤 Voice</button>

  <div>
    <video id="local" autoplay muted></video>
    <video id="remote" autoplay></video>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, get } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let chatRef;

// 🔐 Create Room
window.createRoom = function(){
  let room = document.getElementById("room").value;
  if(room === "") return alert("Password daal");

  set(ref(db, "rooms/" + room), {created: true});
  enterRoom(room, true);
}

// 🔓 Join Room
window.joinRoom = async function(){
  let room = document.getElementById("room").value;
  if(room === "") return alert("Password daal");

  let snapshot = await get(ref(db, "rooms/" + room));

  if(snapshot.exists()){
    enterRoom(room, false);
  } else {
    alert("❌ Room not found");
  }
}

// 🚀 Enter room
function enterRoom(room, isCreator){
  chatRef = ref(db, "chat/" + room);

  document.getElementById("menu").style.display = "none";
  document.getElementById("chatBox").style.display = "block";

  document.getElementById("roomName").innerText =
    isCreator ? "🔐 Room Created: " + room : "🔓 Joined Room: " + room;

  let li = document.createElement("li");
  li.innerText = "✅ Secure connection established...";
  document.getElementById("chat").appendChild(li);

  onChildAdded(chatRef, (data)=>{
    let li = document.createElement("li");
    li.innerText = data.val();
    document.getElementById("chat").appendChild(li);
  });
}

// 💬 Send message
window.sendMsg = function(){
  let msg = document.getElementById("msg").value;
  if(msg !== "") push(chatRef, msg);
}

// 🎥 Video with quality
window.startVideo = async function(){
  let q = document.getElementById("quality").value;

  let constraints = { video: true, audio: true };

  if(q === "144") constraints.video = { width: 256, height: 144 };
  if(q === "240") constraints.video = { width: 426, height: 240 };
  if(q === "360") constraints.video = { width: 640, height: 360 };
  if(q === "480") constraints.video = { width: 854, height: 480 };
  if(q === "720") constraints.video = { width: 1280, height: 720 };
  if(q === "1080") constraints.video = { width: 1920, height: 1080 };

  let stream = await navigator.mediaDevices.getUserMedia(constraints);

  document.getElementById("local").srcObject = stream;
}

// 🎤 Voice
window.startVoice = async function(){
  await navigator.mediaDevices.getUserMedia({audio:true});
  alert("🎤 Voice ready");
}
</script>

</body>
</html>
