<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Chat & Call</title>
<style>
  body{margin:0;font-family:sans-serif;background:#f0f2f5;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  #loginDiv{flex:1;display:flex;justify-content:center;align-items:center;background:#4a90e2;}
  .login-box{background:white;padding:30px;border-radius:15px;display:flex;flex-direction:column;gap:15px;width:300px;box-shadow:0 10px 25px rgba(0,0,0,0.2);}
  .login-box input, .login-box button{padding:12px;border-radius:8px;border:1px solid #ddd;outline:none;}
  .login-box button{background:#4a90e2;color:white;font-weight:bold;cursor:pointer;border:none;}

  #chatDiv{display:none;flex-direction:column;height:100vh;}
  .header{background:#4a90e2;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;font-weight:bold;}
  
  #chatBox{flex:1;padding:15px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:#e5ddd5;}
  .msg{background:white;padding:10px;border-radius:10px;max-width:80%;align-self:flex-start;box-shadow:0 1px 2px rgba(0,0,0,0.1);}
  .my-msg{background:#dcf8c6;align-self:flex-end;}

  .action-bar{background:white;padding:10px;display:flex;flex-direction:column;gap:10px;border-top:1px solid #ddd;}
  .input-row{display:flex;gap:10px;}
  .input-row input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc;outline:none;}
  .input-row button{background:#4a90e2;color:white;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;}

  .button-row{display:flex;justify-content:space-around;gap:10px;}
  .button-row button, .button-row label{flex:1;padding:10px;border-radius:10px;border:none;text-align:center;cursor:pointer;font-weight:bold;font-size:14px;color:white;}
  
  .btn-photo{background:#6c757d;}
  .btn-call{background:#28a745;}
  .btn-exit{background:#dc3545;}
  .btn-mute{background:orange;display:none;}

  video{width:100px;height:100px;background:black;border-radius:10px;object-fit:cover;}
  #vids{display:flex;gap:5px;padding:5px;background:#eee;}
</style>
</head>
<body>

<div id="loginDiv">
  <div class="login-box">
    <h2 style="margin:0;color:#4a90e2;text-align:center;">Secure Chat</h2>
    <input type="text" id="user" placeholder="Name">
    <input type="password" id="pass" placeholder="Room Password">
    <button onclick="enter()">Start</button>
  </div>
</div>

<div id="chatDiv">
  <div class="header">
    <span id="roomName">Room</span>
    <span id="online" style="font-size:12px;">Users: 0</span>
  </div>

  <div id="vids"></div>
  <div id="chatBox"></div>

  <div class="action-bar">
    <div class="input-row">
      <input type="text" id="msgInput" placeholder="Message...">
      <button onclick="sendMsg()">Send</button>
    </div>
    
    <div class="button-row">
      <input type="file" id="fileInp" style="display:none;" onchange="upPhoto(event)">
      <label for="fileInp" class="btn-photo">📷 Photo</label>
      <button class="btn-call" id="callBtn" onclick="makeCall()">📞 Call</button>
      <button class="btn-mute" id="muteBtn" onclick="mute()">🔇 Mute</button>
      <button class="btn-exit" onclick="location.reload()">❌ Exit</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553",
  storageBucket: "p2kc-b0553.firebasestorage.app",
  appId: "1:939347031406:web:998f52b262a0cecf11bd7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let myName, myRoom, myStream;

function enter() {
  myName = document.getElementById('user').value.trim();
  myRoom = document.getElementById('pass').value.trim();
  if(!myName || !myRoom) return;

  document.getElementById('loginDiv').style.display='none';
  document.getElementById('chatDiv').style.display='flex';
  document.getElementById('roomName').innerText = "Room: " + myRoom;

  db.ref(`rooms/${myRoom}/users/${myName}`).set({active:true});
  db.ref(`rooms/${myRoom}/users/${myName}`).onDisconnect().remove();

  // Listen for Messages
  db.ref(`rooms/${myRoom}/msgs`).on('child_added', snap => {
    const d = snap.val();
    const div = document.createElement('div');
    div.className = 'msg' + (d.u === myName ? ' my-msg' : '');
    div.innerHTML = `<b>${d.u}:</b><br>` + (d.t === 'img' ? `<img src="${d.val}" style="max-width:100%;">` : d.val);
    document.getElementById('chatBox').appendChild(div);
    document.getElementById('chatBox').scrollTop = 99999;
  });

  // Count Users
  db.ref(`rooms/${myRoom}/users`).on('value', s => {
    document.getElementById('online').innerText = "Users: " + (s.numChildren() || 0);
  });
}

function sendMsg() {
  const inp = document.getElementById('msgInput');
  if(!inp.value) return;
  db.ref(`rooms/${myRoom}/msgs`).push({u:myName, val:inp.value, t:'text'});
  inp.value = '';
}

function upPhoto(e) {
  const f = e.target.files[0];
  const r = new FileReader();
  r.onload = () => db.ref(`rooms/${myRoom}/msgs`).push({u:myName, val:r.result, t:'img'});
  r.readAsDataURL(f);
}

// Simple WebRTC Placeholder for Button Display
async function makeCall() {
  try {
    myStream = await navigator.mediaDevices.getUserMedia({audio:true, video:true});
    const v = document.createElement('video');
    v.srcObject = myStream;
    v.autoplay = true; v.muted = true;
    document.getElementById('vids').appendChild(v);
    document.getElementById('muteBtn').style.display='block';
    document.getElementById('callBtn').style.background='grey';
  } catch(e) { alert("Camera Permission Required!"); }
}

function mute() {
  const track = myStream.getAudioTracks()[0];
  track.enabled = !track.enabled;
  document.getElementById('muteBtn').innerText = track.enabled ? "🔇 Mute" : "🔊 Unmute";
}
</script>
</body>
</html>
