<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Mosquito Killer - Nishad Crafts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');
        body { font-family: sans-serif; overflow: hidden; touch-action: none; background: #000; color: white; margin: 0; }
        .game-font { font-family: 'Bungee', cursive; }
        
        .room-bg { 
            background-size: cover; background-position: center; 
            height: 100vh; width: 100vw; position: relative; 
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://picsum.photos/1200/800?grayscale');
        }

        .mosquito {
            position: absolute; font-size: 3.5rem; z-index: 50; cursor: pointer;
            animation: flyAround 3s infinite ease-in-out, wingVibrate 0.05s infinite;
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.8));
        }

        @keyframes flyAround {
            0%, 100% { transform: translate(0, 0) rotate(5deg); }
            50% { transform: translate(20px, -20px) rotate(-10deg); }
        }

        @keyframes wingVibrate {
            0%, 100% { skewX: 0deg; scale: 1; }
            50% { skewX: 10deg; scale: 1.1; }
        }

        .mic-container { position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%); z-index: 100; }
    </style>
</head>
<body>

    <audio id="slap-sound" src="https://assets.mixkit.co/active_storage/sfx/2157/2157-preview.mp3"></audio>
    <audio id="buzz-sound" src="https://www.soundjay.com/nature/sounds/mosquito-flying-01.mp3" loop></audio>

    <div id="home-screen" class="fixed inset-0 z-[110] flex flex-col items-center justify-center bg-slate-950 p-6 text-center">
        <h1 class="text-6xl text-red-600 game-font mb-4">MOSQUITO<br><span class="text-white text-4xl">KILLER 3D</span></h1>
        <p class="text-blue-400 mb-12 text-xs tracking-widest font-bold">NISHAD CRAFTS ENGINE</p>
        
        <div class="flex flex-col gap-6 w-full max-w-xs">
            <button onclick="window.startMode('ai')" class="bg-blue-600 p-6 rounded-3xl font-black text-2xl shadow-[0_8px_0_#1d4ed8] active:translate-y-1">🤖 COMPUTER</button>
            <button onclick="window.startMode('user')" class="bg-orange-600 p-6 rounded-3xl font-black text-2xl shadow-[0_8px_0_#c2410c] active:translate-y-1">👥 ONLINE PLAY</button>
        </div>
    </div>

    <div id="status-screen" class="hidden fixed inset-0 z-[105] flex flex-col items-center justify-center bg-black/95">
        <div class="w-16 h-16 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <div id="status-msg" class="text-xl font-bold tracking-widest">CONNECTING...</div>
        <div id="countdown-text" class="hidden text-9xl font-black game-font text-yellow-500">3</div>
    </div>

    <div id="game-room" class="hidden room-bg flex flex-col">
        <div class="w-full p-4 flex justify-between items-center bg-black/80 border-b border-white/10 backdrop-blur-md">
            <div class="text-center"><p class="text-[10px] text-blue-400 font-bold">YOU</p><div id="score1" class="text-4xl font-black">0</div></div>
            <div id="timer" class="text-5xl font-black text-yellow-500 game-font">00</div>
            <div class="text-center"><p id="p2-label" class="text-[10px] text-red-400 font-bold">ENEMY</p><div id="score2" class="text-4xl font-black">0</div></div>
        </div>
        
        <div id="room-area" class="relative flex-grow overflow-hidden"></div>

        <div id="mic-section" class="hidden mic-container flex flex-col items-center gap-2">
            <button id="mic-btn" onclick="window.toggleMic()" class="bg-black/80 border-2 border-green-500 p-5 rounded-full shadow-[0_0_15px_#22c55e]">
                <span id="mic-icon" class="text-3xl">🎙️</span>
            </button>
            <span id="mic-text" class="text-[10px] font-bold text-green-500 uppercase">Voice: On</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzvw8YGIdYQ3YxB9NCMqjXL-yIWfuQPxs",
            authDomain: "ml-killer.firebaseapp.com",
            projectId: "ml-killer",
            storageBucket: "ml-killer.firebasestorage.app",
            messagingSenderId: "481192438237",
            appId: "1:481192438237:web:20cd6e7022738bf3d62e34",
            databaseURL: "https://ml-killer-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let peer, conn, localStream, myScore = 0, oppScore = 0, timeLeft = 0, gameActive = false, isMuted = false, mode = '';
        const slap = document.getElementById('slap-sound');
        const buzz = document.getElementById('buzz-sound');

        // ऑडियो अनलॉक फंक्शन
        async function initAudio() {
            try { await buzz.play(); buzz.volume = 0.4; } catch(e) { console.log("Audio waiting"); }
        }

        window.toggleMic = function() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            document.getElementById('mic-icon').innerText = isMuted ? "🔇" : "🎙️";
            document.getElementById('mic-btn').style.borderColor = isMuted ? "#ef4444" : "#22c55e";
            document.getElementById('mic-text').innerText = isMuted ? "Voice: Off" : "Voice: On";
        };

        window.startMode = async function(m) {
            mode = m;
            await initAudio();
            // पक्का बैकग्राउंड चेंज (Picsum)
            const randomID = Math.floor(Math.random() * 1000);
            document.querySelector('.room-bg').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('https://picsum.photos/seed/${randomID}/1200/800')`;
            
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('status-screen').classList.remove('hidden');

            if(mode === 'ai') runCountdown(30);
            else { document.getElementById('mic-section').classList.remove('hidden'); setupPeer(); }
        };

        function setupPeer() {
            peer = new Peer();
            peer.on('open', (id) => {
                onDisconnect(ref(db, 'lobby/' + id)).remove();
                get(ref(db, 'lobby')).then(snap => {
                    let tid = null;
                    if(snap.exists()) {
                        for(let key in snap.val()) { if(key !== id) { tid = key; break; } }
                    }
                    if(tid) { 
                        connectToPeer(tid); 
                        remove(ref(db, 'lobby/' + tid)); 
                    } else { 
                        set(ref(db, 'lobby/' + id), { status: 'waiting' }); 
                    }
                });
            });

            // Incoming connection & voice
            peer.on('connection', c => { conn = c; handleSync(); runCountdown(90); });
            peer.on('call', async call => {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                call.answer(localStream);
                call.on('stream', rs => { const a = new Audio(); a.srcObject = rs; a.play(); });
            });
        }

        async function connectToPeer(tid) {
            conn = peer.connect(tid);
            handleSync();
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const call = peer.call(tid, localStream);
            call.on('stream', rs => { const a = new Audio(); a.srcObject = rs; a.play(); });
            runCountdown(90);
        }

        function handleSync() {
            conn.on('data', d => {
                if(d.type === 'kill') { 
                    oppScore = d.score; 
                    document.getElementById('score2').innerText = oppScore; 
                }
            });
        }

        function runCountdown(t) {
            timeLeft = t;
            const cd = document.getElementById('countdown-text');
            cd.classList.remove('hidden');
            document.getElementById('status-msg').classList.add('hidden');
            let c = 3;
            const i = setInterval(() => {
                c--;
                if(c > 0) cd.innerText = c;
                else { clearInterval(i); document.getElementById('status-screen').classList.add('hidden'); document.getElementById('game-room').classList.remove('hidden'); startGame(); }
            }, 1000);
        }

        function startGame() {
            gameActive = true;
            if(mode === 'ai') document.getElementById('p2-label').innerText = "COMPUTER";
            setInterval(() => { if(gameActive) spawn(); }, 700);
            if(mode === 'ai') setInterval(() => { if(gameActive) { oppScore += 10; document.getElementById('score2').innerText = oppScore; } }, 1200);
            const clk = setInterval(() => { 
                timeLeft--; 
                document.getElementById('timer').innerText = timeLeft; 
                if(timeLeft <= 0) { clearInterval(clk); endGame(); } 
            }, 1000);
        }

        function spawn() {
            const area = document.getElementById('room-area');
            const m = document.createElement('div');
            m.className = 'mosquito'; m.innerHTML = '🦟';
            m.style.left = Math.random() * (window.innerWidth - 80) + 'px';
            m.style.top = Math.random() * (window.innerHeight - 450) + 'px';
            
            m.onclick = () => { 
                myScore += 10; document.getElementById('score1').innerText = myScore;
                slap.currentTime = 0; slap.play();
                if(conn) conn.send({type:'kill', score:myScore});
                m.remove();
            };
            area.appendChild(m);
            setTimeout(() => { if(m.parentNode) m.remove(); }, 2000);
        }

        function endGame() { gameActive = false; buzz.pause(); alert("Game Over! Score: " + myScore); location.reload(); }
    </script>
</body>
</html>
