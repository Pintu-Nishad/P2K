<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K SECURE V13 PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #0b141a;
            --panel-dark: #111b21;
            --accent: #00a884;
            --text-main: #e9edef;
            --text-dim: #8696a0;
        }

        body, html { 
            height: 100%; margin: 0; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* Smooth Scrollbar */
        #chatBox::-webkit-scrollbar { width: 4px; }
        #chatBox::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

        #chatBox { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 14px; 
            background-image: linear-gradient(rgba(11, 20, 26, 0.95), rgba(11, 20, 26, 0.95)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        /* Message Bubbles */
        .msg { 
            position: relative; padding: 12px 16px; border-radius: 18px; 
            max-width: 80%; font-size: 14px; line-height: 1.5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .incoming { background: var(--panel-dark); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #202c33; }
        .outgoing { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .private-msg { border: 1.5px solid #f59e0b !important; background: rgba(245, 158, 11, 0.1) !important; backdrop-filter: blur(5px); }

        /* Inputs & Buttons */
        .glass-header { background: rgba(32, 44, 51, 0.8); backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .input-bar { background: var(--panel-dark); padding: 12px 20px 35px; border-top: 1px solid #202c33; }
        
        .custom-input { 
            background: #2a3942; border: 1px solid transparent; 
            transition: 0.3s; border-radius: 25px; 
        }
        .custom-input:focus { border-color: var(--accent); background: #32444f; }

        /* Video Call UI Overlay */
        #callUI { position: fixed; inset: 0; z-index: 2000; background: #000; display: none; flex-direction: column; }
        #localVideo { 
            position: absolute; top: 30px; right: 20px; width: 110px; height: 160px; 
            border-radius: 15px; border: 2px solid var(--accent); object-fit: cover; z-index: 2100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="loginDiv" class="fixed inset-0 z-[3000] bg-[#0b141a] flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-[#111b21] p-10 rounded-3xl shadow-2xl border border-[#202c33] text-center">
        <div class="mb-6 inline-block p-4 bg-[#00a8841a] rounded-full">
            <svg class="w-10 h-10 text-[#00a884]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h1 class="text-3xl font-bold tracking-tight text-white mb-1">P2K SECURE</h1>
        <p class="text-xs text-[#8696a0] uppercase tracking-[0.2em] mb-10">Military Grade Encryption</p>
        
        <input id="user" type="text" placeholder="Username" class="w-full custom-input p-4 mb-4 outline-none text-white text-sm">
        <input id="pass" type="password" placeholder="Secure Room ID" class="w-full custom-input p-4 mb-8 outline-none text-white text-sm">
        
        <button onclick="enter()" class="w-full bg-[#00a884] hover:bg-[#008f70] py-4 rounded-2xl font-bold text-[#111b21] transition-all transform active:scale-95 shadow-lg shadow-[#00a88433]">AUTHORIZE ACCESS</button>
    </div>
</div>

<div id="chatDiv" class="hidden h-full flex flex-col">
    <header class="h-20 glass-header flex items-center justify-between px-6">
        <div class="flex flex-col">
            <span class="text-[10px] font-bold text-red-500 tracking-tighter uppercase">Vanish: 60s</span>
            <div id="userCounter" class="text-[11px] text-[#00a884] font-medium mt-1">● 0 Online</div>
        </div>
        <div class="text-center">
            <h2 id="roomTitle" class="text-sm font-bold text-white uppercase tracking-widest">---</h2>
        </div>
        <button onclick="startCall()" class="bg-[#00a884] p-3 rounded-full hover:rotate-12 transition-transform shadow-lg shadow-[#00a88444]">
            <svg class="w-5 h-5 text-[#111b21]" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zM14.553 7.106A1 1 0 0014 8v4a1 1 0 00.553.894l2 1A1 1 0 0018 13V7a1 1 0 00-1.447-.894l-2 1z"></path></svg>
        </button>
    </header>

    <div id="chatBox"></div>

    <footer class="input-bar">
        <div class="flex items-center gap-3 max-w-4xl mx-auto">
            <input type="file" id="fileInput" accept="image/*" onchange="sendPhoto(this)" class="hidden">
            <button onclick="document.getElementById('fileInput').click()" class="text-[#8696a0] hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
            </button>
            <input id="msgInput" type="text" placeholder="Type @Name for private or message..." class="flex-1 custom-input px-6 py-3 text-sm outline-none text-white">
            <button onclick="sendMsg()" class="bg-[#00a884] p-3 rounded-full text-[#111b21] hover:scale-110 transition-transform">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
            </button>
        </div>
    </footer>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="call-tools">
        <button id="muteBtn" onclick="toggleMute()" class="tool-btn">🎤</button>
        <button onclick="toggleFlash()" class="tool-btn">💡</button>
        <button onclick="switchCamera()" class="tool-btn">🔄</button>
        <button onclick="endCall()" class="tool-btn bg-red-500 border-none shadow-xl shadow-red-900/40">📞</button>
    </div>
</div>

<script>
    // --- [SARA LOGIC (PRIVATE MSG, 1080P CALL, AUTO-DELETE) YAHAN REPEAT HOGA] ---
    // (Pichle functions ko isme paste kardo, design ab auto-apply ho jayega)
    const firebaseConfig = { apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", authDomain: "p2kc-b0553.firebaseapp.com", databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", projectId: "p2kc-b0553" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName, myRoom, localStream, peerConnection, currentFacingMode="user", isFlash=false, isMuted=false;

    function enter(){
        myName = user.value.trim(); myRoom = pass.value.trim();
        if(!myName || !myRoom) return;
        loginDiv.style.display="none"; chatDiv.classList.remove('hidden');
        roomTitle.innerText = myRoom;
        db.ref(`rooms/${myRoom}/users/${myName}`).set(true);
        db.ref(`rooms/${myRoom}/users`).on('value', s => userCounter.innerText = "● " + s.numChildren() + " Online");
        listenMsgs(); listenCall();
    }

    function sendMsg(){
        const text = msgInput.value.trim();
        if(!text) return;
        let targetUser = text.startsWith('@') ? text.split(' ')[0].replace('@', '') : null;
        const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: text, type: 'text', target: targetUser, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        msgInput.value=""; setTimeout(() => { ref.remove(); }, 60000);
    }

    function sendPhoto(input) {
        if (!input.files[0]) return;
        let targetUser = msgInput.value.startsWith('@') ? msgInput.value.split(' ')[0].replace('@', '') : null;
        const reader = new FileReader();
        reader.onload = e => {
            const ref = db.ref(`rooms/${myRoom}/msgs`).push({ u: myName, val: e.target.result, type: 'image', target: targetUser, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            msgInput.value=""; setTimeout(() => { ref.remove(); }, 60000);
        };
        reader.readAsDataURL(input.files[0]);
    }

    function listenMsgs(){
        db.ref(`rooms/${myRoom}/msgs`).on("child_added", s=>{
            let d = s.val(), id = s.key;
            if(d.target && d.target !== myName && d.u !== myName) return;
            let isMe = (d.u == myName);
            let div = document.createElement("div");
            div.className = `msg ${isMe ? 'outgoing' : 'incoming'} ${d.target ? 'private-msg' : ''}`;
            div.id = "msg-"+id;
            
            let btnDelete = isMe ? `<button onclick="db.ref('rooms/${myRoom}/msgs/${id}').remove()" class="opacity-50 hover:opacity-100">🗑️</button>` : "";
            let btnDown = (!isMe && d.type === 'image') ? `<button onclick="const a=document.createElement('a');a.href='${d.val}';a.download='p2k.jpg';a.click();" class="text-blue-400 text-[10px]">⬇️ SAVE</button>` : "";

            div.innerHTML = `
                <div class="flex justify-between items-center mb-1 gap-4">
                    <span class="text-[10px] font-bold ${isMe?'text-white':'text-[#00a884]'}">${d.target ? '🔒 PRIV: ' : ''}${d.u}</span>
                    <div class="flex gap-2">${btnDown}${btnDelete}</div>
                </div>
                ${d.type==='image' ? `<img src="${d.val}" class="rounded-xl max-h-60 shadow-md">` : `<div class="break-words">${d.val}</div>`}
                <div class="text-[8px] opacity-40 text-right mt-2">${d.time}</div>
            `;
            chatBox.appendChild(div); chatBox.scrollTop = chatBox.scrollHeight;
        });
        db.ref(`rooms/${myRoom}/msgs`).on("child_removed", s => { const el = document.getElementById("msg-"+s.key); if(el) el.remove(); });
    }

    // --- [1080P VIDEO CALL FUNCTIONS (Same as before)] ---
    async function startCall(){ callUI.style.display="flex"; localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:{width:1920,height:1080,facingMode:"user"}}); document.getElementById('localVideo').srcObject=localStream; setupPeer(); const offer=await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer); db.ref(`calls/${myRoom}`).set({offer:offer, caller:myName}); }
    function setupPeer(){ peerConnection=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]}); localStream.getTracks().forEach(t=>{ const s=peerConnection.addTrack(t,localStream); if(t.kind==='video'){ const p=s.getParameters(); p.encodings=[{degradationPreference:'maintain-resolution'}]; s.setParameters(p); } }); peerConnection.ontrack=e=>{ document.getElementById('remoteVideo').srcObject=e.streams[0]; }; peerConnection.onicecandidate=e=>{ if(e.candidate) db.ref(`calls/${myRoom}/candidates/${myName}`).push(e.candidate.toJSON()); }; }
    function listenCall(){ db.ref(`calls/${myRoom}`).on("value", async snap=>{ let d=snap.val(); if(!d){ if(peerConnection) endCall(); return; } if(d.offer && d.caller!==myName && !peerConnection){ if(confirm("Call from "+d.caller)){ callUI.style.display="flex"; localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:true}); document.getElementById('localVideo').srcObject=localStream; setupPeer(); await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer)); const answer=await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer); db.ref(`calls/${myRoom}`).update({answer:answer}); } } if(d.answer && d.caller===myName) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer)); }); db.ref(`calls/${myRoom}/candidates`).on("child_added", s=>{ if(s.key!==myName) s.ref.on("child_added", c=>{ if(peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(c.val())); }); }); }
    function endCall(){ db.ref(`calls/${myRoom}`).remove(); if(localStream) localStream.getTracks().forEach(t=>t.stop()); if(peerConnection) peerConnection.close(); peerConnection=null; callUI.style.display="none"; }
    function toggleMute(){ isMuted=!isMuted; localStream.getAudioTracks()[0].enabled=!isMuted; muteBtn.innerHTML=isMuted?"🔇":"🎤"; muteBtn.classList.toggle('bg-red-500', isMuted); }
    async function toggleFlash(){ const track=localStream.getVideoTracks()[0]; isFlash=!isFlash; track.applyConstraints({advanced:[{torch:isFlash}]}); }
    async function switchCamera(){ currentFacingMode=currentFacingMode==="user"?"environment":"user"; const track=localStream.getVideoTracks()[0]; track.stop(); const newStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacingMode}}); const newTrack=newStream.getVideoTracks()[0]; peerConnection.getSenders().find(s=>s.track.kind==='video').replaceTrack(newTrack); localStream.removeTrack(track); localStream.addTrack(newTrack); document.getElementById('localVideo').srcObject=localStream; }
</script>
</body>
</html>
