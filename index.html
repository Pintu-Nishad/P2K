<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>तिउरी - वर्किंग गेम</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@700&display=swap');
        body { background: #1a1c2c; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .tiuri-font { font-family: 'Kalam', cursive; }
        
        /* लकड़ी जैसा बोर्ड */
        .board-container {
            background: #4e342e; background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            position: relative; width: 90vw; max-width: 380px; aspect-ratio: 1 / 1.5;
            border: 10px solid #3e2723; border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7); margin: auto;
        }
        .lines-svg { position: absolute; width: 100%; height: 100%; stroke: #d7ccc8; stroke-width: 2.5; fill: none; opacity: 0.8; }
        
        .node { width: 34px; height: 34px; position: absolute; transform: translate(-50%, -50%); z-index: 30; cursor: pointer; }
        .guti { width: 100%; height: 100%; border-radius: 50%; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.5); pointer-events: none; }
        
        .orange { background: radial-gradient(circle at 35% 35%, #ff5722, #bf360c); } 
        .green { background: radial-gradient(circle at 35% 35%, #4caf50, #1b5e20); } 
        .selected { transform: translate(-50%, -50%) scale(1.3); filter: drop-shadow(0 0 10px yellow); z-index: 40; }
        
        /* स्क्रीन मैनेजमेंट */
        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; }
        .active-screen { display: flex !important; }
    </style>
</head>
<body class="text-white">

    <div id="home-screen" class="screen active-screen bg-slate-900">
        <h1 class="text-7xl text-yellow-500 tiuri-font mb-12 drop-shadow-2xl">तिउरी</h1>
        <div class="flex flex-col gap-6">
            <button id="ai-btn" onclick="initiateGame('ai')" class="w-72 bg-gradient-to-b from-orange-500 to-orange-700 p-5 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">🤖 कंप्यूटर (AI)</button>
            <button id="pvp-btn" onclick="initiateGame('pvp')" class="w-72 bg-gradient-to-b from-indigo-500 to-indigo-700 p-5 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">👥 दो खिलाड़ी (PvP)</button>
        </div>
        <p class="mt-20 text-slate-500 text-xs font-bold uppercase tracking-widest italic">Nishad Crafts Games</p>
    </div>

    <div id="game-screen" class="screen bg-[#1a1c2c]">
        <div class="w-full max-w-sm flex justify-between items-center mb-6 px-4">
            <div id="turn-display" class="bg-orange-600 px-6 py-2 rounded-full font-bold text-sm shadow-lg border border-white/20">आपकी बारी</div>
            <div class="flex gap-4 font-black">
                <div class="text-orange-500">P1: <span id="score1">16</span></div>
                <div class="text-green-500">P2: <span id="score2">16</span></div>
            </div>
        </div>

        <div class="board-container">
            <svg class="lines-svg" viewBox="0 0 100 150">
                <rect x="10" y="30" width="80" height="80" />
                <line x1="10" y1="50" x2="90" y2="50" /><line x1="10" y1="70" x2="90" y2="70" /><line x1="10" y1="90" x2="90" y2="90" />
                <line x1="30" y1="30" x2="30" y2="110" /><line x1="50" y1="30" x2="50" y2="110" /><line x1="70" y1="30" x2="70" y2="110" />
                <line x1="10" y1="30" x2="90" y2="110" /><line x1="10" y1="110" x2="90" y2="30" />
                <path d="M50,0 L10,30 L90,30 Z" /><line x1="50" y1="0" x2="50" y2="30" />
                <path d="M50,150 L10,110 L90,110 Z" /><line x1="50" y1="150" x2="50" y2="110" />
            </svg>
            <div id="nodes-layer" class="w-full h-full relative"></div>
        </div>
        
        <button onclick="window.location.reload()" class="mt-10 text-slate-500 font-bold uppercase text-[10px] tracking-widest">🏳️ वापस मेन्यू में जाएँ</button>
    </div>

    <script>
        let currentGameMode = 'ai';
        let currentTurn = 'orange'; // orange (Player), green (AI/Player 2)
        let selectedNode = null;

        // बोर्ड के 37 सटीक पॉइंट्स (इमेज के अनुसार)
        const boardPoints = [
            {x:50, y:0}, {x:30, y:15}, {x:50, y:15}, {x:70, y:15}, {x:10, y:30}, {x:90, y:30},
            {x:10, y:30}, {x:30, y:30}, {x:50, y:30}, {x:70, y:30}, {x:90, y:30},
            {x:10, y:50}, {x:30, y:50}, {x:50, y:50}, {x:70, y:50}, {x:90, y:50},
            {x:10, y:70}, {x:30, y:70}, {x:50, y:70}, {x:70, y:70}, {x:90, y:70},
            {x:10, y:90}, {x:30, y:90}, {x:50, y:90}, {x:70, y:90}, {x:90, y:90},
            {x:10, y:110}, {x:30, y:110}, {x:50, y:110}, {x:70, y:110}, {x:90, y:110},
            {x:30, y:130}, {x:50, y:130}, {x:70, y:130}, {x:50, y:150}
        ];

        // गेम शुरू करने का फंक्शन
        function initiateGame(mode) {
            currentGameMode = mode;
            // होम स्क्रीन छुपाएं और गेम स्क्रीन दिखाएं
            document.getElementById('home-screen').classList.remove('active-screen');
            document.getElementById('game-screen').classList.add('active-screen');
            buildBoard();
        }

        function buildBoard() {
            const layer = document.getElementById('nodes-layer');
            layer.innerHTML = '';
            
            boardPoints.forEach((p, i) => {
                const node = document.createElement('div');
                node.className = 'node';
                node.style.left = p.x + '%';
                node.style.top = (p.y / 1.5) + '%';
                
                // 16 हरी ऊपर, 16 नारंगी नीचे (बीच की लाइन खाली)
                if (i < 16) {
                    node.innerHTML = '<div class="guti green"></div>';
                } else if (i >= boardPoints.length - 16) {
                    node.innerHTML = '<div class="guti orange"></div>';
                }

                node.onclick = () => onNodeClick(node);
                layer.appendChild(node);
            });
        }

        function onNodeClick(node) {
            // अगर कंप्यूटर की बारी है तो यूजर कुछ नहीं कर सकता
            if (currentGameMode === 'ai' && currentTurn === 'green') return;

            const gutiInside = node.querySelector('.guti');

            if (gutiInside) {
                // अपनी गोटी सिलेक्ट करना
                if ((currentTurn === 'orange' && gutiInside.classList.contains('orange')) || 
                    (currentTurn === 'green' && gutiInside.classList.contains('green'))) {
                    document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
                    node.classList.add('selected');
                    selectedNode = node;
                }
            } else if (selectedNode) {
                // खाली जगह पर गोटी चलना
                node.innerHTML = selectedNode.innerHTML;
                selectedNode.innerHTML = '';
                selectedNode.classList.remove('selected');
                selectedNode = null;
                changeTurn();
            }
        }

        function changeTurn() {
            currentTurn = (currentTurn === 'orange') ? 'green' : 'orange';
            const statusBox = document.getElementById('turn-display');
            
            if (currentTurn === 'orange') {
                statusBox.innerText = "आपकी बारी";
                statusBox.className = "bg-orange-600 px-6 py-2 rounded-full font-bold text-sm shadow-lg border border-white/20";
            } else {
                statusBox.innerText = (currentGameMode === 'ai') ? "AI सोच रहा है..." : "दोस्त की बारी";
                statusBox.className = "bg-green-600 px-6 py-2 rounded-full font-bold text-sm shadow-lg border border-white/20";
                
                // अगर AI मोड है तो कंप्यूटर को चलने दें
                if (currentGameMode === 'ai') {
                    setTimeout(aiLogic, 1000);
                }
            }
        }

        function aiLogic() {
            const aiPieces = Array.from(document.querySelectorAll('.node')).filter(n => n.querySelector('.green'));
            const freeSpots = Array.from(document.querySelectorAll('.node')).filter(n => n.innerHTML === '');
            
            if (aiPieces.length > 0 && freeSpots.length > 0) {
                const randomPiece = aiPieces[Math.floor(Math.random() * aiPieces.length)];
                const randomTarget = freeSpots[Math.floor(Math.random() * freeSpots.length)];
                
                randomTarget.innerHTML = randomPiece.innerHTML;
                randomPiece.innerHTML = '';
                changeTurn();
            }
        }
    </script>
</body>
</html>
