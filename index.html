<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2K Ghost - Auto Wipe V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #0b141a; color: #e9edef; overflow: hidden; display: flex; flex-direction: column; }
        .main-wrapper { display: flex; flex-direction: column; height: 100%; width: 100%; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Message Styles */
        .msg { background: #202c33; padding: 10px; border-radius: 14px; max-width: 85%; align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }
        .my-msg { background: #005c4b; align-self: flex-end; }
        .system-msg { align-self: center; background: rgba(255,255,255,0.05); color: #8696a0; font-size: 11px; padding: 4px 12px; border-radius: 20px; border: none; }
        
        /* Photo & UI */
        .img-container { position: relative; margin-top: 5px; border-radius: 8px; overflow: hidden; }
        .msg img { width: 100%; max-height: 250px; object-fit: cover; cursor: pointer; border-radius: 8px; }
        .dl-icon { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); padding: 4px; border-radius: 50%; color: white; cursor: pointer; }

        /* Ghost Toggle Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00a884; }
        input:checked + .slider:before { transform: translateX(14px); }

        .input-area { background: #202c33; padding: 15px 15px 30px 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        #callUI { position: fixed; inset: 0; z-index: 500; background: black; display: none; }
        #remoteVideo, #localVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 90px; height: 130px; border-radius: 12px; border: 2px solid #00a884; }
    </style>
</head>
<body>

<div id="loginDiv" class="fixed inset-0 z-[1000] bg-[#111b21] flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-[#202c33] p-8 rounded-2xl text-center">
        <h1 class="text-2xl font-bold mb-6 text-[#00a884]">P2K Ghost</h1>
        <input id="user" type="text" placeholder="Name" class="w-full bg-[#2a3942] rounded-lg p-3 mb-4 outline-none text-white">
        <input id="pass" type="password" placeholder="Room ID" class="w-full bg-[#2a3942] rounded-lg p-3 mb-6 outline-none text-white">
        <button onclick="enter()" class="w-full bg-[#00a884] py-3 rounded-lg font-bold text-[#111b21]">Enter Private Room</button>
    </div>
</div>

<div id="chatDiv" class="hidden main-wrapper">
    <header class="h-14 bg-[#202c33] flex items-center justify-between px-4 shrink-0 border-b border-gray-800">
        <div class="flex items-center gap-3">
            <button onclick="leaveRoom()" class="text-red-400 text-xs">Exit</button>
            <div class="flex flex-col">
                <b id="roomTitle" class="text-sm">Room</b>
                <span id="userCounter" class="text-[9px] text-[#00a884]">Online: 0</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex flex-col items-center">
                <span class="text-[8px] opacity-60">GHOST</span>
                <label class="switch"><input type="checkbox" id="ghostMode"><span class="slider"></span></label>
            </div>
            <button onclick="startCall()" class="bg-[#00a884] text-[#111b21] px-4 py-1.5 rounded-full font-bold text-[10px]">CALL</button>
        </div>
    </header>

    <div id="chatBox"></div>

    <footer class="input-area">
        <input type="file" id="fileInput" accept="image/*" onchange="sendPhoto(this)" class="hidden">
        <button onclick="document.getElementById('fileInput').click()" class="text-[#8696a0]">📎</button>
        <input id="msgInput" type="text" placeholder="Message..." class="flex-1 bg-[#2a3942] rounded-full px-5 py-2.5 text-sm outline-none text-white">
        <button onclick="sendMsg()" class="bg-[#00a884] p-2.5 rounded-full text-[#111b21]">➤</button>
    </footer>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="absolute bottom-12 left-0 right-0 flex justify-center gap-6">
        <button onclick="switchCamera()" class="bg-gray-700 p-4 rounded-full">🔄</button>
        <button onclick="endCall()" class="bg-red-600 p-4 rounded-full">📞</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM", authDomain: "p2kc-b0553.firebaseapp.com", databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com", projectId: "p2kc-b0553" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName, myRoom, localStream, peerConnection;

function enter(){
    myName = user.value.trim(); myRoom = pass.value.trim();
    if(!myName || !myRoom) return;
    loginDiv.style.display="none"; chatDiv.classList.remove('hidden');
    roomTitle.innerText="ID: "+myRoom;
    
    // Join Alert
    db.ref(`rooms/${myRoom}/msgs`).push({ type: 'system', val: `${myName} joined the room` });
    
    const userRef = db.ref(`rooms/${myRoom}/users/${myName}`);
    userRef.set(true);
    userRef.onDisconnect().remove(); // Handle crash/close

    // Listen Online Users & Clean Room
    db.ref(`rooms/${myRoom}/users`).on('value', s => {
        let count = s.numChildren();
        document.getElementById('userCounter').innerText = "Online: " + count;
        if(count === 0) db.ref(`rooms/${myRoom}`).remove(); 
    });

    listenMsgs(); listenCall();
}

function leaveRoom() {
    // Delete only MY chats from this room before leaving
    db.ref(`rooms/${myRoom}/msgs`).once('value', snap => {
        snap.forEach(child => { if(child.val().u === myName) child.ref.remove(); });
    });
    db.ref(`rooms/${myRoom}/msgs`).push({ type: 'system', val: `${myName} left` });
    db.ref(`rooms/${myRoom}/users/${myName}`).remove().then(() => location.reload());
}

function sendMsg(){
    if(!msgInput.value.trim()) return;
    const isGhost = document.getElementById('ghostMode').checked;
    const msgRef = db.ref(`rooms/${myRoom}/msgs`).push({ 
        u: myName, val: msgInput.value, type: 'text', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
    });
    if(isGhost) setTimeout(() => msgRef.remove(), 30000);
    msgInput.value="";
}

function sendPhoto(input) {
    if (input.files[0]) {
        const reader = new FileReader();
        const isGhost = document.getElementById('ghostMode').checked;
        reader.onload = e => {
            const msgRef = db.ref(`rooms/${myRoom}/msgs`).push({ 
                u: myName, val: e.target.result, type: 'image', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
            });
            if(isGhost) setTimeout(() => msgRef.remove(), 30000);
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function listenMsgs(){
    db.ref(`rooms/${myRoom}/msgs`).on("child_added", s=>{
        let d = s.val();
        let div = document.createElement("div");
        if(d.type === 'system') {
            div.className = "system-msg";
            div.innerText = d.val;
        } else {
            div.className = "msg" + (d.u == myName ? " my-msg" : "");
            let content = d.type === 'image' ? `<img src="${d.val}">` : `<div>${d.val}</div>`;
            div.innerHTML = `<div class="text-[8px] opacity-40 uppercase font-bold">${d.u}</div>${content}<div class="text-[8px] opacity-40 mt-1">${d.time}</div>`;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
    // Sync deletions
    db.ref(`rooms/${myRoom}/msgs`).on("child_removed", () => {
        chatBox.innerHTML = ""; // Refresh local view on deletion
        db.ref(`rooms/${myRoom}/msgs`).once('value', snap => {
            snap.forEach(c => { /* Redraw logic here if needed, but simple clear works */ });
        });
    });
}

// Minimal Call Logic (Same as V7 but fixed for Ghosting)
async function startCall(){
    document.getElementById('callUI').style.display = "block";
    localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:true });
    document.getElementById('localVideo').srcObject = localStream;
    peerConnection = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
    let offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    db.ref(`calls/${myRoom}`).set({ offer:offer, caller:myName });
}

function listenCall(){
    db.ref(`calls/${myRoom}`).on("value", async snap=>{
        let d = snap.val();
        if(!d) { if(peerConnection) endCall(); return; }
        if(d.offer && d.caller !== myName && !peerConnection) {
            if(confirm(d.caller + " Calling...")) {
                localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('callUI').style.display="block";
                peerConnection = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
                await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer));
                let answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                db.ref(`calls/${myRoom}`).update({answer:answer});
            }
        }
        if(d.answer && d.caller === myName) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
    });
}

function endCall(){
    db.ref(`calls/${myRoom}`).remove();
    if(localStream) localStream.getTracks().forEach(t => t.stop());
    if(peerConnection) peerConnection.close();
    document.getElementById('callUI').style.display = "none";
}
</script>
</body>
</html>
