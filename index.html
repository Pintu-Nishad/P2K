<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Chat Pro</title>
<style>
body{background:#0f172a;color:#e2e8f0;font-family:system-ui;margin:0;}
h2{background:#111827;padding:15px;margin:0;}
input,button,select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #1f2937;background:#111827;color:white;}
button{background:#2563eb;}
ul{list-style:none;padding:0;}
li{background:#111827;padding:10px;border-radius:10px;margin:5px 0;}
video{width:48%;border-radius:10px;background:black;}
#callWindow{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#020617;padding:10px;}
.eye{cursor:pointer;margin-left:5px;}
</style>
</head>
<body>

<h2 id="title">🔐 Secret Chat Pro</h2>

<div id="menu">
<input id="name" placeholder="Name (min 4 letters)">
<input id="room" type="password" placeholder="Room">
<button onclick="joinRoom()">Enter</button>
</div>

<div id="chatBox" style="display:none;">
<h3 id="status"></h3>
<div id="users"></div>

<!-- Masked password inside chatBox -->
<p>Room: <span id="maskedRoom">****</span>
<span class="eye" onclick="toggleRoomPass()">👁️</span></p>

<button onclick="exitRoom()">🚪 Exit Room</button>

<input id="msg"><button onclick="sendMsg()">Send</button>
<ul id="chat"></ul>

<select id="quality">
<option value="auto">Auto</option>
<option value="144">144p</option>
<option value="360">360p</option>
<option value="720">720p</option>
<option value="1080">1080p</option>
<option value="2160">4K</option>
</select>

<button onclick="callUser()">📞 Call</button>
</div>

<div id="incoming" style="display:none;">
<p id="callerName"></p>
<button onclick="acceptCall()">Accept</button>
<button onclick="rejectCall()">Reject</button>
</div>

<div id="callWindow">
<h3>📞 Call</h3>
<video id="local" autoplay muted playsinline></video>
<video id="remote" autoplay playsinline></video>

<button onclick="switchCamera()">🔄 Camera</button>
<button onclick="toggleFlash()">💡 Flash</button>
<button onclick="toggleMute(event)">🔇 Mute</button>
<button onclick="endCall()">❌ End</button>
</div>

<audio id="ringtone" src="ring.mp3" loop></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, set, get, onValue, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const app=initializeApp({
apiKey:"AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
databaseURL:"https://p2kc-b0553-default-rtdb.firebaseio.com"
});
const db=getDatabase(app);

let name,roomId,pc,localStream,currentFacing='user',flashOn=false;
let ringtone=document.getElementById("ringtone");

function validName(n){return /^[A-Za-z]{4,}$/.test(n);} // min 4 letters, max unlimited
function toggleRoomPass(){
  let span=document.getElementById("maskedRoom");
  span.innerText = (span.innerText==="****")?roomId:"****";
}

// JOIN
window.joinRoom=async()=>{
name=document.getElementById("name").value.trim();
roomId=document.getElementById("room").value.trim();

if(!validName(name)) return alert("Name must be at least 4 letters");
if(!roomId) return alert("Enter room");

let userRef=ref(db,"users/"+roomId+"/"+name);
let snap=await get(userRef);
if(snap.exists()) return alert("Name already used");

set(userRef,true);

document.getElementById("menu").style.display="none";
document.getElementById("chatBox").style.display="block";
document.getElementById("maskedRoom").innerText="****";
document.getElementById("title").innerText="🔐 Secret Chat - "+name;

// users list
onValue(ref(db,"users/"+roomId),(s)=>{
let data=s.val(); let html="<b>Online:</b><br>";
for(let u in data){html+="🟢 "+u+"<br>";}
document.getElementById("users").innerHTML=html;
});

// leave
window.addEventListener("beforeunload",()=>{exitRoom();});

// chat listener
onChildAdded(ref(db,"chat/"+roomId),(d)=>{
let li=document.createElement("li");
li.innerText=d.val().user+": "+d.val().msg;
document.getElementById("chat").appendChild(li);
setTimeout(()=>li.remove(),60000);
});

// call listener
onValue(ref(db,"call/"+roomId),(snap)=>{
if(snap.exists()){
let data=snap.val();
if(data.caller===name) return;
document.getElementById("incoming").style.display="block";
document.getElementById("callerName").innerText=data.caller+" calling...";
ringtone.currentTime=0; ringtone.play().catch(()=>{});
}else{ringtone.pause();ringtone.currentTime=0;}
});

// ICE listener
onChildAdded(ref(db,"webrtc/"+roomId+"/candidates"), async snap=>{
if(pc){try{await pc.addIceCandidate(JSON.parse(snap.val()));}catch(e){}}
});
}

// EXIT ROOM
function exitRoom(){
remove(ref(db,"users/"+roomId+"/"+name));
remove(ref(db,"call/"+roomId));
document.location.reload();
}

// SEND MSG
window.sendMsg=()=>{push(ref(db,"chat/"+roomId),{user:name,msg:msg.value});}

// MEDIA
async function getStream(){
return await navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacing},audio:true});
}

// PEER
function createPeer(){
pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
pc.ontrack=e=>{document.getElementById("remote").srcObject=e.streams[0];};
pc.onicecandidate=e=>{if(e.candidate) push(ref(db,"webrtc/"+roomId+"/candidates"),JSON.stringify(e.candidate));};
}

// CALL
window.callUser=async()=>{
let snap=await get(ref(db,"call/"+roomId));
if(snap.exists()) return alert("Bhosdi Ke Pagal Hai Kya 😅");

set(ref(db,"call/"+roomId),{caller:name});
document.getElementById("status").innerText="📡 Ringing...";
let time=30;
let timer=setInterval(()=>{
time--; document.getElementById("status").innerText="📡 Ringing... ("+time+"s)";
if(time<=0){clearInterval(timer);set(ref(db,"call/"+roomId),null);document.getElementById("status").innerText="❌ No Answer";}
},1000);

onValue(ref(db,"webrtc/"+roomId+"/answer"),()=>{clearInterval(timer);document.getElementById("status").innerText="✅ Connected";});

localStream=await getStream(); document.getElementById("local").srcObject=localStream;

createPeer(); localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
let offer=await pc.createOffer(); await pc.setLocalDescription(offer);
set(ref(db,"webrtc/"+roomId+"/offer"),JSON.stringify(offer));

// ICE
onChildAdded(ref(db,"webrtc/"+roomId+"/candidates"),async s=>{if(pc){try{await pc.addIceCandidate(new RTCIceCandidate(JSON.parse(s.val())));}catch(e){}}});
}

// ACCEPT
window.acceptCall=async()=>{
ringtone.pause(); document.getElementById("incoming").style.display="none"; document.getElementById("status").innerText="✅ Connected";

localStream=await getStream(); document.getElementById("local").srcObject=localStream;

createPeer(); localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

onValue(ref(db,"webrtc/"+roomId+"/offer"),async s=>{
if(s.exists()){
let offer=new RTCSessionDescription(JSON.parse(s.val()));
await pc.setRemoteDescription(offer);

let ans=await pc.createAnswer();
await pc.setLocalDescription(ans);
set(ref(db,"webrtc/"+roomId+"/answer"),JSON.stringify(ans));
document.getElementById("callWindow").style.display="block";
}
});
}

// REJECT
window.rejectCall=()=>{ringtone.pause();document.getElementById("incoming").style.display="none";set(ref(db,"call/"+roomId),null);}

// MUTE
window.toggleMute=(e)=>{let t=localStream.getAudioTracks()[0]; t.enabled=!t.enabled; e.target.innerText=t.enabled?"🔇 Mute":"🤫 Muted";}

// END
window.endCall=()=>{document.getElementById("callWindow").style.display="none";set(ref(db,"call/"+roomId),null);document.getElementById("status").innerText="";}

// CAMERA
window.switchCamera=async()=>{currentFacing=currentFacing==='user'?'environment':'user';localStream.getTracks().forEach(t=>t.stop());localStream=await getStream();document.getElementById("local").srcObject=localStream;localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));}

// FLASH
window.toggleFlash=()=>{if(!('ImageCapture' in window)) return alert("Flash not supported"); let track=localStream.getVideoTracks()[0]; let imageCapture=new ImageCapture(track); flashOn=!flashOn; track.applyConstraints({advanced:[{torch:flashOn}]});}
</script>

</body>
</html>
