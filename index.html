<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure Audio Chat</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: sans-serif; background:#e5ddd5; height: 100vh; display: flex; flex-direction: column; }
  
  #loginDiv { position: fixed; inset: 0; background: #075e54; display: flex; justify-content: center; align-items: center; z-index: 1000; }
  .login-box { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 320px; text-align: center; }
  .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
  .login-box button { width: 100%; padding: 12px; background: #128c7e; color: white; border: none; border-radius: 8px; font-weight: bold; }

  #chatDiv { display: none; flex-direction: column; height: 100vh; }
  .header { background: #075e54; color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
  
  #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
  .msg { background: white; padding: 8px 12px; border-radius: 8px; max-width: 85%; align-self: flex-start; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
  .my-msg { background: #dcf8c6; align-self: flex-end; }

  .footer { background: #f0f0f0; padding: 10px; border-top: 1px solid #ddd; }
  .button-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .button-row button { flex: 1; padding: 12px; border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer; }
  
  #callBtn { background: #25d366; }
  #callBtn.calling { background: #e53935; } /* End call state */
  .btn-photo { background: #5c6bc0; }
  
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
  .input-row button { background: #075e54; color: white; border: none; width: 45px; border-radius: 50%; cursor: pointer; }
</style>
</head>
<body>

<div id="loginDiv">
  <div class="login-box">
    <h2 style="color:#075e54;">Audio Room</h2>
    <input type="text" id="user" placeholder="Your Name">
    <input type="password" id="pass" placeholder="Room Password">
    <button onclick="enter()">Join Room</button>
  </div>
</div>

<div id="chatDiv">
  <div class="header">
    <b id="roomTitle">Room</b>
    <span id="userCount">Users: 0</span>
  </div>

  <div id="chatBox"></div>

  <div class="footer">
    <div class="button-row">
      <input type="file" id="fileInp" style="display:none;" accept="image/*" onchange="upPhoto(event)">
      <button class="btn-photo" onclick="document.getElementById('fileInp').click()">📷 Photo</button>
      <button id="callBtn" onclick="handleCallToggle()">📞 Start Audio Call</button>
    </div>
    
    <div class="input-row">
      <input type="text" id="msgInput" placeholder="Message...">
      <button onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDMJHzj0g_sRYW2exwyVLZZs4Y_hnnrDNM",
  authDomain: "p2kc-b0553.firebaseapp.com",
  databaseURL: "https://p2kc-b0553-default-rtdb.firebaseio.com",
  projectId: "p2kc-b0553",
  storageBucket: "p2kc-b0553.firebasestorage.app",
  appId: "1:939347031406:web:998f52b262a0cecf11bd7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let myName, myRoom, myStream, isCalling = false;
let peerConn;

// Ask for Notification Permission
if (Notification.permission !== "granted") Notification.requestPermission();

function enter() {
  myName = document.getElementById('user').value.trim();
  myRoom = document.getElementById('pass').value.trim();
  if(!myName || !myRoom) return;

  document.getElementById('loginDiv').style.display='none';
  document.getElementById('chatDiv').style.display='flex';
  document.getElementById('roomTitle').innerText = "Room: " + myRoom;

  db.ref(`rooms/${myRoom}/users/${myName}`).set({active:true});
  db.ref(`rooms/${myRoom}/users/${myName}`).onDisconnect().remove();

  listenMsgs();
  listenCalls();
}

function sendMsg() {
  const inp = document.getElementById('msgInput');
  if(!inp.value) return;
  db.ref(`rooms/${myRoom}/msgs`).push({u:myName, val:inp.value, t:'text'});
  inp.value = '';
}

function listenMsgs() {
  db.ref(`rooms/${myRoom}/msgs`).on('child_added', snap => {
    const d = snap.val();
    const div = document.createElement('div');
    div.className = 'msg' + (d.u === myName ? ' my-msg' : '');
    div.innerHTML = `<b>${d.u}:</b><br>` + (d.t === 'img' ? `<img src="${d.val}" style="max-width:100%;">` : d.val);
    document.getElementById('chatBox').appendChild(div);
    document.getElementById('chatBox').scrollTop = 99999;
  });
}

// --- CALL LOGIC ---

async function handleCallToggle() {
  const btn = document.getElementById('callBtn');
  if (!isCalling) {
    // START CALL
    try {
      myStream = await navigator.mediaDevices.getUserMedia({audio:true});
      isCalling = true;
      btn.innerText = "🛑 End Call";
      btn.classList.add('calling');

      // Send Signal/Notification to others
      db.ref(`rooms/${myRoom}/callSignal`).set({
        type: 'incoming',
        from: myName,
        time: Date.now()
      });

      startWebRTC();
    } catch(e) { alert("Mic Permission Denied!"); }
  } else {
    // END CALL
    location.reload(); // Simple way to reset everything
  }
}

function listenCalls() {
  db.ref(`rooms/${myRoom}/callSignal`).on('value', snap => {
    const data = snap.val();
    if (data && data.from !== myName && (Date.now() - data.time < 5000)) {
      // Show Browser Notification
      if (Notification.permission === "granted") {
        new Notification(`Incoming Call from ${data.from}`, { body: "Tap to join the audio room." });
      }
      document.getElementById('callBtn').innerText = "📞 Answer Call";
      document.getElementById('callBtn').style.background = "orange";
    }
  });
}

async function startWebRTC() {
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  peerConn = pc;

  myStream.getTracks().forEach(track => pc.addTrack(track, myStream));

  pc.ontrack = e => {
    document.getElementById('remoteAudio').srcObject = e.streams[0];
  };

  // Logic for Offer/Answer (Simplified Signaling)
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  db.ref(`rooms/${myRoom}/webrtc`).set({sdp: JSON.stringify(pc.localDescription)});
}

function upPhoto(e) {
  const f = e.target.files[0];
  const r = new FileReader();
  r.onload = () => db.ref(`rooms/${myRoom}/msgs`).push({u:myName, val:r.result, t:'img'});
  r.readAsDataURL(f);
}
</script>
</body>
</html>
